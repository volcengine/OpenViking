tree:
  - id: N01
    type: question
    support_level: explicit
    source_refs: ["§1", "§2.1"]
    title: "长期 LLM 应用需要什么样的持久记忆基座？"
    description: "论文从有限上下文、低密度交互流、状态持续变化和跨场景需求出发，提出需要 service-grade Memory Base。"
    evidence: ["C01"]
    children: [N02, N03, N04]

  - id: N02
    type: decision
    support_level: explicit
    source_refs: ["§2.1 Observation 1", "§3.1"]
    title: "用选择性抽取替代原始日志/naive chunking"
    choice: "抽取高价值、schema 约束的事件，并用智能分段合并非连续相关片段。"
    alternatives: ["raw log retention", "message-level storage", "session-level storage", "sequential topic-level storage"]
    evidence: ["C01", "C05", "C06"]
    children: [N05, N09]

  - id: N03
    type: decision
    support_level: explicit
    source_refs: ["§2.1 Observation 2", "§2.2.1", "Figure 1"]
    title: "把长期状态建模为 Entity，而不仅是 episode log"
    choice: "使用 Event-Entity primitives 与 AggregateExpression，把事件持续物化为实体状态。"
    alternatives: ["static insert-and-retrieve vector store", "flat episodic archive"]
    evidence: ["C01", "C02"]
    children: [N06]

  - id: N04
    type: decision
    support_level: explicit
    source_refs: ["§2.1 Observation 3", "§2.2.2", "Table 5"]
    title: "采用可配置 schema 和算子库以支持跨场景泛化"
    choice: "将业务逻辑拆为 keys、filters、operator 和边缘 prompt，而不是每个场景硬编码一套 memory pipeline。"
    alternatives: ["chatbot-specific user profile schema", "per-scenario prompt engineering"]
    evidence: ["C01", "C02"]
    children: [N07]

  - id: N05
    type: dead_end
    support_level: explicit
    source_refs: ["§3.1", "Figure 3", "Table 2"]
    title: "多 prompt 抽取重复处理同一输入"
    hypothesis: "每种 memory type 单独 prompt/LLM pass 可以实现多类型记忆抽取。"
    failure_mode: "对同一 raw input 重复处理，token 与计算成本过高；Table 2 中 Multiple Prompts 成本高于 one-pass 变体。"
    lesson: "将 event/entity schemas 编译为单个 prompt，执行 one-pass extraction。"
    evidence: ["C04"]
    children: [N08]

  - id: N06
    type: decision
    support_level: explicit
    source_refs: ["§3.1 Faster Entity Update", "Algorithm 1"]
    title: "用 EUA 降低字符串实体更新成本"
    choice: "让 extractor 输出 SEARCH/REPLACE patch，并用 BestApproxSpan 应用到 old entity。"
    alternatives: ["每次字符串 entity update 都额外调用 LLM 合成"]
    evidence: ["C04"]
    children: [N10]

  - id: N07
    type: experiment
    support_level: explicit
    source_refs: ["§5.6", "Table 5"]
    title: "统计真实场景中的 operator 使用频率"
    result: "Education、Agent Memory 与 Social Companionship 使用不同 operator mix，支持 operator-based design 的必要性。"
    evidence: ["C01"]

  - id: N08
    type: experiment
    support_level: explicit
    source_refs: ["§5.3", "Table 2"]
    title: "比较 Multiple Prompts、One-pass w/ EUA、One-pass w/o EUA"
    result: "one-pass 降低成本；EUA 进一步降低 time/cost，Score 保持接近。"
    evidence: ["C04"]

  - id: N09
    type: experiment
    support_level: explicit
    source_refs: ["§5.4", "Table 3"]
    title: "LongMemEval 存储效率分析"
    result: "VikingMem 仅保留原始 token 基线的一小部分，并报告更高 Score。"
    evidence: ["C05"]

  - id: N10
    type: experiment
    support_level: explicit
    source_refs: ["§5.2", "Table 1"]
    title: "LOCOMO 与 LongMemEval 端到端效果/延迟评测"
    result: "在所有报告模型/benchmark 设置中，VikingMem Overall LLM Judge Score 最高，并保持低检索延迟。"
    evidence: ["C03"]

  - id: N11
    type: experiment
    support_level: explicit
    source_refs: ["§5.5", "Table 4"]
    title: "组件消融"
    result: "移除 rerank、entity memory、IMSM 或 keyword graph 均降低分数；IMSM 下降最大。"
    evidence: ["C06"]
    also_depends_on: [N02, N03, N06]

  - id: N12
    type: experiment
    support_level: explicit
    source_refs: ["§5.7", "Table 6"]
    title: "用 token-level F1 复核 LLM-judge 结论"
    result: "VikingMem 在 LOCOMO F1 Overall 上最高，支持 LLM-judge 的整体有效性结论。"
    evidence: ["C03"]
