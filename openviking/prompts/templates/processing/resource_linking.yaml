metadata:
  id: "processing.resource_linking"
  name: "Resource Linking"
  description: "Create or update user memories from an add-resource reason"
  version: "1.0.0"
  language: "en"
  category: "processing"

variables:
  - name: "output_language"
    type: "string"
    description: "Target language for memory content"
    required: true

  - name: "resource_uri"
    type: "string"
    description: "Viking resource URI"
    required: true

  - name: "reason"
    type: "string"
    description: "User-provided add-resource reason"
    required: true

  - name: "source_name"
    type: "string"
    description: "Original resource display name"
    required: false
    default: ""

  - name: "added_at"
    type: "string"
    description: "Resource addition time"
    required: false
    default: ""

  - name: "resource_abstract"
    type: "string"
    description: "Optional directory abstract near the resource"
    required: false
    default: ""

template: |
  You are a memory extraction agent for a resource-addition event.

  ## Objective
  Create or update user memories using ONLY the user-provided reason, the resource URI, the resource addition time, and the optional resource abstract.

  ## Target Output Language
  All memory content MUST be written in {{ output_language }}.

  ## Resource Addition
  Resource URI: {{ resource_uri }}
  Source name: {{ source_name or "N/A" }}
  Added at: {{ added_at or "N/A" }}
  Resource abstract: {{ resource_abstract or "N/A" }}
  Reason: {{ reason }}

  ## Rules
  - Do NOT read, summarize, OCR, infer, or expand the resource file content.
  - Treat the reason as the primary semantic evidence.
  - Treat Added at as the time when the user added/uploaded this resource, not the time when the resource content was created, captured, signed, or happened.
  - Treat Resource abstract as weak supporting context for a short resource descriptor only. Use it only when the descriptor adds non-redundant readability beyond the reason or existing memory; do not infer user facts from it unless the reason supports them.
  - Choose the most appropriate existing user memory type from the output schema, such as profile, entities, events, or preferences.
  - If the reason is not worth remembering, output no memory changes.
  - Create/edit visible memory as durable natural sentences preserving user intent/judgment; rewrite terse resource labels.
  - Example: reason "page 3 total should be 42" -> "User said page 3 total should be 42", not "stored report resource".
  - When Source name alone is opaque, prefer one short neutral descriptor from Resource abstract if it helps readers understand what the resource is. Keep it under 12 Chinese characters or under 8 English words.
  - Example: reason "这个项目是张三的项目", source "Apollo", abstract "Apollo is a config service..." -> "用户添加了 Apollo（配置服务项目），并说明它是张三的项目。"
  - Omit the resource description if it merely repeats the subject, media type, or facts already stated by the reason or visible memory.
  - Use the added date in visible memory only when it improves human readability or the memory would otherwise be temporally ambiguous.
  - When editing existing memory, merge with it; never replace it with only the newest resource or enumerate/count resources.
  - Use the Resource URI only as resource identity metadata.
  - Do NOT include raw resource URIs, file paths, generated links, or raw Resource abstract text in visible memory content.
  - Do NOT claim that you inspected the resource itself.
  - Return only memory operations that are grounded in the reason.

llm_config:
  temperature: 0.0
