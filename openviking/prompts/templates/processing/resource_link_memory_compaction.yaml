metadata:
  id: "processing.resource_link_memory_compaction"
  name: "Resource Link Memory Compaction"
  description: "Compact many resource-link memories into a few readable aggregate memories"
  version: "1.0.0"
  language: "en"
  category: "processing"

variables:
  - name: "output_language"
    type: "string"
    description: "Target language for memory content"
    required: true

  - name: "target_memory_count"
    type: "string"
    description: "Maximum number of aggregate memories to return"
    required: true

  - name: "max_resource_links"
    type: "string"
    description: "Maximum representative links per aggregate memory"
    required: true

  - name: "user_id"
    type: "string"
    description: "The single OpenViking user that owns all input memories"
    required: true

  - name: "aggregate_memories_json"
    type: "string"
    description: "Existing aggregate memories as JSON"
    required: true

  - name: "resource_items_json"
    type: "string"
    description: "New single resource-link memories as JSON"
    required: true

template: |
  You compact resource-addition memories.

  ## Objective
  Rewrite the existing aggregate memories plus the new single resource memories into at most {{ target_memory_count }} readable aggregate memories.
  For a broad collection with clear subtopics, prefer 2-3 aggregate memories instead of one oversized memory.

  ## Target Output Language
  All titles and content MUST be written in {{ output_language }}.

  ## User Context
  All input memories belong to one OpenViking user: {{ user_id }}.
  Names mentioned in reasons/content are people, subjects, authors, photographers, or described actors from that user's resource descriptions. They are NOT OpenViking users unless the input explicitly says so.

  ## Existing Aggregate Memories
  {{ aggregate_memories_json }}

  ## New Single Resource Memories
  {{ resource_items_json }}

  ## Rules
  - Preserve the user's intent, judgments, people, places, times, and topics when they are present.
  - Do not say "multiple users", "N users", or "each user" unless the input explicitly refers to multiple OpenViking users. Prefer phrasing like "用户上传/保存了一组..." for this user's resources.
  - Do not enumerate every resource. Group resources by meaningful topics such as person, place, time, scene, project, document, or user judgment.
  - When many resources share a broad category but have distinct subthemes, split them into 2-3 concise topic memories. Example: city landmarks, natural landscapes, cultural/historic sites.
  - If the resources are weakly related, create a concise "mixed resources" style topic instead of forcing false similarity.
  - Each aggregate memory should be useful to a human reader and should mention approximate coverage, themes, and representative examples.
  - Include at most {{ max_resource_links }} markdown resource links per aggregate memory.
  - Use only resource URIs provided in the input, and only as markdown links.
  - Do not include raw JSON, raw metadata, or raw URI lists in visible content.
  - Do not claim that you inspected resource file contents.
  - Keep titles short and file-name friendly: at most 16 Chinese characters or 8 English words. Omit upload dates from titles unless needed to distinguish topics.
  - Keep each content under 300 Chinese characters or 180 English words.

  ## Output JSON
  Return ONLY a JSON object:
  {
    "memories": [
      {
        "title": "short topic title, safe as a file name",
        "content": "markdown content with a few representative links",
        "resource_uris": ["viking://resources/..."],
        "item_count": 12
      }
    ]
  }

llm_config:
  temperature: 0.0
