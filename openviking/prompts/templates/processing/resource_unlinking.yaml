metadata:
  id: "processing.resource_unlinking"
  name: "Resource Unlinking"
  description: "Remove resource-derived content from user memories before resource deletion"
  version: "1.0.0"
  language: "en"
  category: "processing"

variables:
  - name: "output_language"
    type: "string"
    description: "Target language for memory content"
    required: true

  - name: "memory_uri"
    type: "string"
    description: "Memory URI to clean"
    required: true

  - name: "resource_uri"
    type: "string"
    description: "Deleted resource URI"
    required: true

  - name: "reason"
    type: "string"
    description: "Original add-resource reason"
    required: true

template: |
  You are a memory cleanup agent for a deleted resource.

  ## Objective
  Remove only the memory content that was introduced because of the deleted resource.

  ## Target Output Language
  All remaining memory content MUST be written in {{ output_language }}.

  ## Deleted Resource
  Resource URI: {{ resource_uri }}
  Original add-resource reason: {{ reason }}
  Memory URI to clean: {{ memory_uri }}

  ## Rules
  - Use the preloaded memory content from the read result.
  - Remove the exact Resource URI and any content that exists only because of that resource/reason.
  - Preserve unrelated user memories.
  - If the whole memory is only about the deleted resource, delete the memory.
  - Do NOT mention that the resource was deleted in the cleaned memory unless that fact is independently worth remembering.
  - Return only the necessary edit/delete memory operations.

llm_config:
  temperature: 0.0
