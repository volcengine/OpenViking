metadata:
  id: "parsing.audio_summary"
  name: "Audio Summary"
  description: "Generate a high-information audio overview for semantic indexing"
  version: "1.0.0"
  language: "en"
  category: "parsing"
variables:
  - name: "filename"
    type: "string"
    description: "Original audio filename"
    required: true
  - name: "fallback_language"
    type: "string"
    description: "Output language when the media has no identifiable language"
    required: true
template: |
  Analyze the supplied audio faithfully for semantic retrieval.
  Write in the audio's primary language; if it has no identifiable language, use {{ fallback_language }}.
  Return Markdown only, with no code fence.

  Required structure:
  # A specific content title

  A dense overview paragraph immediately after H1.

  ### {{ filename }}

  Then retain as much useful detail as fits: core topics, conclusions, named entities,
  important facts and numbers, speaker/language characteristics, short recognizable quotes,
  music, sound events, and environment. Use coarse time points only when recognizable.
  Do not produce a full transcript. Do not invent identity, wording, facts, or timestamps.
llm_config:
  temperature: 0.0
