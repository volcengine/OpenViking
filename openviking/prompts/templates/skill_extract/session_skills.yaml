memory_type: session_skills
description: |
  # 任务
  你的任务是基于对话记录，记录下用户主动要求记录的会话技能，步骤规范如下：
  一、提取内容的识别规则
  （一）显式指令识别规则
  1. 触发词识别：识别 “以后”“今后”“每次” 等时间类触发词，判定为长期记忆指令。
  2. 规范性表达识别：识别 “按照...”“遵循...” 等表述，提取其中的规范要求作为记忆规则。
  3. 直接请求识别：识别 “记住”“别忘了” 等直接记忆请求，明确需记忆的核心内容。
  （二）隐式指令识别规则
  1. 修正意图识别：从用户对之前回应的修正内容中，提取用户偏好并判定为可记忆规则。
  2. 重复模式识别：当用户在不同时间（如不同日期）多次重复相同要求（≥3 次），自动识别为隐式记忆指令。
  （三）可记忆性判断规则
  1. 时间 / 范围限定判断：含 “今天”“这次” 等一次性时间限定的为临时要求，不记忆；含 “所有”“每次” 等无时间限制或范围宽泛表述的为长期规范，需记忆。
  2. 内容类型判断：具体题目答案、单次任务结果等具体内容不记忆；选择题标注答案、逐选项分析等通用规则需记忆。
  3. 适用范围判断：表述模糊（如 “要详细一点”）、适用范围不明确的，需向用户确认后再判断是否记忆。
  （四）增量更新识别规则
  1. 新增意图识别：通过 “对了” 等关键词识别用户追加规则的意图，检查与现有规则的兼容性后整合。
  2. 修正意图识别：通过 “不对”“改一下” 等关键词识别规则修正意图，精准定位被修改的原规则。
  3. 删除意图识别：通过 “不需要”“取消” 等关键词识别规则删除意图，同时检查被删除规则是否有依赖规则。
  （五）冲突识别规则
  1. 直接矛盾识别：新规则与现有规则存在明显对立表述（如 “简洁” vs “详细”），判定为直接冲突。
  2. 逻辑冲突识别：结合场景计算后出现矛盾（如单选项 100 字 + 要求与总解析 300 字限制），判定为逻辑冲突。
  3. 范围冲突识别：全局规则与具体任务规则存在格式、要求等冲突（如全局 Markdown 格式与 PPT 制作的 PPTX 格式），判定为范围冲突。
  （六）任务匹配识别规则
  1. 任务类型识别：明确当前任务的核心类型（如题目分析、周报撰写）和所属领域（如医学、财务），匹配对应记忆规则。
  2. 相似度分级判断：任务类型与记忆规则完全一致（如医学题分析匹配医学题规则）为高相似度（95%+），直接应用；任务类型相似（如月度总结匹配周报规则）为中等相似度（60-80%），需用户确认后应用；任务类型无关（如写邮件匹配医学题规则）为低相似度（<30%），不应用。
  二、提取内容的格式规范
  （一）指令提取格式规范
  1. 约束条件格式：需明确 “约束类型 + 具体要求”，如 “语气约束：正式、专业”“表达约束：简洁，避免冗余”。
  2. 格式要求格式：按 “格式类型 + 具体规范” 提取，如 “Markdown 格式：表格用三线表、代码需高亮”。
  3. 处理步骤格式：按 “步骤序号 + 步骤内容” 提取，保持原顺序，标注 “处理流程类”，如 “步骤 1：识别题型；步骤 2：列知识点；步骤 3：逐步解析；步骤 4：给类似题”。
  4. 质量标准格式：按 “标准类型 + 具体要求” 提取，标注 “质量标准类”，如 “清晰度标准：易懂、学生可理解；准确性标准：无错误”。
  （二）指令规范化格式规范
  1. 口语化转标准化：将 “要那种正式的感觉” 转化为 “语气正式、专业”，“别太啰嗦” 转化为 “表达简洁，避免冗余”，去除口语化表述。
  2. 模糊表述量化：对 “详细”“几个” 等模糊词，通过询问用户确认后量化，如 “详细→解析长度：80-150 字”“几个→2-3 个”。
  3. 隐含信息显式化：识别 “上次” 等模糊指代，查找历史记录补全具体内容，明确完整规则，不保留模糊表述。
  4. 冗余信息处理：合并重复表述，如 “每个选项都要分析，不要把选项混在一起，要一个一个分析” 合并为 “逐选项单独分析”，保留核心语义。
  （三）指令分类格式规范
  1. 功能分类格式：按 “分类名称：规则内容” 分类，如 “输入处理类：2 条；核心逻辑类：4 条；输出格式类：3 条；约束禁忌类：1 条”。
  2. 条件分支格式：按 “条件 + 执行动作” 表述，如 “条件 1：选择题→标注答案；条件 2：简答题→给要点”。
  （四）适用范围标注格式规范
  1. 任务范围格式：明确 “规则内容 + 适用范围 + 排除范围”，如 “规则：标注知识点来源；适用范围：医学题；排除范围：编程题”。
  2. 条件范围格式：按 “条件 + 规则内容” 表述，如 “条件：小学生作文→规则：鼓励性语言；条件：高中作文→规则：客观专业”。
  3. 作用域格式：标注 “全局指令 / 具体意图指令”，明确层级关系，如 “全局指令：所有文档都用 Markdown；具体意图指令：周报要包含三部分”。
  （五）冲突解决格式规范
  1. 条件分支解决格式：按 “场景 + 规则内容” 明确分支，如 “正确选项：简洁（30-50 字）；错误选项：详细解释（80-120 字）”。
  2. 优先级标注格式：明确 “优先级顺序：当前指令> 任务规则 > 全局规则”，标注执行方式和记忆保留策略。
  3. 范围细化格式：细化规则条件和要求，确保无逻辑冲突，如 “关键选项（正确选项 + 易错选项）：80 字；其他选项：40 字”。
  三、例子
  （一）显式指令识别例子
  - 输入：“以后分析医学题时，都要标注知识点来源”
  - 识别结果：显式指令（触发词 “以后”），提取规则 “标注知识点来源”，判定可记忆，适用范围为医学题分析。
  （二）隐式指令识别例子
  - 输入：
    - 轮次 1 用户：“帮我分析这道题”
    - 轮次 1 Agent：[给出未解释错误选项的分析]
    - 轮次 2 用户：“不对，错误选项要解释为什么错”
  - 识别结果：隐式指令（用户修正），判定可记忆，询问用户 “您希望以后分析题目时，都这样处理错误选项吗？”
  （三）可记忆性判断例子
  - 例子 1（一次性要求）：
    - 输入：“今天的报告要加上财务数据”
    - 判断结果：一次性要求（时间限定 “今天”），不记忆。
  - 例子 2（长期规范）：
    - 输入：“所有报告都要包含财务数据”
    - 判断结果：长期规范（范围 “所有”），记忆。
  - 例子 3（模糊表述）：
    - 输入：“要详细一点”
    - 判断结果：适用范围不明，询问用户 “您是指所有任务都要详细，还是只针对某类任务？”
  （四）指令提取与规范化例子
  - 输入：“要那种正式的感觉，别太啰嗦，重点突出”
  - 提取结果：
    - 规则 1：语气约束：正式、专业
    - 规则 2：表达约束：简洁，避免冗余
    - 规则 3：格式要求：重点内容前置或加粗强调
  - 规范化结果：去除口语化表述，明确约束类型和具体要求。
  （五）增量更新例子
  - 例子 1（新增规则）：
    - 现有记忆：规则 1 “逐选项分析”，规则 2 “标注来源”
    - 输入：“对了，错误选项要指出常见误区”
    - 处理结果：识别追加意图，新增规则 3 “错误选项标注常见误区”，与现有规则无冲突，整合为规则 1-2-3。
  - 例子 2（修正规则）：
    - 现有：“解析长度：50 字以内”
    - 输入：“不对，应该是 50-100 字”
    - 处理结果：识别修正意图，定位 “解析长度” 规则，替换为 “50-100 字”，验证与其他规则一致性。
  （六）冲突处理例子
  - 输入：
    - 现有：“解析要简洁”
    - 新增：“错误选项要详细解释”
  - 冲突检测：直接冲突（“简洁” vs “详细”）
  - 解决询问：“您之前要求简洁，现在又要详细解释错误选项，您希望：A. 只有错误选项详细，其他部分简洁；B. 根据情况灵活处理；C. 修改之前的 ' 简洁 ' 要求”
  - 最终规则（用户选 A）：“正确选项：简洁（30-50 字）；错误选项：详细解释（80-120 字）”
  （七）任务匹配与记忆应用例子
  - 例子 1（高相似度匹配）：
    - 记忆：医学题分析规则（标注来源、逐选项分析等）
    - 输入：“帮我分析这道药理学题目”
    - 匹配结果：相似度 95%+，直接应用医学题分析规则。
  - 例子 2（跨会话一致性应用）：
    - Day1：用户设定规则 “解析 50-100 字，标注来源”
    - Day3：输入 “分析这道新题”
    - Day7：输入 “再分析一道题”
    - 应用结果：Day3 和 Day7 自动应用 Day1 的规则，三次输出格式、细节保持一致。
directory: "viking://user/{{ user_space }}/skills"
filename_template: "{{ skill_name }}/SKILL.md"
enabled: true
fields:
  - name: skill_name
    type: string
    description: |
      # 内容
      可应用上该可Skill的场景描述的中文名
      # 注意事项
      （1）要尽可能的精简，避免使用复杂的描述词汇。不超过12个字符；
      （2）不得为空。
      # 例子
      ## 好例子
      - 订单处理流程
      ## 坏例子
      - 订单处理的详细流程，尤其是退款订单
    merge_op: immutable

  - name: description
    type: string
    description: |
      # 内容 简要介绍该技能功能或应用场景
      # 注意事项 （1）输出必须是通用的，不涉及具体要求；（2）不超过30字符；
      # 例子
      ## 好例子
      - 分析用户常识问题时的详细步骤，尤其是地理问题 胃痛症状如何进行分析和处理，包括检查症状、咨询医生、建议治疗等步骤。
      ## 坏例子
      - 用户反馈快递未收到但系统显示已完成，要求解决问题（拿到货或退款），并询问订单12346配送情况
    merge_op: replace

  - name: content
    type: string
    description: |
      # 内容
      该Skill的完整信息，必须与从用户和模型的对话记录中提取的信息保持一致。

      # 输出格式
      1.必须以连续的Markdown字符串格式进行输出；
      2.可参考给出的格式说明，部分章节可按情况调整

      # 详细格式和说明：参考如下<md>标签里的示例Markdown内容
      <md>
      [简要介绍该技能及其重要性]
      ## 核心规范
      - [核心主题 1]
      - [核心主题 2]
      ## 使用该Skill的场景
      - [场景 1]
      - [场景 2]
      ## 实现指南
      ### 先决条件
      - [所需的知识或者环境、配置]
      ### 技术和方法
      [详细说明如何运用此技能]
      ### 应用场景示例
      [来自原始材料的具体实例]
      ## 核心要点
      - [要点 1]
      - [要点 2]
      </md>

      # 正确输出参考如下<example>标签里的内容
      <example>
      本技能用于规范物理电路计算题的解答流程，确保解答的准确性和规范性。
      ## 核心规范
      - 解答物理电路计算题需按标准格式进行
      - 标准格式包含电路分析、列公式、计算和输出结果四个步骤
      ## 使用该Skill的场景
      - 解答物理电路计算题时
      ## 实现指南
      ### 先决条件
      - 掌握物理电路的基本概念和公式
      ### 技术和方法
      1. 【电路分析】：用文字描述连接方式（串联/并联）；
      2. 【公式】：列出使用的原始公式；
      ### 应用场景示例
      当遇到物理电路计算题时，按照上述四个步骤进行解答。
      ## 核心要点
      - 严格按照四个步骤解答
      - 计算过程不带单位，结果带单位
      </example>
    merge_op: patch
