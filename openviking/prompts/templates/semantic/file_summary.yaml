metadata:
  id: "semantic.file_summary"
  name: "File Summary Generation"
  description: "Generate summary for a single file in a directory, used for subsequent generation of directory abstract and overview"
  version: "1.0.0"
  language: "en"
  category: "semantic"

variables:
  - name: "file_name"
    type: "string"
    description: "File name"
    required: true

  - name: "content"
    type: "string"
    description: "File content"
    required: true

  - name: "output_language"
    type: "string"
    description: "Language code for output (e.g., 'en', 'zh-CN', 'ja', 'ko', 'ru', 'ar')"
    required: true

template: |
  Output Language: {{ output_language }}

  Please generate a summary for the following file:

  【File Name】
  {{ file_name }}

  【File Content】
  {{ content }}

  Language requirements:
  - Write the summary in {{ output_language }}, matching the dominant natural language used in the source content
  - Do not default to English unless the source content is predominantly English
  - If the content mixes languages, follow the dominant human-language prose and use it consistently for the whole summary
  - Keep unavoidable file names, code identifiers, API names, and quoted literals in their original form, but keep all explanatory prose in {{ output_language }}

  Output requirements:
  - Length: 50-150 words
  - Explain what this file is, what it covers, and what it's used for
  - Include core keywords for understanding
  - Output plain text directly, no markdown format

llm_config:
  temperature: 0.0
