memory_type: experiences
description: |
  输出语言策略：生成性自然语言必须使用 {{ language }}，包括名称、检索锚点、摘要、要点和分析内容。若原始内容多语言，以当前用户任务的主语言作为 {{ language }}；不明确时使用最新用户消息的语言。固定 schema 标题、工具名、API/function 名、evaluation 字段名、enum 值、代码标识符、ID、金额、日期、路径和必要的用户原文关键字面量必须保留原文。更新已有 memory 时优先复用已有 experience_name，并尽量保持其主语言和术语风格，避免创建同义翻译副本。

  A generalizable, reusable insight distilled from agent execution — not a process record.
  Captures a transferable pattern: what situation triggers it, what approach works, and why.
  Single-task extraction boundary: from one new trajectory, create or update at most ONE experience, and only when it is directly supported by the trajectory's evaluated outcome. Treat `new_trajectory` as the only source of new facts. Candidate experiences/source trajectories/retrieved memories are for deciding whether to update the same pattern; do not mine them, system policy, or general domain rules into new experiences.

directory: "viking://user/{{ user_space }}/memories/experiences"
filename_template: "{{ experience_name }}.md"
enabled: true
operation_mode: "upsert"
stage: agent
peer_enabled: false
fields:
  - name: experience_name
    type: string
    description: |
      Name the generalizable pattern, not the specific instance.
      For newly created experiences, must be written in {{ language }}.
      If updating a candidate existing experience with the exact same user intent, policy gates, and terminal tool family, reuse the existing experience_name exactly even when its language differs from {{ language }}; prefer updating over creating a translated duplicate.
      {% if language == 'en' %}Use lowercase snake_case, max 5 words.{% else %}Use a concise natural {{ language }} noun phrase, max 15 characters.{% endif %}
      Good: "重复预订处理", "异步测试挂起修复", "补偿对象校验".
    merge_op: immutable

  - name: content
    type: string
    description: |
      Structured experience extraction in EXACTLY this 3-section format. Use {{ language }} for all natural-language prose while keeping the section titles exactly as written below; preserve exact tool names, API/function names, evaluation field names, enum values, code identifiers, IDs, amounts, dates, paths, and required source literals. This output will be injected directly into an autonomous agent's system prompt, so it MUST be scoped, policy-gated, executable machine instructions:

      ## Situation
      <exactly 5 markdown bullets, one per applicability field. Use these labels verbatim in the output language when possible: `仅适用于...` / `Applies only to...`; `不适用于...` / `Does not apply to...`; `必须先满足的政策条件...` / `Required policy gates...`; `允许的终态工具...` / `Allowed terminal tool...`; `禁止替代动作...` / `Forbidden substitute actions...`. Each bullet must bind one concrete user intent, one target boundary, one policy gate family, and one terminal tool family. Do NOT write Situation as a semicolon-separated paragraph.>

      ## Approach
      <markdown bullets in pseudocode style: Active Execution Logic (The "DOs"). Every Approach bullet MUST start with a sequential step id in square brackets, starting from `[1]`: `- [1] ...`, `- [2] ...`, `- [3] ...`. Express the optimized path as executable pseudocode bullets: assign verified facts to variables, write tool calls as `result = exact_tool_name(arg=value)`, and write branch conditions as their own numbered step (`- [N] IF <condition>`). Put branch actions on following numbered steps prefixed with `THEN`, `ELSE`, or `ELSE IF` so future trajectory analysis can mark the IF result as true/false and branch steps as executed/skipped. Finish the scoped experience path with one local return marker: `RETURN_COMPLETED`, `RETURN_BLOCKED(reason="...")`, or `RETURN_NOT_APPLICABLE`. Include the final terminal business tool call when the covered intent requires a state-changing action, and include its prerequisites. Do NOT use fenced code blocks. Do NOT place negative constraints or failure warnings here.>

      ## Reflect
      <markdown bullets: Hard Guardrails & Principles (The "DON'Ts"). Store each recurring or high-risk mistake as {% if language == 'en' %}`Pitfall(count=N): <guardrail>`{% else %}`易错点（踩坑次数=N）: <guardrail>`{% endif %}. Experience may contain multiple guardrails when they belong to the same user intent, terminal tool family, and policy gate. Merge semantically overlapping lessons into consolidated bullets; do not duplicate or conflict.>

      Rules:
      - MUTUAL EXCLUSIVITY (NO REDUNDANCY): Strictly separate active steps from constraints to eliminate redundant information. 'Approach' is ONLY for actionable, positive execution steps to advance the task. 'Reflect' is ONLY for negative boundaries, limits, and "what not to do." Do not repeat the same concept across both sections.
      - OPTIMIZED EXECUTION PATH: You MUST critically analyze the original trajectory and aggressively trim away conversational noise, redundant retry loops, false starts, and irrelevant setup actions. Outline only the essential, efficient path in 'Approach'.
      - SITUATION FIELD FORMAT: `## Situation` MUST contain exactly five top-level bullets, in this order: applies-only, does-not-apply, required policy gates, allowed terminal tool, forbidden substitute actions. Do not combine them into one paragraph; do not omit nearby forbidden tool families.
      - APPROACH STEP IDS: Every top-level `## Approach` bullet MUST start with a step id in square brackets: `- [1] ...`, `- [2] ...`, `- [3] ...`. Start at `[1]`, increase by 1, do not skip numbers, and do not reuse numbers. Return markers such as `RETURN_COMPLETED`, `RETURN_BLOCKED(...)`, and `RETURN_NOT_APPLICABLE` also need their own numbered step. When updating an existing experience, rewrite the whole Approach so the step ids are clean and sequential.
      - APPROACH BRANCH FORMAT: Do not hide an IF branch inside one long line. Write the condition as one numbered step (`- [N] IF <condition>`), then write each branch action as its own later numbered step prefixed with `THEN`, `ELSE`, or `ELSE IF`. This lets a future trajectory say whether step `[N]` evaluated true/false and which branch steps were executed or skipped.
      - APPROACH PSEUDOCODE FORMAT: In `## Approach`, use concise markdown bullets that read like executable pseudocode, not prose. Prefer variable assignments (`target = ...`), exact tool-call expressions (`result = exact_tool_name(arg=value)`), explicit control flow (`IF ...`, `THEN`, `ELSE`, `ELSE IF`), local return markers, and numbered branch-body bullets. Every real tool invocation MUST be written as `tool_name(...)` with the exact tool name from `new_trajectory`; vague phrases like "execute the corresponding operation", "continue processing", or "call the related tool" are invalid. Do not wrap Approach in fenced code blocks; each line must still be a markdown bullet and must start with its step id.
      - SCOPED EXPERIENCE RETURNS: Treat each experience as a local subroutine for one covered intent, not as a whole-task script. End each branch with exactly one local return marker: `RETURN_COMPLETED` means the covered intent's required business read/write and required communication have finished; `RETURN_BLOCKED(reason="...")` means the covered intent cannot proceed under current facts after any needed communication or escalation; `RETURN_NOT_APPLICABLE` means this experience should not be used for the current task. Refusal, no-option, policy-ineligible, missing-input, and transfer/escalation branches MUST end with `RETURN_BLOCKED(reason="...")`, not `RETURN_COMPLETED`. Do not use bare `STOP` in newly generated or updated experiences.
      - GLOBAL DONE BOUNDARY: `done()` is a real global terminal tool, not a local return marker. Do not include `done()` in `## Approach` unless the visible evaluated sequence explicitly requires it as part of the same terminal boundary. Prefer local return markers and let the outer agent decide whether other user intents remain before calling global `done()`.
      - MACHINE READABILITY (PSEUDOCODE VOICE): Address the future agent through executable pseudocode bullets rather than narrative prose. Use exact tool names and branch conditions; keep natural-language messages only as arguments to communication tools when needed.
      - ABSTRACTION MANDATE: Strip away specific entities, IDs, user names, or raw text from the past trajectory. Use generalized abstract descriptions so the rule applies universally.
      - FAILURE INTEGRATION: Translate past mistakes into strict negative constraints. These MUST be placed exclusively in the 'Reflect' section. If the source trajectory outcome is failure/partial/unfinished, do NOT create or broaden a positive 'Approach' workflow unless the corrected action is supported by both evaluation feedback and system policy. For failure/partial/unfinished sources, prefer updating only `## Reflect` on an existing same-scope experience; create a new positive workflow only when the expected terminal action is explicit and not already attempted unsuccessfully. When policy support is uncertain, output only narrow guardrails in 'Reflect' or skip the experience.
      - FIX ONLY THE FAILED PART: Before writing an experience, separate what was already proven correct from what actually failed, was missing, or disagreed with the expected result. Do not turn a passed step into a forbidden step. If the executed read/write/business path is already supported by the outcome and the remaining failure is only the final user-facing response, create/update only a communication-completeness experience for that same path. Do not create refusal, handoff, "do not call this tool", or alternative-path experiences unless the visible evidence says that the already executed step itself caused the failure.
      - PITFALL COUNTING: In `## Reflect`, every mistake-derived guardrail MUST use {% if language == 'en' %}`Pitfall(count=N): ...`{% else %}`易错点（踩坑次数=N）: ...`{% endif %}. For a new mistake, set N=1. When updating an existing experience with the same user intent, terminal tool family, policy gate, and semantically same guardrail, merge into that bullet and increment N by 1 instead of appending a duplicate. If the new trajectory is success-only and does not show the mistake recurring, preserve existing N unchanged.
      - REFLECT MERGE POLICY: Each source trajectory may contribute only its `# 反思/关键反思` core lesson, but an experience can accumulate multiple compatible guardrails over time. Merge new guardrails with existing Reflect bullets when they share the same user intent, terminal tool family, and policy gate. Combine overlapping bullets into one stronger bullet; keep distinct bullets only when they protect against genuinely different failure modes.
      - CASESPEC ACTION SUPPORT: For structured training runs, CaseSpec/ground_truth/rubric `Actions:` inside `new_trajectory` count as evaluation support for corrected actions. If those actions explicitly require a write sequence, this support satisfies the evaluation side of FAILURE INTEGRATION even when the final evaluation report is sparse.
      - FAILURE WRITE-BRANCH DEFAULT: For failure/partial/unfinished trajectories, the default allowed experience is a no-write gate/refusal/communication/transfer guardrail that ends with `RETURN_BLOCKED(reason="...")`. Do NOT include any state-changing tool in 'Approach' unless visible evaluation explicitly identifies that state-changing tool as the missing expected terminal action and the actual trace did not already execute that same tool unsuccessfully.
      - NEW_TRAJECTORY ONLY: Every bullet in Situation, Approach, and Reflect must be justified by the `new_trajectory` content and its visible evaluation/action_check. Existing candidate_experience and candidate_source_trajectory content may only supply text to preserve when it is the same intent and terminal tool family; never copy, update, or create an experience for an intent that appears only in candidate memories.
      - EXECUTION-FIRST PRINCIPLE: 'Approach' steps MUST describe direct tool invocations only. Strip all "I will now do X" / "I have completed X" communication steps.
      - CONDITIONAL BRANCH PRESERVATION: Capture full decision trees as explicit IF/THEN/ELSE branches. NEVER collapse divergent user-driven branches into a single terminal action.
      - ATOMIC SCOPE: Each experience MUST cover exactly ONE user intent and ONE terminal tool family (for example one creation/order write tool OR one modification write tool OR one add-on write tool OR one cancellation/deletion write tool OR one handoff tool). Multiple distinct user intents or multiple unrelated terminal actions in `new_trajectory` are NOT a license to output many records in single-task mode; choose the one decisive evaluated intent/tool family and omit the rest. Broad meta-workflows such as "multi-request handling", "task wrap-up checking", "cancel/modify handling", or generic "modification workflow" are violations unless tied to one concrete terminal tool family and one policy gate. Hard limit: if 'Approach' would exceed 8 bullets, skip rather than split in single-task mode.
      - HARD CAP FOR SINGLE-TASK TRAJECTORIES: Create or update at most ONE experience per source trajectory. If the source trajectory includes several conversational sub-requests in one evaluated case, choose only the decisive intent/tool-family that determined the reward. If you would output more than one experience, output only the single entry matching `new_trajectory`'s final evaluated outcome; if none is precise, output an empty experiences list. Do not emit separate experiences for setup, balance lookup, confirmation wording, policy background, or incidental branches unless that was the evaluated terminal outcome.
      - SOURCE BOUNDARY: Only generalize from the new trajectory content and its visible evaluation/action_check evidence. Do NOT create or update experiences from system policy text, tool schemas, Experience Reminder, previously retrieved experiences, candidate_experience, candidate_source_trajectory, memory_context content, historical archive overviews, or unrelated examples present in the prompt.
      - PRECISION OVER COVERAGE: If a candidate experience would be broad enough to retrieve for unrelated creation, modification, cancellation/deletion, add-on, upgrade, refund/compensation, and lookup tasks, skip it. It is better to write no experience than to add a noisy one.
      - SUCCESS-FIRST EXPERIENCE POLICY: Prefer creating/updating experiences from successful trajectories that reached the expected terminal tool family. Failure/partial trajectories should usually remain trajectory diagnostics, not reusable execution policy.
      - FAILURE FILTER: For failure/partial trajectories, create an experience only when the corrected terminal action and policy gate are unambiguous in evaluation feedback. Do not update existing experiences on failure/partial unless the existing experience has the same user intent and same terminal tool family as `new_trajectory`. Otherwise update no experience; the trajectory memory alone is sufficient diagnostic evidence.
      - FAILURE GUARDRAIL ONLY: When a failure only proves a forbidden action, user self-report conflict, wrong parameter source, premature global completion/escalation, or wrong target, add or merge a narrow Reflect guardrail for the same terminal family. Do not create a new broad refusal, handoff, eligibility-check, business-process, requirement-unmet, or generic parameter-validation experience from that failure.
      - FORBIDDEN-WRITE FAILURE FILTER: If `new_trajectory` is a failure where visible evaluation/action_checks expect only read/query tools or a refusal/communication boundary, but the actual trace performed a state-changing tool (such as cancel_reservation, modify_reservation, book_reservation, add baggage/insurance, or compensation issuance) and DB reward is 0.0, the state-changing tool is the forbidden substitute. Do NOT create or update any positive experience whose Approach includes that state-changing tool, post-write verification, write-result validation, or successful completion after that write. Add/merge a narrow Reflect-only guardrail for the decisive read/refusal boundary, or output no experience. This rule overrides any candidate_experience that suggests the write was correct.
      - MEMORY FAILURE CARRYOVER BAN: If source trajectory says a retrieved/injected memory was misleading, over-broad, stale, conflicted with tool facts/policy/evaluation, ignored, or only solved a secondary issue, do NOT merge that memory's Approach into the experience. Preserve only the narrower Reflect guardrail supported by the current trajectory, or skip the experience update.
      - HIDDEN-EVALUATION APPLICABILITY BAN: Do NOT create an experience whose Situation depends on future agents seeing evaluation/action_checks/rubric/CaseSpec (for example "评估明确要求仅查询"), because rollout agents normally see only the user request, policy, tools, and retrieved object facts. If a forbidden-write failure is only justified by hidden evaluation metadata and has no observable policy/object gate, output no experience. If the same trajectory exposes an observable gate, scope the experience to that gate instead.
      - AGENT-FACING RULES MUST BE RUNTIME-VISIBLE: `## Situation` and `## Approach` must be usable by a future agent that only sees the user conversation, tool outputs, policy, and retrieved memories. Do not write agent-facing steps like "include the evaluation-required value" or "answer with the hidden expected literal". If evaluation/rubric/CaseSpec reveals a missed action or missed answer, translate it into a runtime-visible requirement: the original user request/question, a pending answer, a tool fact to compute/read, a policy gate, object binding, or confirmation. If a number/text literal is only known from evaluation and cannot be seen or recomputed at runtime, keep it as evidence in `## Reflect`, not as an `## Approach` step.
      - POLICY-GATE REFUSAL EXPERIENCE: For a failure where a state-changing action was forbidden and the trace exposes an observable policy gate that future agents can verify (for example full timestamp arithmetic exceeds an allowed window, target status is ineligible, ownership/target binding fails, insurance/cabin/membership/refund prerequisite is absent, or required confirmation is missing), you MAY create one narrow experience whose Approach performs the required reads, evaluates that gate, then uses a non-writing scoped boundary such as communicate/refusal/`RETURN_BLOCKED` or transfer_to_human_agents when policy says the request is out of scope or the user requests an exception. Its Situation must name the observable gate and forbidden write family; its Approach must not call the forbidden state-changing tool.
      - QUERY-ONLY CANCELLATION FAILURE: For a failed cancellation rollout where evaluation/action_checks only expect get_user_details/get_reservation_details, DB reward is 0.0, and actual trace called cancel_reservation, any experience that permits cancel_reservation is invalid. If preserving a lesson, write only a gate-scoped guardrail: after verified reads, calculate cancellation eligibility from observable tool fields (including exact full timestamp arithmetic for 24-hour windows) and refuse/terminate or transfer for exception handling when the current target does not satisfy cancellation/refund gates; never write an Approach branch that calls cancel_reservation.
      - TIME-WINDOW GUARDRAIL: For cancellation memories involving a 24-hour booking window, require full timestamp arithmetic against the policy current time. If the source trajectory miscomputed the window and then failed, do not create a positive cancellation eligibility workflow; preserve only the negative guardrail that calendar-date matching is insufficient and user/support claims cannot override created_at.
      - HANDOFF / GLOBAL COMPLETION THRESHOLD: Treat handoff or global task completion as the allowed terminal family only when visible evaluation/action_check explicitly rewards that terminal boundary or no state-changing/read terminal action is expected. Do not generalize user refusal, no-option search, policy ineligibility, or an unnecessary clarification failure into a reusable handoff/global-completion workflow; prefer a scoped `RETURN_BLOCKED` after required communication/escalation.
      - APPLICABILITY GATING: The 'Situation' section MUST explicitly include bullets equivalent to {% if language == 'en' %}"Applies only to...", "Does not apply to...", "Required policy gates...", "Allowed terminal tool...", and "Forbidden substitute actions..."{% else %}"仅适用于...", "不适用于...", "必须先满足的政策条件...", "允许的终态工具...", and "禁止替代动作..."{% endif %}. If these cannot be stated precisely, skip the experience instead of creating a broad memory. For policy-ineligible cancellation/handoff patterns, the applies-only bullet MUST bind the current target reservation/order, the already-verified ineligibility gates, and the user's explicit request to continue via the allowed handoff path; otherwise skip.
      - POLICY-INELIGIBLE HANDOFF NARROWING: When the decisive terminal family is transfer_to_human_agents after a failed eligibility gate, scope the experience to that exact current-target ineligibility boundary. 'Situation' MUST say it does not apply to directly eligible cancellation/deletion, modification/rebooking, refund calculation, insurance purchase/backfill, add-on purchase/removal, lookup-only, or using another order's benefits/insurance as automatic coverage. 'Approach' MUST verify any user objection against structured tool evidence for the current target before handoff, then return `RETURN_BLOCKED(reason="policy_ineligible_or_escalated")`.
      - STATE-CHANGE SAFETY: NEVER write an 'Approach' that calls state-changing tools as probes. State-changing tools (such as cancellation/deletion, creation/order, modification, add-on/member update, or compensation issuance tools) require visible evaluation support or a successful evaluated trajectory, verified policy eligibility, correct target binding, and explicit user confirmation before invocation when policy requires confirmation.
      - TRACE TOOL BOUNDARY: In all experience content, mention only tools actually available in the current trace/evaluation or exact terminal tool names from `new_trajectory`. Never invent external/nonexistent tools or preserve candidate-only tool names that do not appear in the current tool set. If an existing candidate uses an unavailable tool, either rewrite it to the current trace tool supported by `new_trajectory` or skip updating that experience.
      - NO SUBSTITUTE WORKFLOWS: Do NOT generalize a cancel-and-rebook path as a substitute for a valid modification/update path. Delete-and-recreate/cancel-and-recreate experiences apply only when the original object is eligible for cancellation/deletion, the requested change cannot be handled by the permitted update tool, and the user explicitly chooses cancellation/deletion plus a new creation.
      - TERMINAL ACTION COMPLETENESS: If the successful path requires a state-changing action after confirmation, 'Approach' MUST include that terminal tool call and must not end at search, calculation, option presentation, or user communication. This applies to successful trajectories or failures where evaluation explicitly says the write was missing; it must not override the failure write-branch restrictions above.
      - EXPECTED-WRITE FAILURE OVERRIDE: If a failure/partial trajectory has visible evaluation/action_checks that explicitly mark a state-changing tool as missing or argument-mismatched, and the actual trace did NOT already execute that same expected tool family with the evaluated arguments, you MAY create a positive experience for that exact evaluated tool family and policy gate. Its Approach must call the specific expected write family after required reads/calculation/confirmation, must preserve the evaluated modification level or target category, and must not substitute a stricter refusal/handoff/no-write branch or a different workaround such as higher-tier upgrade, cancel-and-recreate, or extra add-on purchase.
      - GROUND_TRUTH WRITE EXPERIENCE OVERRIDE: If `new_trajectory` contains ground_truth/rubric `Actions:` that require a specific write sequence, any experience created or updated from that trajectory must preserve that exact sequence and must not create/update a negative policy experience that forbids any required write. If a candidate experience conflicts with the ground_truth-required write sequence, do not update it; create/update the evaluated-sequence experience instead, or output no experience.
      - EXACT TOOL NAME PRESERVATION: When Approach calls a tool, use the exact `action.name` from visible evaluation/action_checks or the exact `tool_name` from the current trace. Do not invent aliases or rename tool families; if evaluation says `update_reservation_flights`, the experience must say `update_reservation_flights`, not a generic or different modify/update tool name.
      - EVALUATED SEQUENCE PRESERVATION: If the evaluated path is a prerequisite write followed by one or more terminal writes, preserve that sequence in Approach: read/price/confirm, call the exact prerequisite write with the evaluated target category, then call the exact terminal write(s), communicate required info, and return `RETURN_COMPLETED` unless visible evaluation explicitly requires `done()`. Do not create an experience that stops after eligibility explanation, only cancels a subset, upgrades to a higher tier/category, or transfers before all evaluated writes are attempted.
      - POLICY-VS-EVALUATION TENSION: When evaluation requires an operation that the model's policy reasoning may reject, the experience may mention the visible policy gate as an applicability boundary, but the executable path must follow the evaluated user-confirmed action family. Do not create a negative eligibility experience from such a failure if it would prevent a later rollout from executing the action_checks-required write.
      - COMMUNICATION-LITERAL COVERAGE: When the visible outcome says the business/read/write path was correct and the only remaining problem is missing or wrong user-facing information, the only valid experience is a narrow communication-completeness rule for the same terminal boundary. In Situation, scope it to after all required business actions/read checks are complete and before final task completion. In Approach, require reconstructing every user-requested information item from visible user turns/tool facts, preserving exact numeric/text values only when the future agent can see or recompute them at runtime, and communicating each missing item with its correct semantic label via `communicate_with_user` before returning `RETURN_COMPLETED`. If evaluation provides a literal, turn it into the runtime-visible question/fact that should produce that literal; do not make the Approach depend on seeing evaluation. In Reflect, forbid substituting a different aggregate concept: do not report refund total, fee total, subset total, or post-change remaining total when the request/evaluation requires total cost/count/status for a specific queried set and time boundary.
      - CASESPEC COMMUNICATION CARRYOVER: If `new_trajectory` cites a CaseSpec/ground_truth/rubric `Communicate Info` or NL Assertion as omitted, create/update the communication-completeness experience even when the final evaluation report lacked detailed breakdown. The Situation/Approach must describe the missed communication as a runtime-visible user question, tool fact, or pending semantic assertion, then include that answer in the final customer-facing `communicate_with_user` before returning `RETURN_COMPLETED`; do not tell the future agent to rely on the hidden evaluation text itself.
      - USER QUESTION MUST NOT BE SILENTLY CHANGED: When the user asks an information question in the middle of a multi-step task, preserve that question as a pending answer requirement with the meaning it had when asked. Later tool calls or writes may change the world, but they must not silently rewrite the original question into a different current-state question. In the extracted experience, tell the future agent to answer the original question using the scope/context from when the user asked it before returning completion. If the later result is also useful, communicate both answers with clear labels instead of replacing the original answer.
      - QUERY-TIME AGGREGATE BOUNDARY: For multi-intent sessions where the user asks an informational side question during a write workflow, preserve that side-question as a required terminal communication item with its original query-time inclusion set and time boundary. Derive the set from the user turn plus tool facts visible at that moment; later writes/cancellations/updates must not silently shrink the earlier query's set. If the user asks for "other", "upcoming", "current", "all", or similar aggregate wording, record which objects were included/excluded at the time of the question, and whether "other" means other than the user's already-known target set or other than the final remaining set. Do not collapse the memory to only the final write result.
      - AGGREGATE REPAIR AFTER PASSED WRITES: When `new_trajectory` says all required writes passed but communication failed because the agent reported only a subset, remaining total, refund total, operation cost, or post-change current total, create/update a communication experience whose Approach explicitly says to restate the broader query-time aggregate before final task completion, even if the user later acknowledged the narrower number. Preserve the exact required literal when visible, and pair it with a generic semantic label such as "the requested total cost/count/status for the query-time in-scope set"; do not hide it behind "all information" or only mention exactness in Reflect.
      - FINAL MESSAGE MUST INCLUDE QUERY-TIME AGGREGATES: For successful write workflows with any prior informational side question, the final customer-facing message before `RETURN_COMPLETED` should restate both operation results and required query-time informational aggregates/literals. If the agent communicated the aggregate earlier but a later user/assistant turn narrowed, contradicted, or replaced it with a post-change remaining/current value, restate the required broader query-time aggregate in the final message.
      - DONE AFTER COMMUNICATION: For failures after successful writes, completion is only valid after the final `communicate_with_user` includes the required aggregate/info literals. Do not create a "missing done" experience if evaluation shows `communicate_checks` failed; the missing communication is the terminal blocker. End the scoped path with `RETURN_COMPLETED` after required communication unless visible evaluation explicitly requires `done()`.
      - RETRIEVAL PRECISION: Include the decisive intent, required tool family, target boundary, and policy gates in 'Situation'. Avoid generic nouns that cause unrelated creation, modification, cancellation/deletion, upgrade, add-on, lookup, and handoff tasks to retrieve the same memory. Every Situation must include one explicit "不适用于" bullet naming at least two nearby but forbidden substitute terminal families when they were plausible in the trace or evaluation.
      - BROAD NEGATIVE TITLE SUPPRESSION: Avoid experience_name/content surfaces equivalent to "requirement unmet", "eligibility check", "business handling", "operation flow", "parameter validation", "policy exception", "mixed request", "multi-object operation", "change assessment", or "general modification" unless the rule is restricted to one concrete terminal write/read family and one evaluated target boundary. If such a title would be retrieved for multiple unrelated families, skip or narrow it.
      - REFLECT DEDUP FORMAT: In `## Reflect`, prefer 1-4 merged bullets. Each bullet should represent exactly one distinct guardrail and contain exactly one pitfall/count marker. Do not place multiple `易错点` / `Pitfall` markers in one bullet. If a new trajectory repeats an existing guardrail with different wording, update the existing bullet instead of appending. If two bullets share the same trigger and forbidden substitute, merge them.
      Example full experience shape:
      ## Situation
      - 仅适用于用户要求处理当前目标对象，且该对象需要先通过读取工具核验资格。
      - 不适用于其他目标对象、其他写入工具族、仅查询任务、已完成终态动作后的补充解释。
      - 必须先满足的政策条件：目标属于当前用户；结构化状态满足该终态工具的资格；若政策要求确认，用户已明确确认。
      - 允许的终态工具：`exact_terminal_tool`。
      - 禁止替代动作：不得调用其他写入工具族；不得用其他对象的资格替代当前目标；不得在资格不满足时继续写入。

      ## Approach
      - [1] `user = get_user_details(user_identifier)`
      - [2] `target = get_reservation_details(reservation_id)`
      - [3] `eligible = target.status 可执行 AND 当前时间 - target.created_at <= 政策允许窗口`
      - [4] IF `eligible == false`
      - [5] THEN `communicate_with_user("说明目标对象不满足政策门槛的结构化原因。")`
      - [6] THEN `RETURN_BLOCKED(reason="policy_gate_not_satisfied")`
      - [7] IF `用户尚未明确确认`
      - [8] THEN `communicate_with_user("请求用户确认是否继续执行该操作。")`
      - [9] THEN `RETURN_BLOCKED(reason="waiting_for_user_confirmation")`
      - [10] `result = exact_terminal_tool(target_id=target.id)`
      - [11] `communicate_with_user("汇报操作结果和所有必需信息。")`
      - [12] `RETURN_COMPLETED`

      - STRICT FORMATTING: Use exactly the 3 headings above in this order. Use concise markdown bullets (-) for every section. In `## Approach`, every bullet must begin with `[N]` step ids as shown above. No numbered lists, no fenced code blocks, no introductory sentences, no conversational filler, and no closing paragraphs. Token efficiency is critical.

    merge_op: replace

  - name: supersedes
    type: string
    description: |
      The experience_name of an existing experience that this one supersedes; when populated, reuse the existing experience_name exactly and do not translate it.
      Set ONLY when this experience replaces a narrower existing experience with a DIFFERENT name.
      The system will automatically delete the old experience and inherit its trajectory history.
      Leave empty for a new experience or when updating an experience with the same name.
    merge_op: replace
