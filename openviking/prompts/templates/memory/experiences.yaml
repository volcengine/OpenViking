memory_type: experiences
description: |
  A generalizable, reusable failure-repair experience distilled from agent execution.
  It exposes clear applicability, one corrective reminder, a short procedure, and anti-patterns.
  It is not a full workflow, success summary, or case log.

directory: "viking://user/{{ user_space }}/memories/experiences"
filename_template: "{{ experience_name }}.md"
enabled: true
operation_mode: "upsert"
agent_only: true
content_template: |
  ## Situation
  {{ situation }}

  ## Reminder
  {{ reminder }}

  ## Procedure
  {{ procedure }}

  ## Anti-pattern
  {{ anti_pattern }}

fields:
  - name: experience_name
    type: string
    description: |
      Name the generalizable failure-repair pattern, not the case.
      Must be written in {{ language }}.
      {% if language == 'en' %}Use lowercase snake_case, max 5 words.{% else %}Use a concise noun phrase, max 15 characters.{% endif %}
      Good: "booking_duplicate_handling", "missing_total_cost", "汇总费用遗漏".
    merge_op: immutable

  - name: situation
    type: string
    description: |
      Write only the bullet body for `## Situation`; the template adds the heading.
      Content must be written in {{ language }}. Keep real tool names, schema fields, identifiers,
      and quoted enum values unchanged. Use exactly these four bullets:
      - Applies when: <runtime-visible task/user/tool-result condition>
      - Does not apply when: <closest non-applicable task pattern, never a temporal stage>
      - Source binding: <user scope, confirmed object, record/set, field, policy text, or calculation>
      - Scope ambiguity: <both labeled scopes when ambiguity is evidenced; otherwise none>
    merge_op: patch

  - name: reminder
    type: string
    description: |
      Write only the bullet body for `## Reminder`; the template adds the heading.
      Content must be written in {{ language }}.
      - <one imperative root-cause lesson describing the minimal behavior change>
    merge_op: patch

  - name: procedure
    type: string
    description: |
      Write only the bullet body for `## Procedure`; the template adds the heading.
      Content must be written in {{ language }}. Use exactly these boundary checks:
      - Before/when <action or communication boundary>: <inspect the decisive runtime fact>
      - If <bad condition>: <block/change one argument, read/ask one fact, or communicate one fact>
      - Else: <proceed without rewriting unrelated workflow steps>
    merge_op: patch

  - name: anti_pattern
    type: string
    description: |
      Write only the bullet body for `## Anti-pattern`; the template adds the heading.
      Content must be written in {{ language }}. Use exactly these bullets:
      - Do not <the tempting wrong behavior>
      - Preserve <the nearest correct behavior/object/action>

      For policy/eligibility repairs, distinguish action eligibility from benefit eligibility only
      when comparison or authoritative outcome evidence demonstrates the separation. A user's
      willingness to forgo a benefit is relevant but is not sufficient by itself to prove an action
      is allowed. If runtime evidence makes benefit eligibility a real prerequisite, preserve that
      gate instead of weakening it.
    merge_op: patch
