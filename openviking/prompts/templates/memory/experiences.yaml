memory_type: experiences
description: |
  A generalizable, reusable failure-repair experience distilled from agent execution.
  It is read by the skill experience loader, so the content must expose clear applicability,
  the minimal corrective reminder, and anti-patterns. It is not a full workflow or a case log.

directory: "viking://user/{{ user_space }}/memories/experiences"
filename_template: "{{ experience_name }}.md"
enabled: true
operation_mode: "upsert"
agent_only: true
content_template: |
  {{ constraint|default(content, true) }}

fields:
  - name: experience_name
    type: string
    description: |
      Name the generalizable failure-repair pattern, not the specific instance.
      Must be written in {{ language }}.
      {% if language == 'en' %}Use lowercase snake_case, max 5 words.{% else %}Use a concise noun phrase, max 15 characters.{% endif %}
      Good: "booking_duplicate_handling", "missing_total_cost", "汇总费用遗漏".
    merge_op: immutable

  - name: constraint
    type: string
    description: |
      Natural-language content must be written in {{ language }}. Keep tool names, schema
      fields, Python identifiers, and quoted runtime values unchanged.

      Output the experience in EXACTLY this 4-section Markdown format. The skill loader
      shows `## Situation` in search results and may load the whole file with
      `read_experience`, so the experience must be understandable without trigger_code.

      ## Situation
      - Applies when: <runtime-visible task/user/tool-result situation where this lesson matters>
      - Does not apply when: <closest nearby but non-applicable situation>
      - Source binding: <which user request scope, confirmed object, retrieved record/set,
        source field, policy gate, calculation, or candidate message content supplies the rule>
      - Scope ambiguity: <if an information/list/aggregate request could mean both the
        originally requested set and a later post-action/current-state set, state both
        scopes and how to label them; otherwise none>

      ## Reminder
      - <one sentence root-cause lesson that changes the next agent behavior>

      ## Procedure
      - Before/when <candidate action or communication boundary>: <check the decisive runtime fact>
      - If <bad condition>: <block/change exactly one argument, ask/read one missing fact,
        or include one required user-visible fact>
      - Else: <proceed without rewriting unrelated workflow steps>

      ## Anti-pattern
      - Do not <the tempting wrong behavior that caused the failure>
      - Preserve <the nearest correct behavior/object/action that must not be blocked>

      Rules:
      - Failure repair only. Do not output generic positive workflows, full SOPs, success-path
        summaries, or case transcripts.
      - One experience covers one reusable root failure pattern. Split unrelated failures; keep
        coupled communication/action scope together only when the same ambiguity causes both.
      - Focus on the first materially outcome-changing mistake and the minimal prevention or
        recovery action at that boundary.
      - Prefer the trajectory's `First Wrong Tool Call`, `First Material Divergence`,
        `Causal Analysis`, `Experience Repair Signal`, and `Counterfactual Ideal Experience`.
        If `Counterfactual Ideal Experience` contains candidates, use only Selected candidate=C1;
        create no experience for Selected candidate=none unless the trajectory independently
        shows a reusable preventable failure.
      - For non-success trajectories, legacy `Action: skip`, `Recommended operation: skip`,
        `Existing target experience: none`, or `Trigger boundary: none` are advisory only; they
        must not suppress a reusable new experience.
      - For successful, case-specific, already-covered, unsupported, or not-preventable failures,
        output no experience changes.
      - If a loaded experience was causal and marked over-broad, misleading, or too weak, update
        that existing experience; otherwise do not patch irrelevant loaded experiences.
      - Do not mention evaluator/control-plane terms such as evaluation, evaluator,
        communicate_checks, action_checks, db_check, reward, rubric, 评估, or 奖励 in runtime
        content. Rewrite them into runtime facts: user request, retrieved records, source fields,
        policy gate, calculation, or required user-visible message.
      - Preserve object boundaries. A user's yes to the agent's over-broad proposal is not proof
        that the user independently requested extra objects/actions.
      - For communication failures, bind required facts to their source: requested scope, frozen
        record/set membership, included/excluded records, source field, derivation, later-write
        effect, selected object, or policy gate. Avoid vague reminders like "include all required
        information".
      - For information, aggregate, list, summary, or value requests, preserve the user-requested
        source scope at the moment the request is made. Later write actions may create a second
        "post-action/current remaining state" scope, but they must not silently replace the
        original requested scope.
      - If the user's wording is ambiguous between the original requested set and a post-action
        remaining/current-state set, the experience should instruct the future agent to include
        both scopes with explicit labels, not only the narrower post-action scope.
      - State when the scope is frozen, the semantic roles included/excluded, the source fields
        used for derivation, and whether later writes change the previously requested scope.
      - Do not encode dataset-specific values, IDs, amounts, or domain names in the reusable rule;
        express the lesson as source-scope binding, freeze point, included/excluded object roles,
        and later-write effect.
      - For same-tool near misses, `Situation` and `Anti-pattern` must state the discriminator
        that separates the wrong candidate from the correct one.
      - Keep the experience concise: no setup chatter, no policy dumps, no full paths, no raw IDs,
        no hidden answers. Use semantic roles instead of case literals.
      - Use imperative, machine-readable bullets. No introductory or closing paragraphs.

    merge_op: patch
