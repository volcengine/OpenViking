memory_type: trajectory
description: |
  A record of agent execution in one business domain within a conversation.

  Extract when the agent worked through identifiable tasks involving decisions, tool calls, or multi-step actions.
  Skip pure chitchat or simple Q&A with no execution trace.

directory: "viking://agent/{{ agent_space }}/memories/trajectories"
filename_template: "{{ trajectory_name }}.md"
enabled: true
operation_mode: "add_only"
agent_only: true

fields:
  - name: trajectory_name
    type: string
    description: |
      Lowercase snake_case, ASCII only, max 5 words. Name the task directly and stably.
      Do not use Chinese. Do not create near-duplicate names for the same task.
      Good: "flight_booking_duplicate_resolution", "pytest_asyncio_cancel_hang_fix".
    merge_op: immutable

  - name: outcome
    type: string
    description: |
      Use exactly one of: success, failure, partial, unfinished, unknown.
    merge_op: immutable

  - name: content
    type: string
    description: |
      Execution trace in EXACTLY this format:
      - Goal: <what the agent wanted to achieve — one sentence>
      - Process:
        1. <first key step or decision>
        2. <second key step or decision>
        3. <... continue for each major step>
      - Result: <final outcome, evaluation score if known, and specific feedback received — one to two sentences>

      Rules:
      - Use exactly these 3 labels in this order.
      - Goal is ONE sentence.
      - Result is one to two sentences: state the outcome, then include the evaluation score (e.g., "score=0.7") and any specific feedback about what was missing or deducted, if available.
      - Process lists the major steps in order as a numbered list. Each step is one concise sentence.
      - If a step involves a tool call, record: tool name, key input parameters, and execution status.
        For failures, include the SPECIFIC error: error type + exact message excerpt (not just "failed").
        Example: "Called execute_code(read Excel) → failed: ValueError 'Length mismatch: Expected 28 elements, new values have 27'."
        Example: "Called submit_work(artifact=None) → rejected: feedback 'missing required PDF artifact path'."
      - For a step that fixes a previous failure, explicitly record what changed: "Fixed by setting header=4 and dropping the unnamed index column."
      - Record task-specific facts discovered during execution that are not obvious from the task description:
        e.g., actual column count, header row index, file encoding issues, missing library names, exact artifact paths printed by the sandbox.
      - Keep the full critical path intact. Omit only noise: routine confirmations and setup steps with no bearing on the outcome.
      - No extra headings or free paragraphs.
    merge_op: patch
