memory_type: entities
description: |
  Wikipedia article - manages page using Zettelkasten method.
  Each page represents an article with relative path links to events.
  Entity should be rich and distributed - avoid putting all info in one entity.
directory: "viking://user/{{ user_space }}/memories/entities"
filename_template: "{{ category }}/{{ name }}.md"
enabled: true

overview_template: |-
  # Entities Overview
  {% if items %}**Category:** {{ items[0].file_content.category }}{% endif %}
  {% for item in items %}
  - [{{ item.file_content.name }}](./{{ item.file_name }})
  {% endfor %}

fields:
  - name: category
    type: string
    description: |
      - Category name in Chinese or English. If English, use lowercase with underscores, max 3 words.
    merge_op: immutable

  - name: name
    type: string
    description: |
      - Entity name in Chinese or English. If English, use lowercase with underscores, max 3 words.
    merge_op: immutable

  - name: content
    type: string
    description: |
      - Detailed Zettelkasten card content in markdown format
      - **IMPORTANT**: Each bullet point should include specific details, NOT vague summaries.
        Record WHAT was created/done (specific subjects, items, titles), not just that something was done.
        Examples:
        - "Made a black and white bowl, a plate, and a cup with dog face" NOT just "Made pottery"
        - "Plays clarinet and violin" NOT just "Plays an instrument"
        - "Important symbols: Rainbow flag, transgender symbol" NOT just "Important symbols"
      - **IMPORTANT**: When an entity page lists multiple items of the same type (books read,
        art created, activities done, items bought), add a complete list summary line at the top:
        # Books Melanie Has Read
        Complete list: Charlotte's Web, Nothing is Impossible
        - Charlotte's Web: childhood favorite, about friendship and compassion
        - Nothing is Impossible: read in 2022
        # Art Melanie Has Created
        Complete list: horse painting, sunset painting, sunrise painting
        - Horse painting: captures grace and strength
        - Sunset painting: inspired by sunsets, calming colors
      - **IMPORTANT**: Preserve specific descriptions verbatim — exact poster text, sign contents,
        specific feelings, specific item descriptions. Do NOT replace with vague summaries.
        - "posters saying 'Trans Lives Matter'" NOT "amazing posters"
        - "a sign stating someone is not being able to leave" NOT "a thoughtful sign"
        - "a cup with a dog face on it" NOT "their own pots"
        - "felt grateful and thankful for her family" NOT "reminded life is precious"
      - **For person entities**: This is a DETAILED entity page, NOT a duplicate of the profile.
        Focus on this person's relationships, interactions with other people.
        The profile stores flat attributes; the person entity stores relational
        and contextual information.
      - Example:
      # Pottery
      Complete list of items made: black and white bowl, plate, cup with dog face
      - Melanie takes pottery classes (as of 2023-07-03)
        - Made a black and white bowl, a plate, and a cup with dog face
      - Got injured Sep 2023, taking break
      - Caroline interested in trying pottery (as of 2023-09-13)

    merge_op: patch
