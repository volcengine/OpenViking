memory_type: entities
description: |
  Wikipedia article - manages page using Zettelkasten method.
  Each page represents an article with relative path links to events.

directory: "viking://user/{{ user_space }}/memories/entities"
filename_template: "{{ category }}/{{ name }}.md"
enabled: false

fields:
  - name: category
    type: string
    description: |
      - Category name in Chinese or English. If English, use lowercase with underscores, max 3 words. Do not include any dates.
    merge_op: immutable

  - name: name
    type: string
    description: |
      - Entity name in Chinese or English. If English, use lowercase with underscores, max 3 words. Do not include any dates.
  
      ### Good Examples
      emergency_department
      cough_symptom

      ### Bad Examples
      progressive_memory_loss_with_personality_change  // Too long, max 3 words
    merge_op: immutable

  - name: content
    type: string
    description: |
      - Detailed Zettelkasten card content in markdown format
      Relative path format: ../entities/entity_name.md
      - Example: [skin_itching](events://{event_name}) 
      - Cards should be rich and distributed - avoid putting all info in one card.
    merge_op: patch
