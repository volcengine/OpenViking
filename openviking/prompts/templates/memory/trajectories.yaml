memory_type: trajectories
description: |
  输出语言策略：生成性自然语言必须使用 {{ language }}，包括名称、检索锚点、摘要、要点和分析内容。若原始内容多语言，以当前用户任务的主语言作为 {{ language }}；不明确时使用最新用户消息的语言。固定 schema 标题、工具名、API/function 名、evaluation 字段名、enum 值、代码标识符、ID、金额、日期、路径和必要的用户原文关键字面量必须保留原文。更新已有 memory 时优先复用已有名称和语言风格，避免创建同义翻译副本。

  本模板用于从 agent 任务轨迹中提炼一个紧凑、可复用的操作契约。
  当 agent 处理了包含决策、工具调用或多步骤动作的明确任务时才提取；纯闲聊或没有执行轨迹的简单问答不要提取。
  
  单任务边界：每个最新 rollout/task 最多创建一个 trajectory。只把最新 rollout 作为新 memory 的来源。系统 policy 和通用领域规则不能单独作为抽取来源；但当当前用户请求、工具观察、action/evaluation delta 或终态决策依赖某个 policy eligibility gate 时，必须把对应 policy 作为判断当前轨迹的上下文证据。忽略 retrieved memory_context、Experience Reminder、candidate/source memories 和历史 archive overview，不要从这些内容中抽取新 trajectory。不要把每条 policy、每次工具调用、召回 memory 或假设任务拆成单独 trajectory。

embedding_template: |-
  {{ trajectory_name }}

  {{ retrieval_anchor }}

directory: "viking://user/{{ user_space }}/memories/trajectories"
filename_template: "{{ trajectory_name }}_{{ extract_context.get_session_timestamp() }}.md"
enabled: true
operation_mode: "add_only"
stage: agent
peer_enabled: false
fields:
  - name: trajectory_name
    type: string
    description: |
      直接、稳定地命名任务。
      新生成名称必须使用 {{ language }}。
      {% if language == 'en' %}Use lowercase snake_case, max 5 words.{% else %}使用简洁自然的 {{ language }} 名词短语，最多 15 个字符。{% endif %}
      不要为同一任务创建近似重复名称。
      好例子："重复请求处理"、"异步任务挂起修复"、"补偿对象错绑"。
      优先表达可复用的操作或决策边界，而不是照抄用户开场请求。
    merge_op: immutable

  - name: outcome
    type: string
    description: |
      只能使用以下值之一：success, failure, partial, unfinished, unknown。
    merge_op: immutable

  - name: retrieval_anchor
    type: string
    description: |
      为该 rollout 分析生成正向语义检索文本；它面向 embedding，而不是展示。
      自然语言部分使用 {{ language }}；固定 enum 值、工具名和 evaluation 字段名保留原文。
      建议格式："意图: <booking|modification|cancellation|baggage|upgrade|refund_compensation|lookup|transfer|multi_intent|other>; 阶段: <opening|after_read|before_write|after_write|terminal_handoff|final_response|evaluation_failure|evaluation_success>; 终态动作: <required final tool family or none>; 禁止替代: <tool/action that must not replace the terminal action or none>; Policy gates: <eligibility/confirmation/object-binding checks>; 失败模式: <none, missing expected action, wrong target, wrong args, premature handoff/done, policy mismatch, or other>; 目标: <primary object or write/read boundary>."

      规则：
      - 比 content 更短、更聚焦检索。
      - 若当前 trace 中存在 runtime 可见的 policy/object gate，retrieval_anchor 必须写这些 gate，不得出现 `训练oracle`、`ground_truth`、`oracle`、`预期动作列表`、`结构化评测`、`evaluation says query-only` 等 hidden-evaluation 词。
      - 结构化评测场景中，anchor 必须匹配当前 case 的主 intent 和终态动作族；不得锚定只出现在 retrieved memories、Experience Reminder、candidate_source_trajectory、policy 文本或历史样例里的 intent/tool family。
      - 使用正向适用条件描述该分析应在何时被检索。
      - 包含决定性的用户意图、终态工具族、policy gate、失败/成功模式和目标边界，不要包含原始 case id。
      - 用“禁止替代”标明有害近似流程，例如用取消+重建替代原地 update、用 handoff 替代可处理工具流，或用 communicate/done 替代必需的状态变更动作。
      - 当可复用 lesson 只有在读取、核验、失败或终态边界后才成立时，不要照抄开场请求；应锚定实际建立的条件。
      - 泛化 identifiers、姓名、精确数字、日期、地点、金额和原始 tool payload；稳定 policy 常量或必要工具名除外。
    merge_op: immutable

  - name: content
    type: string
    description: |
      生成以“反思”为主体的 rollout trajectory 分析。目标不是复述全过程，而是沉淀一个可被未来 agent 检索、理解和执行的核心教训。必须严格使用以下格式。自然语言全部使用 {{ language }}，下面的 section 标题必须原样保留；工具名、API 名、evaluation 字段名、enum 值、代码标识符和必要原文 literal 保留原文。
      # Evaluation 信号
      - Outcome: <success|failure|partial|unfinished|unknown>.
      - Reward: <可见 reward/score/pass status；若不可见则写 evaluation not visible>.
      - DB/Communicate: <可见 db_check、communicate reward 或其他 evaluation breakdown>.
      - Key expected signal: <最重要的 action_check、Communicate Info、NL Assertion、missing write、wrong args，或 none/unknown；这里可以引用 evaluation/ground_truth 作为证据。>

      # Expected vs Actual
      - Expected: <evaluation/action_checks 期望的 tool/action sequence 和关键参数；实例本地信息需泛化>.
      - Actual: <实际轨迹中的 tool/action sequence 和关键参数>.
      - Delta: <missing action、wrong target object、wrong amount/count/status、extra action、premature handoff/done，或 no material delta>.

      # 实际执行路径
      - Tool path: <按时间顺序列出真实发生的关键工具调用；包括读取了哪些 experience，以及主要业务工具调用；不要写模型“打算做什么”，只写实际 trace 里发生了什么。>
      - Business path: <用一句话概括实际业务路径，例如“读订单 -> 转人工 -> 未执行 expected write”或“读订单 -> 升级 -> 取消 -> 漏沟通聚合值”。>

      # 经验步骤对齐
      - Experience: <实际读取的 experience 名称或 uri；如果没有读取 experience，写 none。>
        - Applied: <yes/no/unclear/misleading/ignored>.
        - 从头连续走过的步骤: <如果 experience 的 Approach 有 `[1]` `[2]` step id，写从 `[1]` 开始连续匹配到的步骤列表，如 `[1, 2, 3]`；如果没有匹配到 `[1]`，写 `[]`；如果该 experience 没有 step id，写 unavailable。>
        - 分支判断结果: <列出实际走到的 IF 步骤及结果，例如 `[4]=true`、`[7]=false`；如果 trace 不足以判断，写 `[N]=unknown`。>
        - 每步结果: <用短列表写关键 step 的结果，例如 `[1]=done`, `[2]=done`, `[4]=false`, `[5]=skipped`, `[8]=executed`, `[9]=blocked`, `[10]=not_reached`。只写对 reward/偏离有用的步骤，不要冗长。>
        - 第一个未走到或偏离步骤: <如 `[4]`；如果完整走完写 none；无法判断写 unknown。>
        - 偏离说明: <一句话说明该步骤要求什么、实际做了什么；如果 agent 按经验走完但仍失败，说明该 experience 可能是 misleading/over-broad/conflicted with evaluation/tool facts。>

      # 事实链与偏离
      - User/task intent: <用户试图完成什么>.
      - Decisive tool facts: <决定性字段，例如 status、count、membership、insurance、lifecycle state、ownership、timestamp arithmetic 或 policy eligibility>.
      - Correct target/path: <最符合 evaluation 和已核验 tool facts 的对象/动作>.
      - Wrong target/path: <agent 错误走向的对象/动作，如有；无则写 none>.
      - First critical deviation: <按时间顺序写第一个导致结果变化的读取/决策/动作偏离；不要只写最后症状>.

      # 失败机制
      - 失败/成功关键: <用一句话说明直接影响 reward 的第一个关键步骤；success 时说明保持成功的关键。>
      - 决策原因: <解释为什么 agent 会走错或走对：忽略了哪个 runtime 可见规则、tool fact、policy gate、用户确认、对象绑定或通信要求；不要写隐藏思维过程，不要只说“忽略了评测要求”。>
      - 记忆影响: <说明检索/注入的经验是 missing、irrelevant、over-broad、misleading、ignored、too weak、only solved secondary issue、necessary、helpful-but-not-necessary 或 irrelevant，并点名具体规则类型。>
      - 经验修正: <说明应新增/更新/跳过哪一种 experience：同一 intent + 同一 terminal tool family + 同一 policy gate；若只支持负面教训，写 Reflect-only，不写正向流程。>
      
      # 关键反思
      - 核心教训: <用一句话概括本次成功/失败最值得复用的反思； 比如： “前客服承诺 != cancel 授权；无 refund 接受 != 可取消”>
      - 对于失败的决策: <决策需要满足的条件，和实际没有达成，且被忽视的条件>
      - 对于漏执行的决策: <决策需要满足的条件，实际以为没有达成的条件>

      # 正确做法
      1. <正确的下一步读取/核验，如需要；用 runtime 可见事实驱动，不依赖未来 agent 看见 oracle。>
      2. <对误导性用户说法、候选对象和 tool facts 的正确解释；需要时包含 gate 计算方法。>
      3. <正确的终态 tool/action call 或 final response boundary；包含泛化后的关键参数；需要时明确 cancel/book/handoff/done 不得替代 expected terminal action。>

      # 泛化规则
      - <只写一条最关键、最可复用的规则，用于未来 agent 避免该失败或保持该成功；不要列第二条或第三条，除非当前 outcome 是 success 且确有独立必要规则>.

      规则：
      - Failure-mechanism section：使用 `# 失败机制`，不要输出 `# 思维链`。这里只写可审计的失败/成功机制、决策原因、记忆影响和经验修正，不写隐藏推理过程或长篇复盘。
      - Reflection-first：`# 关键反思` 是主体，不是摘要。它必须承载最重要的可复用 lesson；后续 section 只提供证据、边界和执行修正。失败/错误 trajectory 的反思只记录第一关键规则，不顺带记录额外查询、措辞、冗余步骤等次要问题。若有多个问题，按影响排序选择一个：expected/forbidden write > wrong target/args > missing required communication > premature done/handoff > 其他。
      - Scope/source：每个最新 evaluated task 最多抽取一个 trajectory。所有判断必须落在当前用户请求、实际工具调用/输出、assistant 动作、可见 CaseSpec/ground_truth/evaluation 上。不要从 retrieved memories、Experience Reminder、candidate/source memories、历史样例或无关 policy sections 抽取。system/domain policy 只用于判断与当前观察事实绑定的 policy gate。
      - Evidence priority：Expected vs Actual 优先使用 evaluation/action_checks/CaseSpec 作为 oracle。即使最终 report 很稀疏，CaseSpec 的 `Actions`、`Communicate Info`、NL Assertions 也算证据。保留精确 evaluated/actual tool names。之后依次使用 tool facts、policy、user self-report。
      - Root-cause audit：必须先用可见证据找“第一个改变 reward 的决策点”，再写 trajectory；不要复述全流程。先按 outcome、terminal tool/action、DB/Communicate、first divergent action 对当前 trace 分桶。若 state-changing tool 返回成功但 DB failed，优先诊断 forbidden write、wrong target、wrong args；不得归因于缺少 done、缺少 post-write verification、工具成功但环境异常，除非 evaluation 明确支持。对 policy-gated write，必须从 tool outputs 重建 gate：ownership/status、完整 timestamp arithmetic、cabin、insurance、reason、airline-cancelled、confirmation/refund；用户或客服口头说法不能覆盖 policy + tool facts。若存在 sibling rollouts 或 group summary，必须比较 PASS vs FAIL 的最小差异；只沉淀能解释多数失败的一个核心规则。若 retrieved experience 与当前 tool facts/evaluation 冲突，标记为 misleading 或 over-broad，不得把它当结论。输出时按“结论 -> 证据 -> 反事实 -> 修正规则”写进既有 section，不新增标题。
      - Fix only the failed part：先分清“哪些步骤已经被结果证明是对的”和“真正失败/缺失/不一致的点”。做对的地方不要反着学：已通过的读/写/业务步骤不能写成 forbidden，也不能被总结成以后要拒绝、转人工、换路径。若业务路径已成立，只是最终回复少说或说错信息，主因只能写 missing/wrong communication，并保留原业务路径为正确路径。
      - Actual path extraction：`# 实际执行路径` 只能来自真实 trace/tool calls。按时间顺序列关键路径，优先保留 `read_experience`、state-changing tools、handoff/done、以及决定 reward 的 `communicate_with_user`；可以省略重复闲聊和无影响重试。不要根据经验内容或 agent 自称补写没有实际发生的工具调用。
      - Experience step alignment：如果当前 trace 读取了一个或多个 experience，`# 经验步骤对齐` 必须逐个列出。对每个 experience，只匹配 `## Approach` 里带 `[1]`、`[2]` 这种编号的步骤；从 `[1]` 开始找连续前缀，第一处没做、换工具、换对象、换返回语义或反向执行的位置就是“第一个未走到或偏离步骤”。不要把后面偶然出现的相似工具算进“从头连续走过”。如果 agent 基本照着某经验走完但 reward 失败，明确写“经验本身可能误导/过宽/与 evaluation 或 tool facts 冲突”，不要把责任写成 agent 没用好经验。
      - IF result extraction：当 experience 的 Approach 有 `- [N] IF <condition>` 时，必须尽量从实际 tool facts、assistant messages 和后续工具调用判断该 IF 的结果。若后续执行了对应 `THEN` 步骤，通常写 `[N]=true`；若跳过 THEN 并继续后续主路径，通常写 `[N]=false`；若证据不足，写 `[N]=unknown`。同时在“每步结果”里标出相关 THEN/ELSE 步是 `executed`、`skipped`、`not_reached` 或 `deviated`。
      - Memory effect audit：如果当前 trace 实际读取/注入了 memory_context、task_case_experience、retrieved memories 或 candidate memories，必须评估该记忆对 outcome 的作用。若 outcome 是 failure/partial/unfinished，必须在 `# 关键反思` 或 `# 事实链与偏离` 中说明记忆为什么没起作用：missing、irrelevant、over-broad、misleading/stale、ignored、too weak、conflicted with policy/tool facts、或 only solved a secondary issue。若记忆内容与当前 tool facts/evaluation 冲突，必须标为 misleading/over-broad，不得继续把该记忆沉淀成正向 Approach。若记忆被遵守但仍失败，必须指出“该记忆只覆盖了次要问题”，并重新定位真正决定 reward 的 first critical deviation。若 outcome 是 success，简短说明记忆是 necessary、helpful-but-not-necessary，还是 irrelevant；不要过度归因。不要泛泛写“没有充分利用记忆”；必须引用具体记忆规则和实际偏离动作。
      - `# 关键反思` 必须回答：为什么这个 reward 失败/成功，而不是 agent 自认为哪里做得好。核心教训必须能解释 DB/Communicate 的主失败信号。
      - Oracle-to-runtime mapping：在 retrieval_anchor 和面向未来 agent 的 sections（`# 关键反思`、`# 适用边界`、`# 事实链与偏离`、`# 正确做法`、`# 泛化规则`）中，只要当前 trace 暴露了 runtime 可见 gate，就必须把 hidden oracle 约束转译成这些 gate：status、ownership、timestamp arithmetic、cabin/membership/insurance、eligibility、confirmation、refund 或 object binding。硬性禁止在这些位置出现 `ground_truth要求仅查询`、`训练oracle要求`、`oracle明确要求`、`预期动作列表`、`结构化评测场景`、`evaluation says query-only` 等 hidden-evaluation 词。此类词只能出现在 `# Evaluation 信号` 或 `# Expected vs Actual`。若没有可观察 gate 能解释边界，则写 non-generalizable/evaluation-only，不要产出 agent-facing 泛化规则。
      - Write/action deltas：若 expected actions 要求某个 state-changing tool 但 actual 漏掉或参数错，诊断该 exact missing/wrong write，并保留 evaluated sequence；不要替换成更严格拒绝、handoff、cancel-and-recreate 或不同 tier/tool。若 expected actions 只有 read/refusal/communication，但 actual 做了 state-changing tool 且 DB failed，则该 write 是 forbidden substitute；不要因为 tool returned success 就归结为缺少 post-write verification、`done` 或 environment mismatch。Tool success 只证明 write 已执行。
      - Communication deltas：若 evaluation/CaseSpec 要求 customer-facing `Communicate Info` 或 NL Assertions，把精确 required literals 及其语义标签带入 `DB/Communicate`、`Expected vs Actual`、`事实链与偏离` 和 `正确做法`。对 aggregate values，从用户回合和 tool facts 推导 query-time inclusion set 与 time boundary；后续写操作（取消、修改、删除、创建）不得静默改变先前查询的集合语义。不要用 refund total、fee total、subset total、operation cost、post-change remaining total 或 post-change current total 替代用户当时请求的 aggregate。若用户说 "other/current/upcoming/all" 等相对词，必须说明其相对于用户当时目标集合还是最终剩余集合。若只有 communication failed，主 delta 是 missing/wrong communication，不是 missing write、forbidden write、拒绝/转人工缺失或 `done`；必须先 communicate required items，再 `done`。
      - Policy-gated decisions：先从 tool outputs 重建事实链，再判断 policy；用户说法或 prior-support approval claims 不能覆盖当前 policy + tool facts。航空取消/退款场景中，在批准或调用 `cancel_reservation` 前，必须核验无已飞航段，并至少满足一个 allow-cancel gate：用完整 timestamp arithmetic 判断预订在 24 小时内、航司取消、business cabin，或有 travel insurance 且 reason covered。若全部 gate 都不满足，正确终态是 refusal/communication 或 policy-specified handoff，`cancel_reservation` 是 forbidden。不要写“通用政策显示可行但 oracle 禁止”；如果 timestamp/cabin/insurance/reason/airline-cancel facts 已显示不可取消，就写 policy 本身不可取消。
      - Generalization discipline：`retrieval_anchor`、`# 关键反思`、`# 正确做法`、`# 泛化规则` 必须泛化人名、reservation/order id、路线、精确日期、金额、路径和 raw payload；只有 `# Evaluation 信号`、`# Expected vs Actual` 或必要证据可以保留 source literal。
      - Consistency check：`Outcome`、`Expected vs Actual`、`Delta`、`First critical deviation`、`# 关键反思` 必须互相一致。若 Actual 已完成 Expected 的关键动作，不要把同一动作写成 missing；重新定位真正 delta，或写 `no material delta` 并避免生成泛化规则。
      - Output discipline：严格保留九个 required headings 及顺序；不要加额外标题或结尾语。内容要密集、反思优先、证据从属。泛化姓名、ID、精确日期/金额/路线、路径和原始 payload；稳定 policy 常量或执行所需 exact tool/evaluation names 除外。只提当前 trace/evaluation 中存在的工具。

      Few-shot focus examples（用来校准 `# 关键反思` 的主因选择；不要照抄标签，要按当前 trace 改写）：
      - Forbidden cancellation write：反思主体写“核心教训: 取消前必须满足至少一个 allow-cancel gate；当工具事实显示 economy/no insurance/change-of-plan/no airline cancellation 且完整 timestamp arithmetic 超过 24h 时，`cancel_reservation` 是 forbidden write。违反的实际规则/成功关键: 用户/前客服口头批准不能覆盖 policy + tool facts。错误推理或风险: agent 把口头批准或错误 24h 判断当成取消资格。修正原则: 先逐项核验 gate，不满足时拒绝/沟通或按 policy handoff。”不要写“ground_truth要求仅查询”。
      - Communication-only failure：反思主体写“核心教训: 最终沟通必须覆盖用户/evaluation 要求的聚合语义和 literal。违反的实际规则/成功关键: 业务路径已成立时，主风险是用 refund/remaining/subset total 替代 total cost，或漏说用户要求的信息。错误推理或风险: agent 把相关金额当成同义聚合值。修正原则: `done` 前按正确 inclusion set 与 time boundary 传达 required literal。”不要把已通过的业务步骤写成 forbidden，也不要把 missing write、拒绝/转人工缺失或 missing `done` 诊断为主因。
      - Missing expected write：反思主体写“核心教训: 已满足 update 前置条件时必须调用 exact `update_reservation_flights`。违反的实际规则/成功关键: evaluated sequence 要求 reads/pricing/confirmation 后执行该 write。错误推理或风险: agent 用 refusal/handoff/cancel-and-rebook 替代 expected write。修正原则: 保留 exact tool family 和 evaluated sequence，不得换工具或换路径。”

    merge_op: patch
