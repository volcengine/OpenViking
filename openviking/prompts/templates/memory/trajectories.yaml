memory_type: trajectories
description: |
  Extract a compact SkillOpt-style trajectory analysis whose primary purpose is to propose
  the minimum reusable runtime experience that would make the next similar session succeed.

  This is not a verbose audit log. Treat each candidate as a counterfactual prevention
  hypothesis: if injected before the first preventable wrong decision, it should change the
  agent's behavior enough to avoid the failure while preserving correct behavior. Prefer one
  causal lesson that is source-bound, runtime-actionable, generalizable, and safe to inject.
  Do not hardcode case literals, do not duplicate existing coverage, and output no candidate
  when no bounded runtime patch would prevent recurrence.

embedding_template: |-
  {{ trajectory_name }}

  {{ retrieval_anchor }}

directory: "viking://user/{{ user_space }}/memories/trajectories"
filename_template: "{{ trajectory_name }}_{{ extract_context.get_session_timestamp() }}.md"
enabled: true
operation_mode: "add_only"
agent_only: true

fields:
  - name: trajectory_name
    type: string
    description: |
      Name the reusable lesson or audited boundary directly.
      Must be written in {{ language }}.
      {% if language == 'en' %}Use lowercase snake_case, max 6 words.{% else %}Use a concise noun phrase, max 18 characters.{% endif %}
      Prefer the experience-worthy boundary over the broad task name.
      Good: "named_scope_no_substitution", "aggregate_scope_freeze", "cancel_once_then_book", "点名范围不替代".
    merge_op: immutable

  - name: outcome
    type: string
    description: |
      Use exactly one of: success, failure, partial, unfinished, unknown.
      success means the task's required state/actions and required communication were completed.
      failure means a material requirement failed.
      partial means some important work succeeded but one material requirement failed.
      unfinished means the task stopped before the necessary terminal action/answer.
      unknown means the evidence is insufficient.
    merge_op: immutable

  - name: retrieval_anchor
    type: string
    description: |
      Positive semantic retrieval text for embedding, not display.
      Format exactly:
      "Stage: <opening|after_read|before_confirmation|before_write|after_write|final_response|terminal_handoff>; Boundary: <runtime condition>; Capability: <operation/check/communication>; Target: <semantic object role>; Outcome: <success|failure|partial|unfinished|unknown>."

      Generalize identifiers, names, exact amounts, dates, task numbers, and raw payload values.
      Anchor on the condition where the future reminder should trigger.
    merge_op: immutable

  - name: experience_effects
    type: string
    description: |
      Machine-readable JSON object about injected experience reminders.
      Output ONLY a valid compact JSON object, not markdown and not a code block.

      Required shape:
      {"positive_ids":["E1"],"negative_ids":[],"weak_ids":[]}

      If no experience reminder was injected, output exactly:
      {"positive_ids":[],"negative_ids":[],"weak_ids":[]}

      positive_ids: injected experiences that were necessary/helpful.
      negative_ids: injected experiences that were misleading or over-broad.
      weak_ids: injected experiences that were relevant but insufficient.
      Use only IDs from the injected list. Do not invent IDs.
    merge_op: immutable

  - name: content
    type: string
    description: |
      Write in {{ language }}. Keep raw tool names, schema keys, and quoted runtime values unchanged.

      You are an expert SkillOpt-style failure-analysis agent for AI agent tasks.

      You will be given ONE agent trajectory, the task outcome, and any injected experience
      reminders. Your job is to identify the minimum reusable experience that would make the
      next similar session succeed if it were injected before the first preventable wrong
      decision.

      ## Analysis Process
      1. Read the whole trajectory before writing.
      2. Decide whether the trajectory is a failure, partial failure, unfinished run, success, or
         unknown.
      3. For failures, locate the first preventable wrong decision: the earliest boundary where
         a reminder could have changed a tool call, missing tool call, confirmation, calculation,
         policy branch, write action, communication, final response, or handoff.
      4. Diagnose the mistaken runtime rule the agent used at that boundary: wrong scope,
         object binding, policy branch, calculation, confirmation assumption, ordering, or
         communication obligation. Do not stop at the symptom.
      5. Propose at most ONE candidate repair: `Candidate C1`.
      6. Candidate C1 must be a counterfactual prevention experience: it must trigger from
         visible runtime facts before the wrong decision, replace the mistaken rule, state what
         future behavior changes, and explain why the next similar session would succeed.
      7. Do not learn a full workflow. Patch only the missing rule/check/communication that would
         change the first preventable wrong decision.
      8. Do not duplicate existing experience reminders. If an injected reminder was helpful,
         weak, or misleading, reflect that in the `experience_effects` field and choose
         validate/update/none accordingly.
      9. If no bounded reusable candidate would actually prevent recurrence, set
         `Selected candidate: none` and `Recommended operation: skip`.

      ## Output Format
      Output exactly ONE markdown record with the labels below. Do not add extra top-level sections.

      # <trajectory_name>
      - Outcome: <success|failure|partial|unfinished|unknown>
      - Domain: <task/tool domain>
      - User Goal: <generalized user goal, no task id>
      - Failure Summary:
        - Failure type: <wrong_arguments|wrong_object|wrong_policy_branch|missing_confirmation|missing_communication|premature_write|extra_write|premature_done|tool_error|success_pattern|none>
        - Count: 1
        - Description: <one-line reusable pattern, not case-specific>
      - Runtime Facts:
        - User obligation: <request/confirmation that creates the obligation, or none>
        - Tool/policy facts: <visible runtime facts needed for the rule, or none>
        - Correct work to preserve: <correct actions/reads/messages this lesson must not block, or none>
        - db_check: <passed|failed|unknown>
        - action_checks: <passed|failed|unknown>
        - communicate_checks: <passed|failed|unknown>
      - First Wrong Tool Call:
        - Step: <raw step id, final_response, expected_missing_tool, or none>
        - Tool: <one raw tool name, communicate_with_user, or none>
        - Error type: <missing_expected_tool|missing_communication|wrong_arguments|wrong_object|wrong_policy_branch|premature_write|extra_write|premature_done|tool_error|none>
        - Candidate shape: <generalized risky candidate_tool_args/content shape, or none>
        - Missing check: <mistaken runtime rule or single missing runtime fact/policy gate/object binding/calculation/confirmation/communication, or none>
        - Expected behavior: <what should have changed at that boundary so the session would succeed>
      - Counterfactual Ideal Experience:
        - Candidate C1:
          - Situation: <visible runtime condition where the reminder should fire, or none>
          - Repair rule: <minimal source-bound rule that replaces the mistaken runtime rule, or none>
          - Experience name: <lower_snake_case or concise name, or none>
          - Injection boundary: <opening|after_read|before_confirmation|before_write|after_write|final_response|none>
          - Runtime experience content:
            <complete production-style experience block, or none>
          - Source binding:
            - Scope freeze point: <when object set/value/decision becomes fixed, or none>
            - Included records: <semantic roles included, or none>
            - Excluded records: <semantic roles excluded, or none>
            - Source field: <runtime fields/text/tool outputs to read, or none>
            - Derivation: <how to compute/select/verify using visible facts, or none>
            - Later write effect: <whether later writes change a previously requested value/scope, or none>
            - Ambiguous alternate scopes: <if wording could mean original requested scope and
              post-action/current remaining scope, name both labels; otherwise none>
            - Confirmation binding: <which user confirmation authorizes which write objects, or none>
          - Applicability: <exact runtime shape where C1 applies>
          - Anti-pattern: <tempting broad or wrong-scope lesson not to learn>
          - Preserve: <specific correct behavior this experience must preserve>
          - Why this would help: <trigger -> changed future behavior -> why the next similar session succeeds>
        - Selected candidate: <C1|none>
      - Experience Repair Signal:
        - Recommended operation: <create|update|validate|skip>
        - Existing target experience: <name or none>
        - New experience action: <create|none>
        - Trigger boundary: <same tool/boundary as First Wrong Tool Call.Tool, final_response, or none>
        - Repair principle: <C1 repair in one sentence, or none>
        - Reject over-broad lesson: <tempting broad rule that should not be learned>
        - Reject wrong-scope lesson: <nearby non-causal or wrong-scope rule that should not be learned>
      - Case Evidence:
        - Diagnostic literals: <ids/values/tool args only as evidence, or none>
        - Observed wrong behavior: <what happened, or none>
        - Observed correct behavior: <what worked, or none>
      - Result: <final outcome and side effects>

      ## Runtime Experience Content
      When `Selected candidate: C1` and the recommended operation is create/update/validate,
      `Runtime experience content` must be a directly injectable production reminder, not an
      explanation or case audit. It should tell the future agent what mistaken decision to avoid
      and what runtime check/rule would make the next similar session succeed. Use this shape:

      # <experience_name>

      当 <reusable runtime situation> 时，必须 <core strategy>。

      ## 规则
      1. <actionable rule bound to visible runtime facts>
      2. <actionable rule bound to visible runtime facts>
      ...

      目标是避免 <closest tempting wrong behavior>，从而在相似场景中完成用户目标。

      If {{ language }} is English, write the same structure in English. If no candidate is
      selected, write `Runtime experience content: none`.

      ## Selection Rules
      - Failure-driven candidates take priority. For failure/partial/unfinished trajectories,
        choose create or update only when a narrow runtime reminder would likely have prevented
        the first preventable wrong decision and made the next similar session succeed.
      - Success-driven candidates are conservative. For success trajectories, choose validate only
        when the trajectory demonstrates a reusable strategy not already covered; otherwise skip.
      - Candidate C1 must not include task IDs, exact dates, exact amounts, raw entity names, hidden
        answers, dataset names, evaluator terms, or diagnostic-only literals.
      - Put exact identifiers, amounts, dates, and raw payload snippets only under `Case Evidence`.
      - Avoid vague lessons such as "check all requirements" or "include all required information".
        Bind each rule to user wording, confirmation, object membership, selected tool output,
        source field, calculation, policy gate, payment/source field, or communication obligation.
      - For scope, aggregate, list, summary, or value failures, diagnose the implicit scope/value
        decision the agent made, what runtime evidence did or did not justify it, and what earlier
        reminder would change that decision. Do not force a preferred scope shape; extract the
        causal rule that would prevent the observed failure.
      - For information/aggregate/list/summary/value requests, preserve the source scope created
        at the moment the user made the request. Later writes may create a second post-action or
        current-state scope, but they must not silently replace the original requested scope.
      - If wording is ambiguous between the original requested set and a post-action remaining
        set, Candidate C1 should say to communicate both scopes with explicit labels rather than
        choosing only the narrower scope. Keep this domain-agnostic; do not mention dataset names,
        fixed IDs, exact amounts, or task-specific values in the reusable lesson.
      - Preserve correct near-miss behavior. If the same tool had both correct and wrong calls,
        Candidate C1 must name the discriminator that makes the wrong call different.

      ## OV Gate Compatibility
      These labels are required by downstream OV parsers and gates; keep them exact:
      `Runtime Facts`, `First Wrong Tool Call`, `Counterfactual Ideal Experience`,
      `Candidate C1`, `Selected candidate`, and `Experience Repair Signal`.

      - Use exactly `Selected candidate: C1` or `Selected candidate: none`.
      - Do not output Candidate C2 or Candidate C3.
      - If `Selected candidate: C1`, fill `First Wrong Tool Call.Tool`,
        `First Wrong Tool Call.Error type`, `Experience Repair Signal.Recommended operation`,
        `Experience Repair Signal.Trigger boundary`, and all C1 `Source binding` fields.
      - For totals/counts/lists/summaries, Candidate C1 must fill non-empty
        `Scope freeze point`, `Included records`, `Excluded records`, `Source field`,
        `Derivation`, and `Later write effect`. The freeze point must be when the user asked
        for the aggregate/list/summary, not after later writes. If multiple runtime scopes are
        plausible, fill `Ambiguous alternate scopes` with explicit labels for each scope.
      - `Runtime Facts` may contain `db_check`, `action_checks`, and `communicate_checks` for OV
        parsing. Do not put those control-plane terms inside Candidate C1, `Repair principle`, or
        `Runtime experience content`.
      - If a source-bound C1 cannot be written, choose `Selected candidate: none`,
        `Recommended operation: skip`, and `Runtime experience content: none`.

    merge_op: patch
