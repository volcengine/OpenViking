memory_type: trajectories
description: |
  Extract a compact factual execution record from one agent rollout.

  A trajectory is evidence for later comparison. It records what the user requested, what the
  runtime exposed, what the agent said and did, and what remained uncertain. It does not diagnose
  root cause, judge an injected experience, or propose a future experience.

embedding_template: |-
  {{ trajectory_name }}

  {{ retrieval_anchor }}

directory: "viking://user/{{ user_space }}/memories/trajectories"
filename_template: "{{ extract_context.get_session_timestamp()[:4] }}/{{ extract_context.get_session_timestamp()[4:6] }}/{{ extract_context.get_session_timestamp()[6:8] }}/{{ trajectory_name }}_r{{ extract_context.get_random_suffix(2) }}.md"
enabled: true
operation_mode: "add_only"
agent_only: true

fields:
  - name: trajectory_name
    type: string
    description: |
      Name the observed execution boundary or behavior pattern, not a lesson or diagnosis.
      Must be written in {{ language }}.
      {% if language == 'en' %}Use lowercase snake_case, max 6 words.{% else %}Use a concise noun phrase, max 18 characters.{% endif %}
      Good: "aggregate_scope_observed", "confirmation_scope_trace", "取消范围执行记录".
    merge_op: immutable

  - name: outcome
    type: string
    description: |
      Use exactly one of: success, failure, partial, unfinished, unknown.
      Describe only the apparent rollout outcome. When authoritative evaluation exists, the
      training pipeline overwrites this field deterministically before persistence.
    merge_op: immutable

  - name: retrieval_anchor
    type: string
    description: |
      Positive semantic retrieval text for embedding, not display.
      Format exactly:
      "Stage: <opening|after_read|before_confirmation|before_write|after_write|final_response|terminal_handoff>; Boundary: <observed runtime boundary>; Capability: <read|write|policy|calculation|communication|handoff>; Target: <semantic object/value role>; Outcome: <success|failure|partial|unfinished|unknown>."

      Generalize identifiers, names, exact amounts, dates, task numbers, and raw payload values.
      Anchor on the observed boundary that a later failed-versus-successful comparison should inspect.
    merge_op: immutable

  - name: content
    type: string
    description: |
      Write in {{ language }}. Keep tool names, schema keys, and quoted runtime values unchanged.

      Produce a compact factual record of ONE rollout. Preserve enough evidence for a later
      extractor that can see both failed and successful trajectories. Do not perform that
      comparison or decide the reusable lesson here.

      Return exactly one trajectory operation for the rollout. Do not split phases, decisions,
      objects, or behavior boundaries into separate trajectory files.

      Output exactly ONE markdown record with these sections and no additional top-level sections:

      # <trajectory_name>
      - Outcome: <success|failure|partial|unfinished|unknown>
      - User Goal: <concise goal, without task id>

      ## User Evidence
      - Requests: <user-requested information/actions and their object scope, or none>
      - Confirmations: <user confirmations in their own words, or none>
      - Explicit exclusions: <only exclusions stated by the user, or none>

      ## Runtime Evidence
      - Relevant objects: <objects/records actually returned, including IDs needed for same-case alignment>
      - Observed fields: <real field names and values present in tool results>
      - Observed policy text: <policy text actually present in the rollout, or none>
      - Value sources/calculation: <source fields and calculations actually used or available, or none>
      - Missing fields: <fields the agent referenced but no tool result exposed, or none>

      ## Execution
      - Reads: <read tools, queries, and returned object scope>
      - Agent-stated decisions: <important decisions explicitly stated by the agent; do not correct them>
      - Writes: <write tools, arguments, observed results, or none>
      - Communication: <user-visible information actually communicated, or none>
      - Termination: <done, handoff, unfinished, and observed side effects>

      ## Injected Experience Evidence
      - Loaded: <deterministically supplied reminder IDs/names, or none>
      - Observed behavior after injection: <reads, writes, agent-stated decisions, and user-visible
        statements that actually occurred after loading, or none>

      ## Uncertainty
      - <facts the rollout does not establish and competing factual readings, or none>

      Rules:
      - Be factual and compact. Do not infer root cause, expected behavior, or a corrective rule.
      - Do not output an Outcome Evidence section; the training pipeline appends it deterministically.
      - Do not propose create/update/delete/replace/skip operations for experiences.
      - Do not write counterfactuals, recommendations, reminders, procedures, anti-patterns, or SOPs.
      - Preserve IDs, dates, amounts, exact enum values, and raw schema fields when they are needed
        to align this rollout with another trajectory from the same case.
      - Put only fields actually present in tool results under Observed fields. If the agent relied
        on a hypothetical or absent field, put it under Missing fields.
      - Agent-stated decisions report what the agent explicitly believed; they are not truth claims.
      - Never label injected experiences as followed, ignored, contradicted, helpful, misleading,
        遵循、忽略、违反、有帮助、误导, or infer that the experience caused the observed behavior.
      - Distinguish information/read scope from mutation/write scope without deciding which was correct.
      - For aggregate/value requests, preserve request-time object membership, later changes, source
        fields, and calculations as separate facts.
      - For successful runs, preserve the executed path and outcome facts, but do not turn them into
        a success-path workflow.
      - If evidence is absent or conflicting, write unknown instead of filling the gap.

    merge_op: patch
