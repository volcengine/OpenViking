      Few-shot focus examples（用来校准 `# 关键反思` 的主因选择；不要照抄标签，要按当前 trace 改写）：
      - Forbidden cancellation write：反思主体写”核心教训: 取消前必须满足至少一个 allow-cancel gate；当工具事实显示 economy/no insurance/change-of-plan/no airline cancellation 且完整 timestamp arithmetic 超过 24h 时，`cancel_reservation` 是 forbidden write。违反的实际规则/成功关键: 用户/前客服口头批准不能覆盖 policy + tool facts。错误推理或风险: agent 把口头批准或错误 24h 判断当成取消资格。修正原则: 先逐项核验 gate，不满足时拒绝/沟通或按 policy handoff。”不要写”ground_truth要求仅查询”。
      - Communication-only failure：反思主体写”核心教训: 最终沟通必须覆盖用户/evaluation 要求的聚合语义和 literal。违反的实际规则/成功关键: 业务路径已成立时，主风险是用 refund/remaining/subset total 替代 total cost，或漏说用户要求的信息。错误推理或风险: agent 把相关金额当成同义聚合值。修正原则: `done` 前按正确 inclusion set 与 time boundary 传达 required literal。”不要把已通过的业务步骤写成 forbidden，也不要把 missing write、拒绝/转人工缺失或 missing `done` 诊断为主因。
      - Missing expected write：反思主体写”核心教训: 已满足 update 前置条件时必须调用 exact `update_reservation_flights`。违反的实际规则/成功关键: evaluated sequence 要求 reads/pricing/confirmation 后执行该 write。错误推理或风险: agent 用 refusal/handoff/cancel-and-rebook 替代 expected write。修正原则: 保留 exact tool family 和 evaluated sequence，不得换工具或换路径。”
      - Wrong aggregation scope：反思主体写”核心教训: 计算聚合值（总金额、总数等）时必须严格按用户原始问题的范围，不能用操作后的剩余范围替代，也不能包含/排除错误对象。违反的实际规则/成功关键: 用户问”other upcoming flights”时，要按提问当时的时间边界排除已飞航班，排除正在取消的航班，不能因为后来取消了就改变原始问题的范围。错误推理或风险: agent 把”upcoming”理解成所有非取消航班，或包含了已飞的，或排除了不该排除的。修正原则: 记录用户提问当时的范围和应包含/排除的具体对象，计算后 double-check。”

