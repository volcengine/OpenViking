memory_type: trajectories
description: |
  Extract a compact factual execution record from an agent trajectory.

  A trajectory memory is evidence for later experience extraction, not an experience and not
  a final root-cause judgment. Preserve what happened, what was requested, what was read,
  what was written/communicated, what succeeded, what failed, and which runtime facts are
  uncertain. Do not propose injectable reminders, do not write production experience content,
  and do not recommend create/update/delete operations for experiences.

embedding_template: |-
  {{ trajectory_name }}

  {{ retrieval_anchor }}

directory: "viking://user/{{ user_space }}/memories/trajectories"
filename_template: "{{ extract_context.get_session_timestamp()[:4] }}/{{ extract_context.get_session_timestamp()[4:6] }}/{{ extract_context.get_session_timestamp()[6:8] }}/{{ trajectory_name }}.md"
enabled: true
operation_mode: "add_only"
agent_only: true

fields:
  - name: trajectory_name
    type: string
    description: |
      Name the observed boundary or failure/success pattern, not the final lesson.
      Must be written in {{ language }}.
      {% if language == 'en' %}Use lowercase snake_case, max 6 words.{% else %}Use a concise noun phrase, max 18 characters.{% endif %}
      Good: "missing_verification", "wrong_target_selected", "incomplete_output", "关键校验遗漏".
    merge_op: immutable

  - name: outcome
    type: string
    description: |
      Use exactly one of: success, failure, partial, unfinished, unknown.
      success means the task's required state/actions and required communication were completed.
      failure means a material requirement failed.
      partial means some important work succeeded but one material requirement failed.
      unfinished means the task stopped before the necessary terminal action/answer.
      unknown means the evidence is insufficient.
    merge_op: immutable

  - name: retrieval_anchor
    type: string
    description: |
      Positive semantic retrieval text for embedding, not display.
      Format exactly:
      "Stage: <semantic execution stage>; Boundary: <observed runtime boundary>; Capability: <semantic capability>; Target: <semantic target>; Outcome: <success|failure|partial|unfinished|unknown>."

      Generalize identifiers, names, exact amounts, dates, task numbers, and raw payload values.
      Anchor on the observed boundary where later experience extraction should inspect evidence.
    merge_op: immutable

  - name: experience_effects
    type: string
    description: |
      Machine-readable JSON object about injected experience reminders observed in this run.
      Output ONLY a valid compact JSON object, not markdown and not a code block.

      Required shape:
      {"positive_ids":["E1"],"negative_ids":[],"weak_ids":[]}

      If no experience reminder was injected, output exactly:
      {"positive_ids":[],"negative_ids":[],"weak_ids":[]}

      positive_ids: injected experiences that appeared necessary/helpful in the observed run.
      negative_ids: injected experiences that appeared misleading or over-broad in the observed run.
      weak_ids: injected experiences that were relevant but insufficient in the observed run.
      Use only IDs from the injected list. Do not invent IDs. If unsure, leave the arrays empty.
    merge_op: immutable

  - name: content
    type: string
    description: |
      Write in {{ language }}. Keep raw tool names, schema keys, and quoted runtime values unchanged.

      Produce a compact factual execution record for downstream experience extraction. Represent
      the actual chronological path as a readable Python-style log so a later extractor can compare
      successful and failed trajectories without reading the full transcript. The Python is a
      representation only and will never be executed. Do not decide the root cause or final
      experience here.

      ## Do NOT output
      - No `Counterfactual Ideal Experience` section.
      - No `Runtime experience content`.
      - No `Experience Repair Signal`.
      - No `Recommended operation`, `New experience action`, `Selected candidate`, or C1/C2/C3.
      - No instructions that should be injected into a future agent.
      - No broad advice such as "check all requirements" or "include all information".
      - No `Diagnostic Hints` section.
      - No `Ambiguous references` field or verdict such as `Ambiguous references: none`.
      - No `Timeline`, `Outcome Checks`, `Correct Work To Preserve`, `Observed Problem`,
        `Evidence References`, or `Raw Evidence` section.

      ## Output Format
      Output exactly ONE markdown record with one fenced Python block under `## Execution`.

      # <trajectory_name>
      - Outcome: <success|failure|partial|unfinished|unknown>
      - Domain: <task/tool domain>
      - User Goal: <generalized user goal, no task id>
      - Injected Experiences:
        - Loaded: <semantic names or none>
        - Helpful: <which loaded reminders appeared helpful, or none>
        - Misleading: <which loaded reminders appeared misleading/over-broad, or none>
        - Insufficient: <which loaded reminders were relevant but incomplete, or none>

      ## Execution

      ```python
      user_message_1 = "<material user request>"

      value = real_tool_name(real_argument="actual value")
      # => <only returned fields that affect a later decision or establish a side effect>

      actual_decision = "<literal value selected by the agent>"
      # Actual decision basis: <observable basis or unknown>

      assistant_message_1 = "<actual agent message>"

      user_message_2 = "<material user reply when one followed>"

      real_write_tool(real_argument="actual value")
      # => <observed side effect>
      ```

      ## Evaluation
      - Required outcome: <passed|failed|partial|unknown; factual evidence>
      - Failed requirements: <explicit failed requirements or none/unknown>
      - External feedback: <explicit direct feedback or none>
      - Unexplained differences: <known evidence gap or none>

      ## Result
      - <concise final state, outputs, and side effects>

      ## Rules
      - Be factual and compact. Prefer evidence over interpretation.
      - Preserve material user messages in chronological order as `user_message_<n>` variables.
        A material message establishes or changes the goal, scope, constraints, reason,
        authorization, confirmation, refusal, or evaluator-relevant requested output. Omit
        greetings and repeated thanks.
      - Represent each retained tool call as a call to its real tool method name with its actual
        material arguments. Do not rename calls to generic pseudo-functions.
      - Represent direct assistant text as `assistant_message_<n>`. If communication happened
        through a tool, represent the observed call with that tool's real name instead.
      - Keep all state-changing tool calls, material communication calls, handoffs, termination
        calls, and reads whose results influence a later decision. Omit infrastructure-only reads
        and unrelated returned fields.
      - Preserve chronological order and write repeated calls separately. Do not introduce loops,
        helper functions, comprehensions, imports, classes, or other abstractions.
      - Use `# =>` comments for concise observed returns, errors, user replies, and side effects.
      - Use literal assignments and comments for actual intermediate selections or decisions only
        when they explain later tool arguments.
      - Do not emit unexecuted `if/else` branches, counterfactual calls, or an ideal corrected path.
      - Runtime messages/tool results and `evidence_sources` marked `direct=true` are factual
        evidence. Advisory signals are search hints only. Never rewrite an advisory claim as an
        observed decision or root cause.
      - A `rollout_evaluation` source marked `direct=true` is authoritative external feedback for
        outcome and requirement compliance. Use it to record which required results were missing,
        incorrect, or incomplete. It does not by itself prove an unobserved internal cause.
      - Record the decision the agent actually made, even when evaluation failed. Do not label it
        correct or incorrect and do not replace it with what should have happened.
      - Record only an observable decision basis. If the rollout does not reveal it, write
        `unknown`; never infer a hidden policy, internal cause, or evaluator rationale.
      - Do not hide uncertainty. If the trace does not prove the expected behavior or outcome,
        write unknown/uncertain instead of inventing a root cause.
      - If the run succeeded, record the successful path facts that distinguish it from failures
        without producing a success-path SOP or an injectable reminder.
      - If an injected experience was misleading, record how it influenced observed behavior; do
        not rewrite the experience here.

    merge_op: patch
