memory_type: trajectories
description: |
  A compact, reusable view of how the agent handled one task in a conversation.

  Extract when the agent worked through identifiable tasks involving decisions, tool calls, or multi-step actions.
  Skip pure chitchat or simple Q&A with no execution trace.

directory: "viking://agent/{{ agent_space }}/memories/trajectories"
filename_template: "{{ trajectory_name }}_{{ extract_context.get_session_timestamp() }}.md"
enabled: true
operation_mode: "add_only"
agent_only: true

fields:
  - name: trajectory_name
    type: string
    description: |
      Name the task directly and stably.
      Choose ONE language and stick to it — do not create both a Chinese and an English version of the same concept.
      If English: lowercase snake_case, max 5 words.
      If Chinese: concise noun phrase, max 15 characters.
      Do not create near-duplicate names for the same task.
      Good: "flight_booking_duplicate_resolution", "pytest_asyncio_cancel_hang_fix", "机票重复预订处理".
    merge_op: immutable

  - name: outcome
    type: string
    description: |
      Use exactly one of: success, failure, partial, unfinished, unknown.
    merge_op: immutable

  - name: content
    type: string
    description: |
      Procedure-like trajectory view in EXACTLY this format:

      # <trajectory_name>
      - Domain: <task domain or product area, e.g. airline, retail, software tooling>
      - Trigger: <the reusable user intent or task situation — one sentence>
      - Preconditions:
        1. <state, identity, policy, tool-observation, or confirmation prerequisite>
        2. <...>
      - Procedure:
        1. <future-agent instruction for the first decision/action step; include key tool names when useful>
        2. <future-agent instruction for the next decision/action step>
        3. <continue until the write/confirmation/final-response boundary is clear>
      - Anti-patterns:
        - <mistake, missing check, wrong ordering, over-broad action, or failed attempt to avoid>
      - Applicability Boundary:
        - <when this memory applies>
        - <when this memory should not be used>
      - Result: <final outcome and important side effects — one sentence>
      - Evidence: <brief generalized source note from this session, including success/failure/partial status>

      Rules:
      - Write for future agent execution, not for human audit. Prefer clear instructions over chronological narration.
      - Preserve the successful or best-known path: critical reads, required policy checks, confirmation steps, write-tool ordering, and final user-facing completion.
      - Keep negative lessons in Anti-patterns, not mixed into Procedure.
      - Keep the memory grounded in this session, but abstract away user-specific names, raw IDs, exact payloads, and long tool responses.
      - Do not include raw user/order/reservation/payment/card IDs, user names, email/phone/address values, exact dates, case-specific amounts, exact budgets, route pairs, airport pairs, passenger/bag counts, card suffixes, flight numbers, order numbers, or raw tool payloads. Replace them with semantic descriptions such as "a delivered order", "an ineligible basic-economy reservation", "the saved payment method", or "a policy-ineligible cancellation". Stable policy constants may be kept when they are needed for future execution.
      - The Evidence line is not an exception: it may name the source status and lesson type, but must not carry case-specific values such as exact amounts, routes, dates, counts, product names, or customer-specific state.
      - Bad Evidence: "a mechanical keyboard exceeded the $200 threshold". Good Evidence: "a product variant exceeded the user-specified threshold".
      - Bad Evidence: "the ORD-to-LAX reservation on May 12 used card ending 1234". Good Evidence: "a matching reservation required the saved payment method and policy checks before the write action".
      - Mention tool names when they are part of the reusable path, but summarize observations instead of copying raw JSON.
      - If the session failed or was partial, still write the best reusable lesson: put the corrected approach in Procedure and the failure cause in Anti-patterns / Evidence.
      - Avoid broad SOPs. The Trigger and Applicability Boundary should make this record narrower than a whole domain workflow.

      General Rules:
      - Use exactly the title, Domain line, and 7 labels above in this exact order.
      - Trigger, Result, and Evidence are ONE sentence each.
      - No extra headings, free paragraphs, or closing remarks.
    merge_op: patch
