memory_type: trajectories
description: |
  输出语言硬约束：生成的 memory 必须使用中文，不受对话语言或 {{ language }} 影响。所有自然语言字段都必须用中文，包括名称、检索锚点、摘要、要点和分析内容。固定 schema 标题、工具名、API/function 名、evaluation 字段名、enum 值、代码标识符和必要的引用字面量可保留原文。

  本模板用于从 agent 任务轨迹中提炼一个紧凑、可复用的操作契约。

  当 agent 处理了包含决策、工具调用或多步骤动作的明确任务时才提取；纯闲聊或没有执行轨迹的简单问答不要提取。
  单任务边界：每个最新 rollout/task 最多创建一个 trajectory。只把最新 rollout 作为新 memory 的来源。系统 policy 和通用领域规则不能单独作为抽取来源；但当当前用户请求、工具观察、action/evaluation delta 或终态决策依赖某个 policy eligibility gate 时，必须把对应 policy 作为判断当前轨迹的上下文证据。忽略 retrieved memory_context、Experience Reminder、candidate/source memories 和历史 archive overview，不要从这些内容中抽取新 trajectory。不要把每条 policy、每次工具调用、召回 memory 或假设任务拆成单独 trajectory。

  结构化评测场景的重要 source filter：如果前文存在结构化 case spec、`task_signature`、`ground_truth`、可见 evaluation 或最终 status/evaluation report，则该最终 case 标识唯一当前任务。抽取出的 `trajectory_name`、`retrieval_anchor` 和 `content` 必须只围绕该当前 case 的 user_query、evaluation 和 tool trace。任何 intent、目标对象、路线/日期或等价约束、终态动作、失败模式不属于当前 case 的 memory 都无效，必须省略。

embedding_template: |-
  {{ trajectory_name }}

  {{ retrieval_anchor }}

directory: "viking://user/{{ user_space }}/memories/trajectories"
filename_template: "{{ trajectory_name }}_{{ extract_context.get_session_timestamp() }}.md"
enabled: true
operation_mode: "add_only"
stage: agent
peer_enabled: false
fields:
  - name: trajectory_name
    type: string
    description: |
      直接、稳定地命名任务。
      新生成名称必须使用中文，不受 {{ language }} 影响。
      使用简洁中文名词短语，最多 15 个汉字。
      不要为同一任务创建近似重复名称。
      好例子："重复请求处理"、"异步任务挂起修复"、"补偿对象错绑"。
      优先表达可复用的操作或决策边界，而不是照抄用户开场请求。
    merge_op: immutable

  - name: outcome
    type: string
    description: |
      只能使用以下值之一：success, failure, partial, unfinished, unknown。
    merge_op: immutable

  - name: retrieval_anchor
    type: string
    description: |
      为该 rollout 分析生成正向语义检索文本；它面向 embedding，而不是展示。
      自然语言部分使用中文；固定 enum 值、工具名和 evaluation 字段名可保留原文。
      建议格式："意图: <booking|modification|cancellation|baggage|upgrade|refund_compensation|lookup|transfer|multi_intent|other>; 阶段: <opening|after_read|before_write|after_write|terminal_handoff|final_response|evaluation_failure|evaluation_success>; 终态动作: <required final tool family or none>; 禁止替代: <tool/action that must not replace the terminal action or none>; Policy gates: <eligibility/confirmation/object-binding checks>; 失败模式: <none, missing expected action, wrong target, wrong args, premature handoff/done, policy mismatch, or other>; 目标: <primary object or write/read boundary>."

      规则：
      - 比 content 更短、更聚焦检索。
      - 结构化评测场景中，anchor 必须匹配当前 case 的主 intent 和终态动作族；不得锚定只出现在 retrieved memories、Experience Reminder、candidate_source_trajectory、policy 文本或历史样例里的 intent/tool family。
      - 使用正向适用条件描述该分析应在何时被检索。
      - 包含决定性的用户意图、终态工具族、policy gate、失败/成功模式和目标边界，不要包含原始 case id。
      - 用“禁止替代”标明有害近似流程，例如用取消+重建替代原地 update、用 handoff 替代可处理工具流，或用 communicate/done 替代必需的状态变更动作。
      - 当可复用 lesson 只有在读取、核验、失败或终态边界后才成立时，不要照抄开场请求；应锚定实际建立的条件。
      - 泛化 identifiers、姓名、精确数字、日期、地点、金额和原始 tool payload；稳定 policy 常量或必要工具名除外。
    merge_op: immutable

  - name: content
    type: string
    description: |
      生成面向 evaluation 的 rollout trajectory 分析。必须严格使用以下格式。自然语言全部使用中文，下面的 section 标题必须原样保留。

      # 结论
      <一句话概括核心成功/失败/部分完成结果。相关时从意图族、必需终态动作、关键 policy gate、禁止替代动作开始。失败时点明缺失的 expected action、错误对象绑定、错误参数、过早 handoff/终止或其他主失败。>

      # Evaluation 信号
      - Outcome: <success|failure|partial|unfinished|unknown>.
      - Reward: <可见 reward/score/pass status；若不可见则写 evaluation not visible>.
      - DB/Communicate: <可见 db_check、communicate reward 或其他 evaluation breakdown>.
      - Failed expected action: <最重要的 failed action_check、missing write、wrong args，或 none/unknown>.

      # Expected vs Actual
      - Expected: <evaluation/action_checks 期望的 tool/action sequence 和关键参数；实例本地信息需泛化>.
      - Actual: <实际轨迹中的 tool/action sequence 和关键参数>.
      - Delta: <missing action、wrong target object、wrong amount/count/status、extra action、premature handoff/done，或 no material delta>.

      # 事实链
      - User/task intent: <用户试图完成什么>.
      - Candidate objects: <重要候选对象及决定性字段，例如 status、count、membership、insurance、lifecycle state、ownership 或 policy eligibility>.
      - Correct target: <最符合 evaluation 和已核验 tool facts 的对象/动作>.
      - Wrong target or rejected path: <agent 错误走向的对象/动作，如有>.
      - Policy gates and terminal action: <policy eligibility、required confirmation、allowed terminal tool、forbidden substitute tool/action>.

      # 实际轨迹偏离
      1. <按时间顺序写第一个相关读取/决策/动作>
      2. <相对已核验/evaluation-aligned 路径的第一个关键偏离>
      3. <导致最终 reward 或任务结果的后果>

      # 根因
      - Category: <一个或多个：object_binding_error, insufficient_retrieval, policy_misread, wrong_parameter_calculation, missing_tool_call, premature_handoff_or_done, user_misled_agent, environment_or_evaluation_mismatch, other>.
      - Explanation: <为什么该类别解释本结果；必须基于 evaluation 和 tool facts>.

      # 正确做法
      1. <正确的下一步读取/核验，如需要>
      2. <对误导性用户说法与 tool facts 的正确解释>
      3. <正确的终态 tool/action call 或 final response boundary；包含泛化后的关键参数；需要时明确 cancel/book/handoff/done 不得替代 expected terminal action>

      # 泛化规则
      - <可复用规则，用于未来 agent 避免该失败或保持该成功>
      - <有用时写第二条规则>
      - <有用时写第三条规则>

      规则：
      - Scope/source：每个最新 evaluated task 最多抽取一个 trajectory。所有判断必须落在当前用户请求、实际工具调用/输出、assistant 动作、可见 CaseSpec/ground_truth/evaluation 上。不要从 retrieved memories、Experience Reminder、candidate/source memories、历史样例或无关 policy sections 抽取。system/domain policy 只用于判断与当前观察事实绑定的 policy gate。
      - Evidence priority：Expected vs Actual 优先使用 evaluation/action_checks/CaseSpec 作为 oracle。即使最终 report 很稀疏，CaseSpec 的 `Actions`、`Communicate Info`、NL Assertions 也算证据。保留精确 evaluated/actual tool names。之后依次使用 tool facts、policy、user self-report。
      - Oracle-to-runtime mapping：在面向未来 agent 的 sections（`# 结论`、`Policy gates and terminal action`、`# 根因`、`# 正确做法`、`# 泛化规则`）中，只要当前 trace 暴露了 runtime 可见 gate，就要把 hidden oracle 约束转译成这些 gate：status、ownership、timestamp arithmetic、cabin/membership/insurance、eligibility、confirmation、refund 或 object binding。当 policy/tool facts 已能解释边界时，不要把 `ground_truth要求仅查询`、`训练oracle要求`、`evaluation says query-only` 写成可复用理由；这些 oracle 证据只能出现在 `# Evaluation 信号` 或 `# Expected vs Actual`。若没有可观察 gate 能解释边界，则标为 non-generalizable/evaluation-only。
      - Write/action deltas：若 expected actions 要求某个 state-changing tool 但 actual 漏掉或参数错，诊断该 exact missing/wrong write，并保留 evaluated sequence；不要替换成更严格拒绝、handoff、cancel-and-recreate 或不同 tier/tool。若 expected actions 只有 read/refusal/communication，但 actual 做了 state-changing tool 且 DB failed，则该 write 是 forbidden substitute；不要因为 tool returned success 就归因为缺少 post-write verification、`done` 或 environment mismatch。Tool success 只证明 write 已执行。
      - Communication deltas：若 evaluation/CaseSpec 要求 customer-facing `Communicate Info` 或 NL Assertions，把精确 required literals 及其语义标签带入 `DB/Communicate`、`Expected vs Actual`、`事实链` 和 `正确做法`。对 aggregate values，从用户回合和 tool facts 推导 inclusion set 与 time boundary；不要用 refund total、fee total、subset total 或 post-change remaining total 替代。若只有 communication failed，主 delta 是 missing/wrong communication，不是 missing write 或 `done`；必须先 communicate required items，再 `done`。
      - Policy-gated decisions：先从 tool outputs 重建事实链，再判断 policy；用户说法或 prior-support approval claims 不能覆盖当前 policy + tool facts。航空取消/退款场景中，在批准或调用 `cancel_reservation` 前，必须核验无已飞航段，并至少满足一个 allow-cancel gate：用完整 timestamp arithmetic 判断预订在 24 小时内、航司取消、business cabin，或有 travel insurance 且 reason covered。若全部 gate 都不满足，正确终态是 refusal/communication 或 policy-specified handoff，`cancel_reservation` 是 forbidden。
      - Output discipline：严格保留八个 required headings 及顺序；不要加额外标题或结尾语。找第一个关键偏离，不只写最后症状。内容要密集、诊断化。泛化姓名、ID、精确日期/金额/路线、路径和原始 payload；稳定 policy constants 或执行所需 exact tool/evaluation names 除外。只提当前 trace/evaluation 中存在的工具。

      Few-shot guidance（缩略模式，不改变输出格式）：
      - Forbidden cancellation write：如果 Expected 只有 `get_user_details` + `get_reservation_details`，Actual 包含 `cancel_reservation`，且 tool facts 显示 economy/no insurance/change-of-plan/created_at 超过 policy current time 前 24h/no airline cancellation，则 future-facing sections 应写："取消请求因目标预订不满足任何取消资格而不得批准；`cancel_reservation` 是 forbidden write；用户或前客服口头批准不能覆盖 policy + tool facts。" 不要把 "ground_truth要求仅查询" 写成可复用理由。
      - Communication-only failure：如果 DB/action checks 通过，但 `communicate_checks` 要求 literal `1628` 表示 in-scope upcoming items 的 total cost，而 Actual 只说了 refund/remaining/subset total，则写："主失败是缺少语义正确的聚合沟通；需在 `done` 前用正确标签传达 `1628`。" 不要把 missing write 或 missing `done` 诊断为主因。
      - Missing expected write：如果 Expected 要求 reads/pricing/confirmation 后调用 `update_reservation_flights`，但 Actual 拒绝、转人工或 cancel-and-rebook，则写："主失败是未执行 evaluated `update_reservation_flights`；禁止用 handoff/refusal/cancel-and-rebook 替代该 exact tool family。" 保留精确工具名。

    merge_op: patch
