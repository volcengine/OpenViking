memory_type: trajectories
description: |
  A compact execution-audit record distilled from an agent task trajectory.

  The trajectory memory is not a success workflow or an experience instruction. It records what
  actually happened, what the task/evaluation required, where the first material divergence occurred,
  and whether a reusable experience repair should be learned from that divergence.

  Extract when the agent worked through identifiable tasks involving decisions, tool calls,
  user confirmations, final communication, or multi-step actions. Skip pure chitchat or simple Q&A
  with no execution trace.

embedding_template: |-
  {{ trajectory_name }}

  {{ retrieval_anchor }}

directory: "viking://user/{{ user_space }}/memories/trajectories"
filename_template: "{{ trajectory_name }}_{{ extract_context.get_session_timestamp() }}.md"
enabled: true
operation_mode: "add_only"
agent_only: true

fields:
  - name: trajectory_name
    type: string
    description: |
      Name the audited execution boundary directly and stably.
      Must be written in {{ language }}.
      {% if language == 'en' %}Use lowercase snake_case, max 5 words.{% else %}Use a concise noun phrase, max 15 characters.{% endif %}
      Do not create near-duplicate names for the same boundary.
      Good: "cancel_refund_distinction", "final_cost_communication", "取消退款区分".
      Prefer the first material decision/repair boundary over the broad opening request.
    merge_op: immutable

  - name: outcome
    type: string
    description: |
      Use exactly one of: success, failure, partial, unfinished, unknown.

      Choose from reward/evaluation facts when available:
      - success: all required tool/db/action and communication checks passed.
      - failure: reward-critical database/action or communication check failed.
      - partial: some required work succeeded but at least one material requirement failed.
      - unfinished: execution stopped before the task reached a terminal answer or write boundary.
      - unknown: evaluation facts are unavailable or ambiguous.
    merge_op: immutable

  - name: retrieval_anchor
    type: string
    description: |
      Positive semantic retrieval text for embedding, not display.
      Format exactly:
      "Stage: <opening|after_read|before_write|after_write|final_response|terminal_handoff>; Boundary: <first material audited condition>; Capability: <operation/check/communication this record audits>; Target: <primary object or sub-object>; Outcome: <success|failure|partial|unfinished|unknown>."

      Rules:
      - Keep it shorter and more retrieval-focused than content.
      - Anchor on the condition that was actually established at runtime, not merely the opening request.
      - Use positive applies-when language only. Put exclusions and near-misses in content.
      - Generalize identifiers, names, exact amounts, exact dates, paths, and raw payload values.
    merge_op: immutable

  - name: experience_effects
    type: string
    description: |
      Machine-readable JSON object for rule-based statistics about injected experience reminders.
      Output ONLY a valid compact JSON object, not markdown and not a code block.

      Required shape:
      {
        "positive_ids": ["E1"],
        "negative_ids": [],
        "weak_ids": []
      }

      Rules:
      - If no experience reminder was injected, output exactly: {"positive_ids":[],"negative_ids":[],"weak_ids":[]}
      - `positive_ids` may include only experiences that were necessary/helpful for a correct decision or recovery.
      - `negative_ids` may include only experiences that were over-broad or misleading and plausibly changed execution toward a reward-changing mistake.
      - `weak_ids` may include only experiences that were helpful-but-not-sufficient or too weak to prevent the First Wrong Tool Call.
      - Any injected ID not listed in positive_ids, negative_ids, or weak_ids is treated as neutral/ignored by downstream statistics; do not output a separate neutral list.
      - Use only IDs from the deterministic injected list. Do not invent IDs.
    merge_op: immutable

  - name: content
    type: string
    description: |
      Natural-language content must be written in {{ language }}. Keep fixed section labels,
      tool names, schema fields, trace step IDs, Python/DSL identifiers, and quoted runtime values unchanged.

      Write an execution-audit record in EXACTLY this format and label order:

      # <trajectory_name>
      - Outcome: <success|failure|partial|unfinished|unknown>
      - Domain: <task domain, tool family, or execution area>
      - User Goal: <generalized user goal in one sentence>
      - Loaded Experiences:
        - <none OR E1: <experience memory filename/short name> — <triggered before tool if known; relevant|irrelevant|over-broad|misleading|ignored|helpful; brief reason>>
      - Runtime Facts:
        - Evaluation: <db/action/communication checks or equivalent success/failure facts, generalized>
        - Decisive tool facts: <fresh tool outputs, policy facts, user confirmations, candidate args, or final response facts that determine correctness>
      - Actual Execution Path:
        A1. <actual business-relevant read/tool/user-confirmation/policy-branch/write/final-communication step; include generalized decisive args and output facts>
        A2. <next actual step>
        A3. <continue compactly; omit memory-loading plumbing, hidden retries, and chitchat>
      - Expected Path:
        R1. <expected reward/policy/user-confirmed step at the same abstraction level as Actual Execution Path>
        R2. <next expected step>
        R3. <continue only for reward-critical requirements>
      - Alignment:
        - R1 -> A1: <matched|missing_expected_call|wrong_arguments|wrong_object|wrong_policy_branch|missing_confirmation|missing_communication|extra_unexpected_call|ambiguous|not_applicable>; <brief evidence>
        - R2 -> <Ax or ∅>: <status>; <brief evidence>
      - First Wrong Tool Call:
        - Step: <exact Ax for one actual wrong call, final_response for a final communication omission, or none for missing expected call with no wrong actual call>
        - Tool: <ONE exact actual tool name only, or communicate_with_user, or none; do not write multiple tools, prose, "done", "A and B", or explanations in this field>
        - Candidate shape: <candidate_tool=<tool>; decisive_field=<exact top-level or nested arg/content field path, e.g. flights[*].flight_number, payment_methods[*].amount, destination, content, or none>; wrong_value_source=<stale tool result|unconfirmed user statement|incorrect calculation|copied object|wrong payment allocation|wrong date|wrong object id|object-cardinality change|missing content|none>; expected_value_source=<runtime fact/user confirmation/policy gate/evaluation requirement>; candidate_args_or_content=<generalized risky shape plus any sibling fields that must be preserved unchanged>>
        - Error type: <none|wrong_tool|wrong_arguments|wrong_object|wrong_policy_branch|missing_read_before_tool|missing_confirmation_before_tool|missing_communication|premature_write|extra_write|tool_error|unrecoverable>
        - Expected at call: <the exact expected tool/args/target object/policy branch/confirmation/content at this boundary; when repairing one argument field, explicitly preserve unchanged sibling fields, especially schema fields with similar names; if Tool is none, name the missing expected tool boundary here>
        - Why this call is first: <why no earlier actual tool call materially changed reward or recoverability>
      - First Material Divergence:
        - Step: <same as First Wrong Tool Call.Step when an actual wrong tool call exists; final_response for final communication omission; expected_missing_tool when the failure is only an omitted expected tool call; or none>
        - Kind: <none|wrong_tool|wrong_arguments|wrong_object|wrong_policy_branch|missing_read|missing_confirmation|missing_communication|missing_expected_tool|premature_write|extra_write|tool_error|unrecoverable>
        - Expected: <what should have happened at that boundary>
        - Actual: <what happened instead; if missing_expected_tool, say no actual call occurred>
        - Impact: <why this changed reward, database state, required communication, or recoverability>
      - Causal Analysis:
        - Root cause: <concise causal diagnosis grounded in visible evidence; name the missed runtime fact, policy distinction, object binding, field provenance, user confirmation, or communication obligation>
        - Evidence: <tool output, user confirmation, candidate args, final response, or evaluation feedback proving the diagnosis>
        - Ruled out: <what was not the primary cause, such as successful db writes, correct earlier checks, or unrelated reminders>
        - Memory effect: <missing|irrelevant|over-broad|misleading|ignored|too_weak|helpful_but_not_sufficient|necessary|not_needed>; <name the concrete experience/rule type when visible>
        - Misleading loaded experience: <Ei/name or none>
        - How memory affected the wrong call: <if a loaded experience was over-broad/misleading/too_weak, state how it affected or failed to prevent First Wrong Tool Call; otherwise none>
      - Experience Repair Signal:
        - Action: <create|update|skip>
        - Target experience: <existing loaded experience name when updating an over-broad/misleading/too_weak memory; new concise name when creating; none when skipping>
        - Trigger boundary: <MUST equal First Wrong Tool Call.Tool when Action is create/update; use none when Action is skip or no actual/preventable tool boundary exists>
        - Repair principle: <one sentence with the minimal reusable repair; if skip, explain why no experience update is needed>
        - Do not learn: <nearby broad workflow, success path, object-shape change, or non-causal lesson that must not be turned into experience>
      - Applicability:
        - Applies when: <positive reusable condition for this audit>
        - Does not apply when: <nearby intent/object/policy state where this audit must not be used>
      - Result: <final outcome and important side effects in one generalized sentence>

      Rules:
      - AUDIT FIRST: The record must primarily explain actual execution vs expected requirements. Do not write a polished SOP that hides the mistake.
      - ALWAYS INCLUDE ALL SECTIONS: Include every label above, even for success. For success, set First Wrong Tool Call Step/Tool to `none`, First Material Divergence Step to `none`, Kind to `none`, Experience Repair Signal Action to `skip`, and explain what preserved success. If no experience reminder was injected, set Loaded Experiences to `none` and set the separate `experience_effects` field to the required empty JSON object.
      - COMPLETE BUT COMPACT ACTUAL PATH: Include all reward-relevant business reads, decisive tool outputs, confirmations, writes, policy branches, and final required communication. Omit memory loading, duplicated retries with no new state, and casual conversation.
      - EXPECTED PATH IS REWARD/POLICY GROUNDED: Build Expected Path from evaluation feedback, rubric requirements, explicit user confirmations, tool facts, and visible policy gates. Do not invent requirements not supported by runtime evidence.
      - FIRST WRONG TOOL CALL ONLY: Output exactly one First Wrong Tool Call. Choose the earliest actual candidate tool call whose tool name, args, target object, policy branch, missing precondition, or user-visible content materially caused the reward failure. If all database/action calls passed and only final communication failed, the First Wrong Tool Call is the final `communicate_with_user` call. If the failure is only a missing expected call with no wrong actual call, set Step to `none`, Tool to `none`, and put the expected missing tool in Expected at call and First Material Divergence.Step=`expected_missing_tool`.
      - TOOL FIELD MUST BE ATOMIC: The `Tool` field must be exactly one raw tool name from the actual trace, `communicate_with_user`, or `none`. Never write prose, uncertainty, slash-separated alternatives, comma-separated tools, `done`, `final_response`, or multiple tool names in `Tool`. Put explanations in Candidate shape, Expected at call, or Causal Analysis instead.
      - MISSING EXPECTED WRITE IS NOT A WRONG TOOL: If reward failed because an expected write/read was omitted and there was no wrong actual candidate call, do not label `done` or the last successful tool as wrong. Use First Wrong Tool Call.Tool=`none`, First Material Divergence.Kind=`missing_expected_tool`, Expected=<missing tool and generalized args>, Actual=<no actual call occurred>, and Experience Repair Signal.Action=`skip` unless the omission can be prevented at a concrete earlier communication/tool boundary.
      - CANDIDATE SHAPE MUST BE STRUCTURED: Candidate shape must include candidate_tool, decisive_field, wrong_value_source, expected_value_source, and generalized candidate_args_or_content. For write-argument failures, `decisive_field` MUST be the exact top-level or nested tool argument field path that was wrong, not a broad object such as "route", "flight sequence and baggage", or "payment". Use paths like `flights[*].flight_number`, `payment_methods[*].amount`, `payment_methods[*].payment_id`, `destination`, or `total_baggages`. Also state in candidate_args_or_content which nearby sibling fields must NOT be changed. For final communication omissions, decisive_field=content and wrong_value_source=missing content. For missing expected tool with Tool=none, candidate_tool=none and candidate_args_or_content=missing expected call.
      - FIRST DIVERGENCE ONLY: First Material Divergence must point to the earliest boundary that materially changed reward or recoverability and should match First Wrong Tool Call when an actual wrong tool call exists. If all database/actions passed and only final communication failed, the divergence is `final_response`, not the earlier successful tool calls.
      - CAUSAL ANALYSIS, NOT HIDDEN THOUGHTS: Provide a concise evidence-backed causal diagnosis. Do not output hidden chain-of-thought, private reasoning transcripts, or unverifiable speculation.
      - EXPERIENCE HANDOFF: Experience Repair Signal is the only section that should recommend experience creation/update. For partial/failure outcomes with an actual First Wrong Tool Call.Tool, default to Action=create (or update when an existing loaded experience was causal/too weak) when a narrow reminder before that tool call could prevent the same failure in future. Use Action=skip only for success, case-specific failures, failures already covered correctly, or failures not preventable by a pre-tool reminder. When Action is create/update, Trigger boundary must be exactly the single tool name in First Wrong Tool Call.Tool; do not choose a broader, earlier, later, or multi-tool boundary. If First Wrong Tool Call.Tool is `none`, use Action: skip unless there is a concrete preventable communication boundary.
      - BAD EXPERIENCE SELF-CORRECTION: If a loaded experience was over-broad, misleading, or too weak and it contributed to or failed to prevent the First Wrong Tool Call, set `Memory effect` accordingly, set `Misleading loaded experience` to that Ei/name, set `Experience Repair Signal.Action` to `update`, and set `Target experience` to that existing loaded experience. Do not create a new experience when an existing loaded experience is the causal memory problem.
      - IGNORE NON-CAUSAL REMINDERS: If a loaded experience triggered but did not affect the First Wrong Tool Call, mark it as irrelevant in Loaded Experiences or Ruled out. Do not update it merely because it appeared in context.
      - SUCCESS DOES NOT TRAIN EXPERIENCE: Successful trajectories are useful references, but they normally must not propose experience updates. Use Action: skip unless the outcome is partial/failure and the repair is reusable.
      - DO NOT LEARN FULL WORKFLOWS: Do not turn a successful path into a broad workflow memory. The trajectory may record success, but the repair signal must stay focused on failure prevention.
      - PRESERVE POLICY DISTINCTIONS: Explicitly separate cancellation permission from refund eligibility, changing one existing object from creating replacements, one booking from multiple bookings, final required communication from database success, and confirmed user targets from inferred targets.
      - PRESERVE OBJECT BOUNDARIES: Do not imply changing object cardinality, lifecycle shape, passenger/object membership, or target object unless the user explicitly requested and confirmed that exact change and tool/policy facts support it.
      - COMMUNICATION FAILURES ARE FIRST-CLASS: If the only failed check is missing required user-visible information, the audit and repair signal must target `communicate_with_user` or final response content, not unrelated tool workflows.
      - WRITE ARGUMENT FAILURES NEED PROVENANCE: If a write tool failed because arguments were wrong, identify in First Wrong Tool Call.Candidate shape the exact decisive field path and exact wrong source category: stale tool result, unconfirmed user statement, incorrect calculation, copied source object, wrong payment allocation, wrong date, wrong object id, or object-cardinality change. Do not write a generic "wrong_arguments" candidate shape without field provenance. Do not let repair implications spill into sibling schema fields that were correct.
      - EXPERIENCE ALIGNMENT: Loaded Experiences must list only experience memories actually read/injected. Give each injected experience a stable short alias (`E1`, `E2`, ...), include the tool boundary where it triggered when visible, and use the same aliases as the separate `experience_effects` field. Do not list case memory, trajectory memory, or the current case as loaded experiences. If none were loaded, write `none`.
      - EXPERIENCE EFFECTS FIELD: Judge experience effects in the separate `experience_effects` field only from visible execution evidence: injected reminder text, the candidate tool it preceded, actual tool args/content, user confirmations, policy/tool facts, evaluation feedback, and First Wrong Tool Call. Do not mark an experience negative merely because the rollout failed; mark it negative only when there is evidence that its trigger/content was over-broad or misleading for the actual wrong step.
      - GENERALIZE AGGRESSIVELY: Remove raw identifiers, personal names, contact values, exact dates, exact amounts, exact counts, exact locations/paths, and raw tool payloads. Use semantic placeholders such as selected reservation, requested amount, confirmed payment method, final required amount, source object, target object, or applicable policy.
      - MACHINE-PARSEABLE STYLE: Use exactly the labels and marker prefixes above (`A1.`, `R1.`, `R1 -> A1:`). Use concise markdown bullets. No extra headings, free paragraphs, code fences, or closing remarks.
    merge_op: patch
