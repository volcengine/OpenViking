memory_type: trajectories
description: |
  输出语言硬约束：生成的 memory 必须使用中文，不受对话语言或 {{ language }} 影响。所有自然语言字段都必须用中文，包括名称、检索锚点、摘要、要点和分析内容。固定 schema 标题、工具名、API/function 名、evaluation 字段名、enum 值、代码标识符和必要的引用字面量可保留原文。

  A compact, reusable operation contract distilled from an agent task trajectory.

  Extract when the agent worked through identifiable tasks involving decisions, tool calls, or multi-step actions.
  Skip pure chitchat or simple Q&A with no execution trace.
  Single-task extraction boundary: create at most ONE trajectory for the latest rollout/task. Treat the latest rollout as the only source of new memory. Ignore system policy text, retrieved memory_context/Experience Reminder examples, candidate/source memories, historical archive overviews, and general domain rules as extraction sources; they are only context for judging this rollout. Do not enumerate every policy rule, tool call, recalled memory, or hypothetical task into separate trajectories.

  IMPORTANT source filter for structured evaluation runs: if an earlier message contains a structured evaluation case spec, `task_signature`, `ground_truth`, visible evaluation, or final status/evaluation report, that final case identifies the ONLY current task. The extracted `trajectory_name`, `retrieval_anchor`, and `content` must be about that current case's user_query/evaluation/tool trace only. Any memory whose intent, target object, route/date or equivalent constraints, terminal action, or failure mode is not tied to that current case is invalid and must be omitted.

embedding_template: |-
  {{ trajectory_name }}

  {{ retrieval_anchor }}

directory: "viking://user/{{ user_space }}/memories/trajectories"
filename_template: "{{ trajectory_name }}_{{ extract_context.get_session_timestamp() }}.md"
enabled: true
operation_mode: "add_only"
stage: agent
peer_enabled: false
fields:
  - name: trajectory_name
    type: string
    description: |
      Name the task directly and stably.
      Must be written in Chinese (中文), regardless of {{ language }}.
      Use a concise Chinese noun phrase, max 15 Chinese characters.
      Do not create near-duplicate names for the same task.
      Good: "重复请求处理", "异步任务挂起修复", "补偿对象错绑".
      Prefer the reusable operation or decision boundary over raw instance wording from the opening request.
    merge_op: immutable

  - name: outcome
    type: string
    description: |
      Use exactly one of: success, failure, partial, unfinished, unknown.
    merge_op: immutable

  - name: retrieval_anchor
    type: string
    description: |
      Positive semantic retrieval text for this rollout analysis, written for embedding rather than display.
      Use Chinese (中文) for natural-language portions, while keeping the fixed labels, enum values, tool names, and evaluation field names unchanged.
      Format: "Intent: <booking|modification|cancellation|baggage|upgrade|refund_compensation|lookup|transfer|multi_intent|other>; Stage: <opening|after_read|before_write|after_write|terminal_handoff|final_response|evaluation_failure|evaluation_success>; Terminal action: <required final tool family or none>; Forbidden substitute: <tool/action that must not replace the terminal action or none>; Policy gates: <eligibility/confirmation/object-binding checks>; Failure mode: <none, missing expected action, wrong target, wrong args, premature handoff/done, policy mismatch, or other>; Target: <primary object or write/read boundary>."

      Rules:
      - Keep it shorter and more retrieval-focused than content.
      - For structured evaluation runs, the anchor must match the current case's primary intent and terminal action family; never anchor on an intent/tool family that appears only in retrieved memories, Experience Reminder, candidate_source_trajectory, policy text, or historical examples.
      - Describe when this analysis should be retrieved using positive applies-when language only.
      - Include the decisive user intent, terminal tool family, policy gate, failure/success mode, and target boundary, not raw case identifiers.
      - Use "Forbidden substitute" to mark harmful near-miss workflows, such as cancellation+recreation replacing an in-place update tool, handoff replacing an in-scope tool flow, or communicate/done replacing a required state-changing action.
      - Do not copy the opening request when the reusable lesson only becomes valid after reads, verification, failure, or a terminal boundary; anchor on the condition that was actually established.
      - Generalize identifiers, names, exact numbers, dates, places, amounts, and raw tool payloads as strictly as content unless the value is a stable policy constant or tool name.
    merge_op: immutable

  - name: content
    type: string
    description: |
      Eval-oriented rollout trajectory analysis in EXACTLY this format. Use Chinese (中文) for all natural-language prose, while keeping the section titles exactly as written below.

      # 结论
      <one concise sentence explaining the core success/failure/partial outcome. Start with the intent family, required terminal action, key policy gate, and forbidden substitute action when relevant. For failures, name the missed expected action, wrong object binding, wrong parameter, premature handoff/termination, or other primary failure.>

      # Evaluation 信号
      - Outcome: <success|failure|partial|unfinished|unknown>.
      - Reward: <visible reward/score/pass status if available; otherwise say evaluation not visible>.
      - DB/Communicate: <visible db_check, communicate reward, or other evaluation breakdown if available>.
      - Failed expected action: <the most important failed action_check, missing write, wrong args, or none/unknown>.

      # Expected vs Actual
      - Expected: <evaluation/action_checks expected tool/action sequence and key parameters, generalized when instance-local>.
      - Actual: <actual tool/action sequence and key parameters from the trajectory>.
      - Delta: <missing action, wrong target object, wrong amount/count/status, extra action, premature handoff/done, or no material delta>.

      # 事实链
      - User/task intent: <what the user was trying to accomplish>.
      - Candidate objects: <important retrieved objects and their decisive fields, such as status, count, membership, insurance, lifecycle state, ownership, or policy eligibility>.
      - Correct target: <object/action that best matches evaluation and verified tool facts>.
      - Wrong target or rejected path: <object/action the agent incorrectly followed, if any>.
      - Policy gates and terminal action: <policy eligibility, required confirmation, allowed terminal tool, and forbidden substitute tool/action>.

      # 实际轨迹偏离
      1. <chronological step showing the agent's first relevant read/decision/action>
      2. <first key divergence from the verified/evaluation-aligned path>
      3. <consequence that caused the final reward or task outcome>

      # 根因
      - Category: <one or more of object_binding_error, insufficient_retrieval, policy_misread, wrong_parameter_calculation, missing_tool_call, premature_handoff_or_done, user_misled_agent, environment_or_evaluation_mismatch, other>.
      - Explanation: <why that category explains the outcome, grounded in evaluation and tool facts>.

      # 正确做法
      1. <correct next read/verification step, if needed>
      2. <correct interpretation of misleading user claims versus tool facts>
      3. <correct final tool/action call or final response boundary, including key generalized parameters, and explicit note when cancel/book/handoff/done must NOT substitute for the expected terminal action>

      # 泛化规则
      - <reusable rule for future agents that would prevent this failure or preserve this success>
      - <second rule when useful>
      - <third rule when useful>

      Rules:
      - This trajectory is an evidence-driven structured evaluation rollout analysis, not a generic conversation summary and not a broad umbrella memory.
      - Treat evaluation feedback/action_checks as the strongest oracle when visible. Then use tool calls/tool outputs, then system policy, then user self-report.
      - For trajectory diagnosis, evaluation is the oracle; for later experience generalization, mark any evaluation-vs-policy conflict as non-generalizable or guardrail-only rather than converting it into a positive workflow.
      - The model may not see CaseSpec/rubric. Do not rely on CaseSpec unless it is present in the archived messages; evaluation feedback is sufficient to infer expected actions.
      - Always align expected vs actual actions. If action_match is false, check whether the tool was missing, used on the wrong object, had wrong arguments, or was preempted by handoff/done.
      - Reconstruct the factual chain from tool outputs before judging policy or user intent. User claims are clues only and must not override fresh tool observations.
      - Find the first key divergence, not merely the last failed message.
      - For failures involving state-changing tools, first decide whether the state-changing tool itself was expected. If visible evaluation/action_checks list only read/query tools (for example get_user_details/get_reservation_details) and DB reward is 0.0 after an actual write such as cancel_reservation/modify_reservation/book_reservation, treat the write as the primary forbidden substitute that caused DB mismatch; do NOT diagnose the failure as missing post-write verification, and do NOT present the write as correct.
      - AGENT-VISIBLE GATE MAPPING: When evaluation/action_checks are read-only but the live agent would not see those action_checks, translate the failure into observable runtime gates from the same trace whenever possible: verified object status, ownership, timestamp arithmetic, membership/cabin/insurance, user confirmation, refund eligibility, or other policy prerequisites. The Correct target/rejected path and 泛化规则 must be keyed to those observable facts, not to a hidden phrase such as "evaluation says query-only". If no observable policy gate explains why the write was forbidden, mark the positive workflow as non-generalizable/evaluation-only and avoid creating agent-facing execution guidance from it.
      - If the expected action list contains no write tool, the correct terminal boundary is the expected read/communication/refusal boundary from evaluation, even when domain policy might have allowed a write after confirmation. Evaluation remains the oracle for training memory; mark any policy-vs-evaluation tension explicitly instead of converting the actual write into a positive workflow. When an observable policy gate also forbids the write, state that gate as the reusable reason future agents can apply.
      - Do NOT label a query-only expected / actual-write / DB=0 failure as environment_or_evaluation_mismatch merely because the write tool returned success. Tool success only proves the write executed; DB mismatch plus query-only expected actions means the write changed state that evaluation expected to remain unchanged. Root cause must name the forbidden write, wrong eligibility decision, or wrong target/parameter that triggered it.
      - For cancellation eligibility involving a 24-hour window, compare full timestamps against the policy current time, not just calendar dates. If created_at is more than 24 hours before current time, the 24-hour cancellation gate is false; a user or prior support representative claim cannot override that tool timestamp. When a failure trace approved cancellation using an incorrect 24-hour calculation, diagnose `policy_misread` / `wrong_parameter_calculation` and mark cancel_reservation as forbidden.
      - For failures involving state-changing tools, explicitly identify the missed expected operation or wrong/forbidden write operation and its key parameter family.
      - For success trajectories, still record the decisive verification path and why it avoided likely traps.
      - If evaluation and policy appear to conflict, analyze the failure against evaluation first and note the conflict in 根因 or 正确做法.
      - Keep the output dense and diagnostic. Avoid long narrative retellings, apology text, or customer-facing phrasing.
      - Extract one record per rollout-level task outcome. Do not split every individual tool call into separate records unless there are truly independent task outcomes in the same session.
      - Hard cap: output at most ONE trajectory memory for the latest single-task rollout/task. If the conversation contains multiple user turns or sub-requests that belong to the same case, merge them into one trajectory centered on the final evaluated outcome. If more than one candidate record seems possible, keep only the one matching the current CaseSpec `task_signature`/user_query and the final evaluation delta; otherwise output no trajectory.
      - Source boundary: only extract lessons grounded in the actual latest user request, actual tool calls/tool outputs, assistant actions, visible CaseSpec/ground_truth/evaluation for the current case, and visible evaluation feedback. Do NOT extract memories from the domain policy document, tool schemas, Experience Reminder, retrieved memory_context, candidate/source memories, CaseSpec examples unrelated to the executed path, historical archive overviews, or general background instructions.
      - Negative source examples: memories named or described only inside Experience Reminder, memory_context, candidate_experience, or candidate_source_trajectory (for example unrelated cancellation, insurance, delay compensation, no-flight booking, cabin-change, or multi-modification cases) must not appear as trajectory_name, retrieval_anchor, Expected/Actual, 泛化规则, or any other new trajectory field unless the current user_query/tool trace/evaluation is about that exact intent.
      - If evaluation feedback is visible, use it to identify the single decisive expected-vs-actual delta. Do not create additional success or failure memories for other policy topics mentioned only in system text, Experience Reminder, memory_context, candidate memories, or retrieved memories.
      - Do not collapse independent intents into a broad reusable workflow in 泛化规则. Prefer narrow rules tied to one intent, one target boundary, one policy gate, and one terminal tool family.
      - When the failure is premature handoff/done or a missing state-changing tool, 泛化规则 must state the required terminal action and the forbidden substitute.
      - When the actual trajectory used cancellation/deletion plus recreation, explicitly distinguish whether that path is policy-eligible and user-confirmed; otherwise mark it as a rejected path, not a reusable positive workflow.
      - Generalize the session: remove raw identifiers, names, contact values, exact dates, case-specific amounts/counts, exact locations/paths, product names, and raw tool payloads unless the value is a stable policy constant or a tool/action name required for the reusable lesson. Use semantic placeholders such as expected write, target object, delayed segment, verified passenger count, policy amount, or computed amount.
      - Tool names, evaluation field names, action category names, and policy constants may remain exact when they are needed for future retrieval and execution.
      - For handoff/done, refusal, or requirement-unmet failures, keep trajectory content diagnostic and do not phrase 泛化规则 as a broad positive workflow. State the exact expected terminal family and forbidden substitute when evaluation shows one.
      - Trace tool boundary: if naming a tool in this memory, use only tools actually available in the latest trace or evaluation, or exact terminal tool names from the current rollout. Never output nonexistent, external, or candidate-only tools; rewrite to a current trace tool only when the current rollout supports it, otherwise omit the tool name.
      - Use exactly the eight headings above in this exact order. No extra headings, free paragraphs outside sections, or closing remarks.
    merge_op: patch
