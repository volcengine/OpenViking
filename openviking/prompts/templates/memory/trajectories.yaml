memory_type: trajectories
description: |
  输出语言策略：生成性自然语言必须使用 {{ language }}，包括名称、检索锚点、摘要、要点和分析内容。若原始内容多语言，以当前用户任务的主语言作为 {{ language }}；不明确时使用最新用户消息的语言。固定 schema 标题、工具名、API/function 名、evaluation 字段名、enum 值、代码标识符、ID、金额、日期、路径和必要的用户原文关键字面量必须保留原文。更新已有 memory 时优先复用已有名称和语言风格，避免创建同义翻译副本。

  本模板用于从 agent 任务轨迹中提炼一个紧凑、可复用的操作契约。
  当 agent 处理了包含决策、工具调用或多步骤动作的明确任务时才提取；纯闲聊或没有执行轨迹的简单问答不要提取。
  
  单任务边界：每个最新 rollout/task 最多创建一个 trajectory。只把最新 rollout 作为新 memory 的来源。系统 policy 和通用领域规则不能单独作为抽取来源；但当当前用户请求、工具观察、action/evaluation delta 或终态决策依赖某个 policy eligibility gate 时，必须把对应 policy 作为判断当前轨迹的上下文证据。忽略 retrieved memory_context、Experience Reminder、candidate/source memories 和历史 archive overview，不要从这些内容中抽取新 trajectory。不要把每条 policy、每次工具调用、召回 memory 或假设任务拆成单独 trajectory。

embedding_template: |-
  {{ trajectory_name }}

  {{ retrieval_anchor }}

directory: "viking://user/{{ user_space }}/memories/trajectories"
filename_template: "{{ trajectory_name }}_{{ extract_context.get_session_timestamp() }}.md"
enabled: true
operation_mode: "add_only"
stage: agent
peer_enabled: false
fields:
  - name: reasoning
    type: string
    description: |
      reasoning
    merge_op: immutable

  - name: trajectory_name
    type: string
    description: |
      直接、稳定地命名任务。
      新生成名称必须使用 {{ language }}。
      {% if language == 'en' %}Use lowercase snake_case, max 5 words.{% else %}使用简洁自然的 {{ language }} 名词短语，最多 15 个字符。{% endif %}
      不要为同一任务创建近似重复名称。
      好例子："重复请求处理"、"异步任务挂起修复"、"补偿对象错绑"。
      优先表达可复用的操作或决策边界，而不是照抄用户开场请求。
    merge_op: immutable

  - name: outcome
    type: string
    description: |
      只能使用以下值之一：success, failure, partial, unfinished, unknown。
    merge_op: immutable

  - name: retrieval_anchor
    type: string
    description: |
      为该 rollout 分析生成正向语义检索文本；它面向 embedding，而不是展示。
      自然语言部分使用 {{ language }}；固定 enum 值、工具名和 evaluation 字段名保留原文。
      建议格式："意图: <booking|modification|cancellation|baggage|upgrade|refund_compensation|lookup|transfer|multi_intent|other>; 阶段: <opening|after_read|before_write|after_write|terminal_handoff|final_response|evaluation_failure|evaluation_success>; 终态动作: <required final tool family or none>; 禁止替代: <tool/action that must not replace the terminal action or none>; Policy gates: <eligibility/confirmation/object-binding checks>; 失败模式: <none, missing expected action, wrong target, wrong args, premature handoff/done, policy mismatch, or other>; 目标: <primary object or write/read boundary>."

      规则：
      - 比 content 更短、更聚焦检索。
      - 若当前 trace 中存在 runtime 可见的 policy/object gate，retrieval_anchor 必须写这些 gate，不得出现 `训练oracle`、`ground_truth`、`oracle`、`预期动作列表`、`结构化评测`、`evaluation says query-only` 等 hidden-evaluation 词。
      - 结构化评测场景中，anchor 必须匹配当前 case 的主 intent 和终态动作族；不得锚定只出现在 retrieved memories、Experience Reminder、candidate_source_trajectory、policy 文本或历史样例里的 intent/tool family。
      - 使用正向适用条件描述该分析应在何时被检索。
      - 包含决定性的用户意图、终态工具族、policy gate、失败/成功模式和目标边界，不要包含原始 case id。
      - 用“禁止替代”标明有害近似流程，例如用取消+重建替代原地 update、用 handoff 替代可处理工具流，或用 communicate/done 替代必需的状态变更动作。
      - 当可复用 lesson 只有在读取、核验、失败或终态边界后才成立时，不要照抄开场请求；应锚定实际建立的条件。
      - 泛化 identifiers、姓名、精确数字、日期、地点、金额和原始 tool payload；稳定 policy 常量或必要工具名除外。
    merge_op: immutable



  - name: content
    type: string
    description: |
      生成 trajectory diagnostic，用于判断已读取的 experience 是否需要修改。
      这不是 experience 本身，也不是普通复盘；核心产物是“真实 rollout 执行路径”与
      “已读取 experience 的 `## Approach` 行”的对齐诊断。

      输出语言策略：
      - 生成性自然语言必须使用 {{ language }}。
      - 固定标题、DSL 关键字、枚举值、工具名、API/function 名、evaluation 字段名、
        代码标识符、ID、金额、日期、路径和必要的用户原文 literal 必须保留原文。
      - `# Machine Diagnosis` 的结构字段、函数名和枚举值保持英文稳定标识；
        其中 `repair_rationale`、`root_cause`、`expected`、`actual` 等自然语言字符串值使用 {{ language }}，
        但保留 exact tool/API names 和必要 source literals。
      - `# Human Diagnosis` 和 `# Generalizable Lesson` 的自然语言内容使用 {{ language }}；
        标题和 bullet label 固定不翻译，便于程序解析。

      必须严格输出以下 3 个一级标题，顺序不可变，不要增加额外一级标题：

      # Machine Diagnosis
      ```python
      # Loaded experiences
      # Actual path
      # Experience alignment
      diagnose(...)
      causal_audit([...])
      first_divergence(...)
      ```

      # Human Diagnosis
      - Outcome: <success|failure|partial|unfinished|unknown>.
      - Reward: <可见 reward/score/pass status；若不可见则写 evaluation not visible>.
      - Expected vs Actual: <evaluation/action_checks/CaseSpec 期望 vs 真实执行，泛化实例局部信息>.
      - First divergence: <第一个 materially changes reward 的偏离点；必须和 DSL 的 first_divergence 一致>.
      - Failure/success mechanism: <为什么 reward 成功/失败；不写隐藏思维过程>.
      - Memory effect: <每个相关 experience 的作用：missing、irrelevant、over_broad、misleading、ignored、too_weak、only_solved_secondary_issue、necessary、helpful_but_not_necessary 或 irrelevant>.
      - Repair decision: <应新增/更新/澄清/收窄/跳过哪一个 experience；必须和 diagnose(...).repair_action 一致>.

      # Generalizable Lesson
      - Core lesson: <一句话反思，说明未来 agent 应复用或避免什么>.
      - Correct behavior: <1-3 条 runtime-visible 的正确做法；不要依赖未来 agent 看见 evaluation/oracle>.
      - Experience update policy: <说明本 trajectory 支持的经验更新边界；若不应更新某 exp，明确写 no_update/skip_exp_update>.

      ## Machine Diagnosis DSL 规范

      DSL 必须放在 `# Machine Diagnosis` 下的单个 ```python 代码块中。
      DSL 目标是让 LLM/程序解析：真实业务路径、experience 对齐、诊断、显式根因审计和修复决策。

      ### 1) Loaded experiences
      - 只列实际读取的 experience memory，并给短别名。
      - 如果没有读取 experience，写 `loaded_experiences = none`。
      - 只读取 case/trajectory 不算 Loaded experiences。
      - 不要把 case 名、case memory 或 trajectory memory 写成 loaded experience。

      格式：
      ```python
      # Loaded experiences
      loaded_experiences = [
        E1("经验文件名.md"),
        E2("另一个经验.md"),
      ]
      ```

      ### 2) Actual path
      - 使用 `A1:`、`A2:`... 记录完整但紧凑的业务 tool、关键用户确认、最终沟通/完成步骤。
      - 不记录闲聊、重复 retry、search_experience/read_experience/read_file 等 memory loading plumbing。
      - 每行只保留关键 tool 名、泛化参数和决定性 output facts。
      - 路径只能来自真实 trace/tool calls；不要根据 experience 内容或 agent 自称补写不存在的工具调用。

      格式：
      ```python
      # Actual path
      A1: tool_name(arg="<generalized>") -> fact=value, fact2=value2
      A2: user_confirmed = observe_user_confirmation(...) -> true
      A3: communicate_with_user(...) -> key_info_status=missing
      A4: return DONE
      ```

      ### 3) Experience alignment
      - 每个实际影响决策的 experience 都要有一个 `E#` alignment 和一个 `diagnose(E#...)`。
      - 无关 experience 可以只列 `status: skipped_not_applicable` 和一行 note，但仍要 diagnose。
      - 只能用实际读取的 experience 做 `E1.Lx` 对齐。
      - 业务工具调用如果能对应到 experience 的 Python Approach 行，用 `Lx -> Ay <verdict>`。
      - 找不到对应行，写 `[trace].no_exp_line -> Ay extra_uncovered_action`，或在 `first_divergence(source=[trace].no_exp_line, ...)` 中标出。
      - 不允许 `L1-L3 -> A1-A3` 这种范围对齐；必须逐行或选择关键单行。
      - 不要输出无法被简单正则解析的长段落。

      常用 verdict：
      - `matched`
      - `missing_expected_call`
      - `matched_but_wrong_policy`
      - `wrong_args`
      - `wrong_target`
      - `ambiguous_match`
      - `extra_uncovered_action`
      - `skipped_not_applicable`

      格式：
      ```python
      # Experience alignment
      E1 "经验文件名.md":
        status: matched|first_divergence_source|skipped_not_applicable|misleading|over_broad|ignored|only_solved_secondary_issue
        L1 -> A1 matched
        L2 -> ∅ missing_expected_call
              expected: exact_tool_name(...)
              actual: A3 communicate_with_user(...)
      ```

      ### 4) diagnose(...) 枚举

      每个相关 `E#` 后必须输出一个 diagnose 调用。`repair_rationale` 是自然语言字符串，
      必须使用 {{ language }}，但保留 exact tool/API names、line refs 和 enum values：
      ```python
      diagnose(E1,
        exp_quality="correct|wrong|underspecified|over_broad|not_applicable|missing",
        execution_relation="followed|not_followed|partially_followed|misapplied|ignored|no_applicable_exp",
        repair_action="no_update|update_approach|clarify_approach|narrow_situation|add_reflect_guardrail|create_new_exp|skip_exp_update",
        repair_rationale="concise auditable repair rationale in {{ language }}"
      )
      ```

      诊断含义：
      - `correct + not_followed`：exp 已经写对，但 agent 没按它执行；通常 `no_update` 或 `add_reflect_guardrail`。
      - `wrong + followed`：agent 按 exp 执行所以出错；通常 `update_approach`。
      - `underspecified + partially_followed`：exp 没说清楚导致乱执行；通常 `clarify_approach`。
      - `over_broad + misapplied`：exp 适用边界过宽导致误用；通常 `narrow_situation`。
      - `missing + no_applicable_exp`：没有合适 experience；通常 `create_new_exp`。
      - `not_applicable`：当前 exp 不适用；通常 `skip_exp_update`。

      ### 5) causal_audit([...])

      在 first_divergence 前必须输出一个 `causal_audit([...])`，用于显式展示根因分析过程。
      这不是隐藏思维链，而是可审计的 evidence-based reasoning summary；必须只基于 trace/tool facts、policy、用户确认、evaluation/action_checks/CaseSpec 等可见证据。
      每个 `audit_step` 必须短小、结构化、可被程序解析，不要写自由长文。

      格式：
      ```python
      causal_audit([
        audit_step(kind="reward_delta", evidence="visible evaluation/tool fact", inference="what failed or succeeded"),
        audit_step(kind="first_bad_decision", evidence="A# / E#.L# / [trace] ref", inference="earliest material divergence"),
        audit_step(kind="ruled_out", evidence="why another explanation is not primary", inference="not the root cause"),
        audit_step(kind="repair_implication", evidence="diagnose(...).repair_action", inference="what should or should not be changed")
      ])
      ```

      规则：
      - 必须包含 3-6 个 `audit_step`，按因果顺序排列。
      - `kind` 只能使用：`reward_delta`、`expected_path`、`actual_path`、`first_bad_decision`、`runtime_visible_cause`、`ruled_out`、`experience_effect`、`repair_implication`。
      - `evidence` 写可见证据引用，例如 `A4`, `E1.L5`, `evaluation db_check`, `tool fact allow_cancel=false`。
      - `inference` 写由该证据支持的结论；不要输出逐字内心独白，不要使用“我先想/然后我想到”等隐藏 CoT 风格。
      - 至少包含一个 `ruled_out`，用于排除一个容易误修的归因，例如“不是 exp 错，而是未执行”、“不是业务 write 错，而是最终沟通漏答”。
      - `causal_audit` 的最后一步必须和 `first_divergence.root_cause` 及 `diagnose(...).repair_action` 一致。

      ### 6) first_divergence(...)

      最后必须输出且只输出一次全局 first_divergence。`expected`、`actual`、`root_cause`
      是自然语言字符串，必须使用 {{ language }}，但保留 exact tool/API names、
      line refs、enum values 和必要 source literals：
      ```python
      first_divergence(
        error="MissingExpectedCall|WrongArguments|WrongTargetObject|ForbiddenSubstituteCall|PrematureCompletion|BranchConditionError|MissingCommunication|MissingWrongCommunication|NoApplicableExperience|None",
        source=E1.Lx|E2.Lx|[trace].no_exp_line|None,
        expected="... in {{ language }}",
        actual="... in {{ language }}",
        root_cause="concise auditable causal analysis in {{ language }}",
        repair_target=E1|E2|None
      )
      ```

      规则：
      - 选择时间顺序上第一个 materially changes reward 的偏离点。
      - 如果 outcome 是 success 且没有 material delta，使用 `error="None"`、`source=None`、`root_cause="no material divergence"`、`repair_target=None`。
      - `root_cause` 必须总结 `causal_audit` 的结论：保留可审计因果链，不输出隐藏思维过程、逐字内心独白或“我想/我认为”的主观过程。
      - `root_cause` 应同时覆盖三点：failure trigger（哪个动作/缺失首先改变 reward）、runtime-visible cause（trace/tool fact/policy gate/用户确认/对象绑定/待回答项中哪个可见信号导致走偏）、repair implication（应该修 exp、加 guardrail、还是跳过 exp 更新）。
      - `root_cause` 不要只写“忽略 evaluation”；要翻译成未来 agent 运行时可见的错误类型，例如 skipped terminal write、wrong policy gate evaluation、ambiguous experience line、wrong target binding、missing pending answer tracking、wrong aggregate scope。
      - 如果失败是沟通/聚合值问题，不要把业务操作 exp 作为 repair_target，除非该 exp 的 scope 明确覆盖该沟通义务。
      - 若偏离来自两个 experience 的冲突，source 指向 agent 实际采纳的错误行，并在 diagnose repair_rationale 中写出 conflicting source。

      ## 证据与安全规则

      - Evidence priority：Expected vs Actual 优先使用 evaluation/action_checks/CaseSpec；之后依次使用 tool facts、policy、user self-report。
      - Root-cause audit：先找第一个改变 reward 的决策点，再写 lesson；必须通过 `causal_audit` 输出显式、可审计的根因推理摘要，但不要输出隐藏 chain-of-thought 或主观内心独白。
      - Fix only the failed part：做对的业务步骤不要反着学；若只是最终沟通失败，不要把正确业务流程改成 forbidden 或替换路径。
      - Memory loading boundary：memory loading 是证据，不是业务动作；不得写入 Actual path。
      - Agent-facing lesson must be runtime-visible：`Correct behavior` 和 `Generalizable Lesson` 不要依赖隐藏 evaluation/oracle；把 evaluation 暴露的问题翻译成用户问题、tool facts、policy gate、对象绑定或确认边界。
      - Communication deltas：如果只有 communicate failed，主 delta 是 missing/wrong communication，不是 missing write、forbidden write、missing done。
      - Policy-gated decisions：对 policy-gated write，必须从 tool outputs 重建 gate；用户或客服口头说法不能覆盖 policy + tool facts。
      - Generalization discipline：泛化人名、reservation/order id、路线、精确日期、金额、路径和 raw payload；稳定 policy 常量或必要工具名除外。
      - Consistency check：`causal_audit`、`first_divergence`、`diagnose`、`Human Diagnosis`、`Generalizable Lesson` 必须一致。
      - Output discipline：严格保留 3 个 required headings 及顺序；不要加额外一级标题或结尾语。

      ## Few-shot examples

      ### Exp 正确但 agent 未执行 terminal write
      ```md
      # Machine Diagnosis
      ```python
      # Loaded experiences
      loaded_experiences = [
        E1("航班改签确认.md"),
        E2("改签后最终沟通.md"),
      ]

      # Actual path
      A1: reservation = get_reservation_details(reservation_id="<reservation_id>") -> status=active, owner_verified=true
      A2: quote = quote_flight_change(reservation=reservation, new_flights="<new_flights>") -> price_delta_accepted=true
      A3: user_confirmed = observe_user_confirmation(quote) -> true
      A4: communicate_with_user("change is ready")
      A5: return DONE

      # Experience alignment
      E1 "航班改签确认.md":
        status: first_divergence_source
        L1 -> A1 matched
        L3 -> A2 matched
        L4 -> A3 matched
        L5 -> ∅ missing_expected_call
              expected: update_reservation_flights(...)
              actual: A4 communicate_with_user(...) + A5 DONE

      diagnose(E1,
        exp_quality="correct",
        execution_relation="not_followed",
        repair_action="no_update",
        repair_rationale="E1.L5 already required the terminal update write after quote and confirmation; actual path skipped it, so the experience should not be rewritten."
      )

      E2 "改签后最终沟通.md":
        status: skipped_not_applicable
        note: applies only after terminal write succeeds; terminal write was missing

      diagnose(E2,
        exp_quality="correct",
        execution_relation="ignored",
        repair_action="skip_exp_update",
        repair_rationale="Communication experience was not the first divergence, so updating it would not fix the missing terminal write."
      )

      causal_audit([
        audit_step(kind="reward_delta", evidence="evaluation db_check + missing update_reservation_flights", inference="reward changed because the required terminal write never happened"),
        audit_step(kind="expected_path", evidence="E1.L5 after A2 quote and A3 user_confirmed=true", inference="the loaded experience already required update_reservation_flights(...)"),
        audit_step(kind="first_bad_decision", evidence="A4 communicate_with_user(...) + A5 DONE", inference="the first material divergence was treating communication as completion before the write"),
        audit_step(kind="ruled_out", evidence="E1.L5 explicitly required the write", inference="the primary cause is not a wrong experience; it is not_followed execution"),
        audit_step(kind="repair_implication", evidence="diagnose(E1).repair_action=no_update", inference="do not rewrite E1; add execution guardrail only if needed")
      ])

      first_divergence(
        error="MissingExpectedCall",
        source=E1.L5,
        expected="update_reservation_flights(...) before final response",
        actual="A4 communicate_with_user(...) then A5 DONE",
        root_cause="The quote and confirmation gates were satisfied, but the agent treated progress communication as completion and skipped the E1.L5 terminal write; repair should focus on execution/guardrail rather than changing the already-correct experience.",
        repair_target=E1
      )
      ```

      # Human Diagnosis
      - Outcome: failure.
      - Reward: DB failed because terminal write was missing.
      - Expected vs Actual: expected quote + confirmation + update write; actual stopped after communication.
      - First divergence: E1.L5 was skipped.
      - Failure/success mechanism: business update never happened.
      - Memory effect: E1 was correct but not followed; E2 was not applicable before the write.
      - Repair decision: no_update for E1; do not modify E2.

      # Generalizable Lesson
      - Core lesson: Correct retrieved experience is not enough; terminal writes must actually be executed after their gates are satisfied.
      - Correct behavior: After quote and explicit confirmation, call the exact update tool before final communication.
      - Experience update policy: Do not update an already-correct Approach when failure came from not following it.
      ```

      ### Agent 按 exp 执行，但 exp 本身错误/过宽
      ```md
      # Machine Diagnosis
      ```python
      # Loaded experiences
      loaded_experiences = [E1("取消请求处理.md")]

      # Actual path
      A1: reservation = get_reservation_details(reservation_id="<reservation_id>") -> status=confirmed, cabin=economy
      A2: user = get_user_details(user_id="<user_id>") -> membership=tier_without_cancel_override
      A3: cancel_result = cancel_reservation(reservation_id="<reservation_id>") -> success=true
      A4: communicate_with_user("reservation cancelled")

      # Experience alignment
      E1 "取消请求处理.md":
        status: first_divergence_source
        L1 -> A1 matched
        L2 -> A2 matched
        L4 -> A3 matched_but_wrong_policy
              expected_by_exp: cancel_reservation(...)
              expected_by_evaluation: communicate_refusal_or_handoff(...)
              runtime_gate: allow_cancel=false

      diagnose(E1,
        exp_quality="wrong",
        execution_relation="followed",
        repair_action="update_approach",
        repair_rationale="Agent followed E1.L4, but E1.L4 allowed cancel_reservation even though runtime-visible allow-cancel gates were false; the experience must encode the gate before the write."
      )

      causal_audit([
        audit_step(kind="reward_delta", evidence="evaluation db_check + A3 cancel_reservation success", inference="reward changed because a forbidden state-changing cancellation was executed"),
        audit_step(kind="runtime_visible_cause", evidence="tool fact allow_cancel=false", inference="runtime policy facts did not permit cancel_reservation(...)"),
        audit_step(kind="experience_effect", evidence="E1.L4 -> A3 matched_but_wrong_policy", inference="agent followed an experience line that recommended the wrong terminal action under this gate"),
        audit_step(kind="ruled_out", evidence="A3 matched E1.L4", inference="the primary cause is not ignoring the experience; it is following a wrong or over-broad line"),
        audit_step(kind="repair_implication", evidence="diagnose(E1).repair_action=update_approach", inference="update or narrow E1 so allow_cancel=false blocks the write")
