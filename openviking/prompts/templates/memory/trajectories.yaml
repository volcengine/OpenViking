memory_type: trajectories
description: |
  Extract a compact factual execution record from an agent trajectory.

  A trajectory memory is evidence for later experience extraction, not an experience and not
  a final root-cause judgment. Preserve what happened, what was requested, what was read,
  what was written/communicated, what succeeded, what failed, and which runtime facts are
  uncertain. Do not propose injectable reminders, do not write production experience content,
  and do not recommend create/update/delete operations for experiences.

embedding_template: |-
  {{ trajectory_name }}

  {{ retrieval_anchor }}

directory: "viking://user/{{ user_space }}/memories/trajectories"
filename_template: "{{ trajectory_name }}_{{ extract_context.get_session_timestamp() }}.md"
enabled: true
operation_mode: "add_only"
agent_only: true

fields:
  - name: trajectory_name
    type: string
    description: |
      Name the observed boundary or failure/success pattern, not the final lesson.
      Must be written in {{ language }}.
      {% if language == 'en' %}Use lowercase snake_case, max 6 words.{% else %}Use a concise noun phrase, max 18 characters.{% endif %}
      Good: "aggregate_scope_observed", "wrong_value_source", "confirmation_scope_trace", "总费用范围记录".
    merge_op: immutable

  - name: outcome
    type: string
    description: |
      Use exactly one of: success, failure, partial, unfinished, unknown.
      success means the task's required state/actions and required communication were completed.
      failure means a material requirement failed.
      partial means some important work succeeded but one material requirement failed.
      unfinished means the task stopped before the necessary terminal action/answer.
      unknown means the evidence is insufficient.
    merge_op: immutable

  - name: retrieval_anchor
    type: string
    description: |
      Positive semantic retrieval text for embedding, not display.
      Format exactly:
      "Stage: <opening|after_read|before_confirmation|before_write|after_write|final_response|terminal_handoff>; Boundary: <observed runtime boundary>; Capability: <read|write|policy|calculation|communication|handoff>; Target: <semantic object/value role>; Outcome: <success|failure|partial|unfinished|unknown>."

      Generalize identifiers, names, exact amounts, dates, task numbers, and raw payload values.
      Anchor on the observed boundary where later experience extraction should inspect evidence.
    merge_op: immutable

  - name: experience_effects
    type: string
    description: |
      Machine-readable JSON object about injected experience reminders observed in this run.
      Output ONLY a valid compact JSON object, not markdown and not a code block.

      Required shape:
      {"positive_ids":["E1"],"negative_ids":[],"weak_ids":[]}

      If no experience reminder was injected, output exactly:
      {"positive_ids":[],"negative_ids":[],"weak_ids":[]}

      positive_ids: injected experiences that appeared necessary/helpful in the observed run.
      negative_ids: injected experiences that appeared misleading or over-broad in the observed run.
      weak_ids: injected experiences that were relevant but insufficient in the observed run.
      Use only IDs from the injected list. Do not invent IDs. If unsure, leave the arrays empty.
    merge_op: immutable

  - name: content
    type: string
    description: |
      Write in {{ language }}. Keep raw tool names, schema keys, and quoted runtime values unchanged.

      You are producing a compact factual trace for downstream experience extraction. Your job is
      to preserve enough runtime evidence for a later extractor to compare multiple trajectories
      and decide the true reusable experience. Do not decide the final experience here.

      ## Do NOT output
      - No `Counterfactual Ideal Experience` section.
      - No `Runtime experience content`.
      - No `Experience Repair Signal`.
      - No `Recommended operation`, `New experience action`, `Selected candidate`, or C1/C2/C3.
      - No instructions that should be injected into a future agent.
      - No broad advice such as "check all requirements" or "include all information".

      ## What to preserve
      Preserve concrete runtime evidence, especially:
      - user request and confirmations that created obligations;
      - retrieved records, candidate objects, policy facts, source fields, and calculations;
      - read/discovery scope versus mutation/write scope;
      - communication obligations and final user-visible content;
      - expected versus observed object/value/scope/source-field differences;
      - correct actions/messages that should be preserved;
      - uncertainty and competing interpretations.

      ## Output Format
      Output exactly ONE markdown record with the labels below. Do not add extra top-level sections.

      # <trajectory_name>
      - Outcome: <success|failure|partial|unfinished|unknown>
      - Domain: <task/tool domain>
      - User Goal: <generalized user goal, no task id>
      - Injected Experiences:
        - Loaded: <semantic names or none>
        - Helpful: <which loaded reminders appeared helpful, or none>
        - Misleading: <which loaded reminders appeared misleading/over-broad, or none>
        - Insufficient: <which loaded reminders were relevant but incomplete, or none>
      - Timeline:
        - User request: <relevant user wording and obligations, generalized>
        - Reads: <important read tools and semantic records/fields retrieved>
        - Decisions: <important branch/calculation/scope/object decisions the agent made>
        - Writes: <write tools called, target object roles, whether observed correct/incorrect/unknown>
        - Communication: <user-visible answer/summary/value/list given or omitted>
        - Termination: <done/handoff/unfinished and any side effects>
      - Outcome Checks:
        - Required state/actions: <passed|failed|partial|unknown; evidence in runtime terms>
        - Required communication: <passed|failed|partial|unknown; evidence in runtime terms>
        - Other required effects: <passed|failed|partial|unknown|none>
      - Correct Work To Preserve:
        - <correct reads/actions/messages/policy branches that later experience extraction should not block, or none>
      - Observed Problem:
        - Failure type: <wrong_arguments|wrong_object|wrong_policy_branch|missing_confirmation|missing_communication|premature_write|extra_write|premature_done|tool_error|calculation_error|scope_substitution|wrong_source_field|none|unknown>
        - First observed divergence: <earliest observable boundary where behavior diverged, or none/unknown>
        - Candidate bad behavior: <tool/action/message/calculation shape that appears risky, or none>
        - What was missing/wrong: <runtime fact, object binding, value, policy gate, confirmation, or communication that differed, or none>
      - Value/Scope Trace:
        - Requested value/list/summary role: <semantic role, or none>
        - Request-time scope: <object set/value scope implied when user asked, or none/unknown>
        - Agent-used scope: <scope actually used in tool/message/calculation, or none/unknown>
        - Post-action/current scope: <scope after later writes if different/relevant, or none/unknown>
        - Explicit exclusions from user wording: <semantic roles explicitly excluded by user's own words, or none>
        - Ambiguous references: <relative terms such as other/remaining/those/其他/剩余 and plausible scopes, or none>
      - Source Field Trace:
        - Expected source fields: <runtime fields/tool text that appear relevant to the required value, or none/unknown>
        - Agent-used source fields: <runtime fields or derivation actually used, or none/unknown>
        - Canonical value fields observed: <explicit total/paid/charged/order/payment amount fields if present, or none/unknown>
        - Line-item derivation observed: <line-item formula if used or available, or none/unknown>
        - Difference type: <omitted|calculation_error|scope_substitution|wrong_source_field|none|unknown>
      - Diagnostic Hints:
        - Possible causes: <bounded hypotheses supported by observed evidence; write none if insufficient>
        - Evidence for: <facts supporting those hypotheses, or none>
        - Evidence against / uncertainty: <facts that make the diagnosis uncertain or ambiguous, or none>
        - Near-miss risk: <nearby correct behavior that a future experience must avoid harming, or none>
      - Raw Evidence:
        - User/request snippets: <short relevant snippets or none>
        - Tool/result snippets: <short relevant snippets, field names, IDs/values only as evidence, or none>
        - Final message snippets: <short relevant snippets or none>
      - Result: <concise final outcome and side effects>

      ## Rules
      - Be factual and compact. Prefer evidence over interpretation.
      - Do not hide uncertainty. If the trace does not prove the expected scope/source field,
        write unknown/uncertain instead of inventing a root cause.
      - Do not generalize IDs, dates, names, or exact amounts into rules. Exact literals may appear
        only under `Raw Evidence` when they are needed to audit the trace.
      - Distinguish information/read scope from mutation/write scope. Extra records read for
        discovery or communication do not become write targets unless user wording confirms that.
      - For value/aggregate/list/summary requests, record request-time scope, agent-used scope,
        post-action/current scope, explicit exclusions, and ambiguous references separately.
      - For monetary/value answers, record both canonical fields and line-item derivations if
        visible. Do not decide here which one should be the final reusable rule unless the runtime
        evidence directly shows the agent used a different source than the requested value.
      - If the run succeeded, record the successful path and why it appears safe; do not produce a
        success-path SOP or an injectable reminder.
      - If an injected experience was misleading, record how it influenced observed behavior; do
        not rewrite the experience here.

    merge_op: patch
