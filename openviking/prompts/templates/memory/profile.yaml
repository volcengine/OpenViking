memory_type: profile
description: |
  # Task Objective
  User profile memory - captures "who the user is" as a person.
  Extract relatively stable personal attributes that define the user's identity, work style, and preferences.
  Include: profession, experience level, technical background, communication style, work habits, etc.
  Do NOT include transient conversation content or temporary mood states.

  # Rules
  - Each item: self-contained, declarative sentence, < 30 words
  - Extract only facts stated/confirmed by user; no guesses
  - Focus on persistent information, not temporary situations
  - **IMPORTANT**: When extracting attributes, preserve ALL qualifying details and specific descriptors.
    Do NOT strip away specifics that distinguish one fact from a more general category.
    Examples of what to PRESERVE:
    - "counseling for Transgender people" NOT just "counseling"
    - "plays clarinet and violin" NOT just "plays clarinet"
    - "moved from Sweden 4 years ago" NOT just "moved"
    - "symbols: Rainbow flag, transgender symbol" NOT just "Rainbow flag"
    - "painted sunsets with palm trees" NOT just "painted nature"
  - **IMPORTANT**: Record enumerations completely — if the user lists multiple items
    (instruments, books, symbols, pets, children count), list ALL of them, not just the first.
  - **IMPORTANT**: Record specific content that defines the user's experience:
    exact poster/sign text, artwork subjects, reasons/motivations expressed by the user.
  - Forbidden: events, only-assistant content, sensitive/private info, trivial updates
  - Merge similar items; keep latest if conflicting
  - Organize related items under ## sub-headings by topic (e.g., ## Identity, ## Career,
    ## Art, ## Music, ## Pets, ## Family, ## Books) so related facts are grouped together
  - **IMPORTANT**: When the user states a summary, conclusion, or description about their
    life direction, relationships, or future intentions, record it verbatim.
    Examples: "described their journey together as an ongoing adventure of learning and growing",
    "would likely not go on another road trip soon since the last one went badly"
  - **IMPORTANT**: When a count or duration is inferable from the conversation, state it
    explicitly. Examples: "3 children" (not just "2 younger kids and a youngest daughter"),
    "practicing art since 2016" (not just "into art for seven years")
  - **CRITICAL**: Do NOT convert relative time expressions to calculated absolute dates.
    LLMs frequently miscalculate dates (e.g., "Friday before July 15" is July 14, not July 7).
    Instead, record the relative expression AS-IS so the reader can interpret it correctly:
    "on the Friday before 2023-07-15" (NOT "on 2023-07-07")
    Only include absolute dates when they are stated directly in the original conversation.


directory: "viking://user/{{ user_space }}/memories"
filename_template: "profile.md"
enabled: true
fields:
  - name: content
    type: string
    description: |
      User profile content in Markdown format describing "who the user is".
      Includes relatively stable personal attributes: profession, experience, tech stack, communication style, etc.
      Only record objective statuses, do not record events or similar information.
      [IMPORTANT] For changeable statuses, must include the last updated time in the format: (as of 2023-06-09)
      [IMPORTANT] When recording preferences or activities, include specific details:
      what was painted/drawn (not just "painting"), what instruments (list ALL instruments),
      what symbols (list ALL symbols), what books (list ALL books mentioned),
      how many children (explicit count), relationship status (explicitly stated).
      [IMPORTANT] Organize using ## sub-headings by topic so related facts are co-located.
      [IMPORTANT] Add a ## Summary section at the top (right after the user's name heading)
      with a concise bullet list of the most important facts: name, identity, family count,
      relationship status, key durations, core activities. This summary ensures critical
      facts are always visible even when the full profile is too long to fit in context.
      [IMPORTANT] When a count or duration can be inferred, state it explicitly:
      "3 children" not "2 younger kids and a youngest daughter",
      "practicing art since 2016" not "into art for seven years",
      "married 5 years" not just "married".
      [IMPORTANT] Do NOT convert relative time expressions to calculated absolute dates.
      Record the relative expression as-is: "on the Friday before 2023-07-15" (NOT "on 2023-07-07").
      Example:
      # Caroline
      ## Summary
      - Transgender woman, moved from Sweden 4 years ago
      - Single, planning to adopt
      - Career: counseling/mental health for Transgender people
      - Art: painting, drawing flowers; symbols: Rainbow flag, transgender symbol
      - Music: acoustic guitar, piano
      - Pets: guinea pig Oscar
      ## Identity
      - Transgender woman
      - Moved from Sweden 4 years ago (as of 2023-06-27)
      - Relationship status: Single (as of 2023-05-25)
      ## Career
      - Exploring counseling or mental health work for Transgender people (as of 2023-07-12)
      ## Art
      - Painting: sunsets, abstract, trans experience pieces
      - Drawing: flowers
      - Symbols important: Rainbow flag, transgender symbol
      - Art symbolizes: freedom and being true to herself
      ## Music
      - Plays: acoustic guitar (5 years), piano (learning)
      ## Pets
      - Guinea pig named Oscar
      ## Family Plans
      - Researching adoption agencies (as of 2023-08-23)
    merge_op: patch
