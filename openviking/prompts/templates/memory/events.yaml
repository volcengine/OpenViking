memory_type: events
description: |
  Event memory - captures "what happened, what decision was made, and why".
  Extract notable events, decisions, milestones, and turning points from the conversation.
  Events should be things worth remembering for future context: decisions made, agreements reached, milestones achieved, problems solved, etc.
  Each event should include: what happened, why it happened, what the outcome was, and any relevant context/timeline.
  Use absolute dates for event_time, not relative time like "today" or "recently".
directory: "viking://user/{user_space}/memories/events"
filename_template: "{event_time}_{event_name}.md"
enabled: true
# 操作模式：add_only 表示只新增记忆，不需要查看之前的记忆列表
# upsert 表示新增或更新（默认行为）
operation_mode: "add_only"
content_template: |
  {% set msg_range = extract_context.read_message_ranges(ranges|default('')) if extract_context else None %}
  {% set first_time = msg_range.first_message_time() if msg_range else None %}
  time: {{event_time|default(first_time if first_time else 'N/A')}}
  {% if extract_context %}
  {{ msg_range.pretty_print() if msg_range else '' }}
  {% endif %}


fields:
  - name: event_name
    type: string
    description: |
      Event name in Chinese or English. If English, use lowercase with underscores, max 3 words. Do not include any dates.
    merge_op: immutable

  - name: event_time
    type: string
    description: |
      Time when the event occurred, format “2026-03-17” / “2026-03” / “2026”. If unknown, use current time.
    merge_op: immutable

  - name: ranges
    type: string
    description: |
      Conversation message index ranges to extract, format: "start-end,start-end,..."
      Example: "0-10,50-60" means extract messages 0-10 and 50-60.
    merge_op: immutable
