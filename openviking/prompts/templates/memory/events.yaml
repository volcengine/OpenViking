memory_type: events
description: |
  # Guidelines
  - The summary must include information records related to the entities involved, with attention to detail, especially emphasizing commitments, agreements, or proposals that may be referenced in the future (for example: Xiaoming once asked, "Do you need me to help you get a membership?" and Xiaosen replied, "Let's talk about it later"), and nothing should be omitted. If there is a time expression (such as "yesterday"), the date must be converted to a specific year, month, and day format according to when the event occurred.
  - Include all facts as comprehensively as possible, especially requests made by specific roles and mark major events.
  - Convert dialogue into indirect speech, covering emotions and speaker characteristics, recording the user's emotional state, conversation content, emotional feedback (such as happy, sad, curious, etc.), and the assistant's response.
  - Create a coherent narrative, retaining key dramatic elements.
  - Use a third-person perspective.
  - If possible, combine the user's current behavior and reactions to speculate on the user's possible thoughts or actions.
  - Describe the complete content of an event within a single event as much as possible; do not split one event into multiple parts.
  - Record content that mentions time.
  - **IMPORTANT**: Preserve ALL specific details in the summary — do NOT replace specific descriptions with vague summaries.
    Examples of what to PRESERVE:
    - "posters saying 'Trans Lives Matter'" NOT just "pride posters"
    - "a cup with a dog face on it" NOT just "pots"
    - "painted a sunset with a palm tree" NOT just "painted a nature piece"
    - "a sign stating that someone is not being able to leave" NOT just "a sign"
    - "felt in awe of the universe" NOT just "enjoyed the meteor shower"
    - "plays clarinet and violin" NOT just "plays clarinet"
  - **IMPORTANT**: When a user describes WHY they do something or HOW they feel, record the
    reason/feeling verbatim. Do NOT generalize or paraphrase.
    Example: "chose colors to catch the eye and make people smile" NOT just "used colors"
  - **CRITICAL**: When converting relative time expressions (like "last Tuesday",
    "the weekend before X", "two weeks ago"), calculate the EXACT date carefully.
    Common errors to avoid:
    - "the Tuesday before July 20" = July 18 (NOT July 11)
    - "two weekends before July 17" = July 1-2 (NOT July 8-9)
    - "the Sunday before May 25" = May 21 (NOT May 20 — May 20 is Saturday)
    - "the weekend before July 17" = July 15-16 (NOT July 17 itself)
    Always verify: count backwards from the reference date to the target weekday.
    Record BOTH the relative expression AND the calculated absolute date:
    "on the Tuesday before 2023-07-20 (2023-07-18)"
directory: "viking://user/{{ user_space }}/memories/events"
filename_template: "{{ extract_context.get_year(ranges) }}/{{ extract_context.get_month(ranges) }}/{{ extract_context.get_day(ranges) }}/{{ event_name }}.md"
enabled: true
# 操作模式：add_only 表示只新增记忆，不需要查看之前的记忆列表
# upsert 表示新增或更新（默认行为）
operation_mode: "add_only"
content_template: |
  time: {{extract_context.get_first_message_time_with_weekday_from_ranges(ranges|default(''))|default('N/A')}}
  {{ extract_context.get_event_content(ranges, summary) }}


overview_template: |-
  # Events Overview
  {% if items %}**Date:** {{ extract_context.get_year(items[0].file_content.ranges|default(''))|default('') }}/{{ extract_context.get_month(items[0].file_content.ranges|default(''))|default('') }}/{{ extract_context.get_day(items[0].file_content.ranges|default(''))|default('') }}{% endif %}
  {% for item in items %}
  - [{{ item.file_content.summary }}](./{{ item.file_name }})
  {% endfor %}

fields:
  - name: event_name
    type: string
    description: |
      Event name in Chinese or English. If English, use lowercase with underscores, max 3 words. Do not include any dates.
    merge_op: immutable

  - name: goal
    type: string
    description: |
      Summarize the purpose of the content in 5 words or less

  - name: summary
    type: string
    description: |
      Based on the content of the above fields, compile a description to outline the complete Fact content.
      Use specific year-month-day dates instead of vague terms such as yesterday, last week, and tomorrow.

  - name: ranges
    type: string
    description: |
      Conversation message index ranges to extract, format: "start-end,start-end,..."
      Example: "0-3,40-45" means extract messages 0-3 and 40-45.
    merge_op: immutable

