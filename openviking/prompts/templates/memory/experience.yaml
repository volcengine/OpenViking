memory_type: experience
description: |
  A generalizable, reusable insight distilled from agent execution — not a process record.
  Captures a transferable pattern: what situation triggers it, what approach works, and why.

directory: "viking://agent/{{ agent_space }}/memories/experiences"
filename_template: "{{ experience_name }}.md"
enabled: true
operation_mode: "upsert"
agent_only: true

fields:
  - name: experience_name
    type: string
    description: |
      Lowercase snake_case, ASCII only, max 5 words. Name the generalizable pattern, not the specific instance.
      Do not use Chinese.
      Good: "booking_duplicate_handling", "pytest_asyncio_cancel_hang_fix".
    merge_op: immutable

  - name: content
    type: string
    description: |
      Structured experience in EXACTLY this 4-section format:

      ## Situation
      <markdown bullets: trigger conditions and context where this pattern applies>

      ## Key Facts
      <markdown bullets: specific, concrete facts discovered during execution that are directly reusable — exact values, parameters, paths, error patterns, missing components. Only include facts that would NOT be obvious from the task description alone.>

      ## Approach
      <markdown bullets: the effective strategy or key steps to take>

      ## Reflect
      <markdown bullets: distilled principles — why the approach works, what risks or failure modes exist, and actionable rules to follow in future>

      Rules:
      - Use exactly these 4 headings in this order.
      - Each section uses concise markdown bullets (no numbered lists, no nested headings).
      - **Key Facts** is the most important section. It must capture task-type-specific discoveries:
          - Data structure details found at runtime (e.g., "header row is at index 4", "column count is 27 not 28")
          - Specific required components that are easy to miss (e.g., "dropdown must be populated with real branch names, not left as template")
          - Specific error patterns and their fixes (e.g., "ValueError on df.columns if unnamed index column not dropped first")
          - Missing libraries or dependencies found in the execution environment
          - Evaluation feedback: what specifically caused score deductions (e.g., "score deducted for missing R&D cost split sheet")
          - Exact artifact paths or output file naming conventions that the submission system requires
        If nothing task-specific was discovered, write: "- No task-specific facts to record."
      - **Approach** should describe the generalizable procedure. Prefer concrete steps over abstract principles.
        Do NOT repeat facts already listed in Key Facts.
      - **Reflect** must contain only transferable principles and lessons. Write as forward-looking rules that guide future behavior.
        At minimum: one bullet about what caused the worst score deduction and how to prevent it next time.
    merge_op: patch

