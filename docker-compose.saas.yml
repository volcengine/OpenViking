version: "3.8"

# OpenViking SaaS Stack
# Replaces local file-based storage with:
#   - PostgreSQL + pgvector  → vector index & metadata
#   - MinIO (S3-compatible)  → file content storage (AGFS S3 backend)
#
# Quick start:
#   1. cp ov.conf.saas.example ov.conf.saas
#   2. Edit ov.conf.saas (set your embedding API key, etc.)
#   3. docker compose -f docker-compose.saas.yml up -d
#   4. Open http://localhost:1933/dashboard

services:
  # ─── PostgreSQL + pgvector ────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: openviking-postgres
    environment:
      POSTGRES_USER: openviking
      POSTGRES_PASSWORD: openviking_secret
      POSTGRES_DB: openviking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openviking -d openviking"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── MinIO (S3-compatible object storage for AGFS) ────────────────────────
  minio:
    image: minio/minio:latest
    container_name: openviking-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: openviking
      MINIO_ROOT_PASSWORD: openviking_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console (web UI)
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─── MinIO bucket initialization ──────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: openviking-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 openviking openviking_secret &&
        mc mb --ignore-existing local/openviking-storage &&
        echo 'MinIO bucket created successfully'
      "
    restart: "no"

  # ─── OpenViking Server ────────────────────────────────────────────────────
  openviking:
    image: ghcr.io/volcengine/openviking:main
    container_name: openviking-server
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "1933:1933"
    volumes:
      - ./ov.conf.saas:/app/ov.conf:ro
      - openviking_temp:/app/data/temp
    environment:
      OPENVIKING_CONFIG_FILE: /app/ov.conf
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  openviking_temp:
    driver: local

networks:
  default:
    name: openviking-saas
