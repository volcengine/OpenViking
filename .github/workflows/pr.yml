name: 01. Pull Request Checks

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'LICENSE'
      - 'CONTRIBUTING.md'
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.gif'
      - '**.svg'
      - '.gitignore'
      - '.editorconfig'

jobs:
  plugin-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # 24+: the pi extension tests import .ts glue directly via native type stripping.
          node-version: '24'

      - name: Run memory plugin tests
        run: |
          node --test \
            examples/codex-memory-plugin/servers/mcp-proxy.test.mjs \
            examples/codex-memory-plugin/scripts/auto-capture.test.mjs \
            examples/codex-memory-plugin/scripts/marketplace.test.mjs \
            examples/codex-memory-plugin/scripts/ov-credentials.test.mjs \
            examples/codex-memory-plugin/scripts/recall-compressor-profile.test.mjs \
            examples/codex-memory-plugin/scripts/auto-recall.test.mjs \
            examples/claude-code-memory-plugin/scripts/marketplace.test.mjs \
            examples/claude-code-memory-plugin/scripts/skill-experience.test.mjs \
            examples/claude-code-memory-plugin/scripts/uri-guard.test.mjs \
            examples/claude-code-memory-plugin/scripts/lib/pending-queue.test.mjs \
            examples/cursor-memory-plugin/scripts/cursor-plugin.test.mjs \
            examples/trae-memory-hooks/scripts/trae-hooks.test.mjs \
            examples/memory-plugin-shared/batch-send.test.mjs \
            examples/memory-plugin-shared/install-agent-hooks.test.mjs \
            examples/memory-plugin-shared/install-opencode-jsonc.test.mjs \
            examples/memory-plugin-shared/install-tui.test.mjs \
            examples/memory-plugin-shared/sync.test.mjs \
            examples/memory-plugin-shared/recall-core.test.mjs \
            examples/memory-plugin-shared/workspace-peer.test.mjs \
            examples/memory-plugin-shared/uri-guard.test.mjs \
            examples/opencode-plugin/tests/*.test.mjs \
            examples/opencode-plugin/servers/mcp-proxy.test.mjs \
            examples/pi-coding-agent-extension/tests/*.test.mjs

      - name: Check installer scripts parse
        run: |
          bash -n examples/memory-plugin-shared/install.sh
          bash -n examples/claude-code-memory-plugin/setup-helper/install.sh
          bash -n examples/claude-code-memory-plugin/setup-helper/tos-install.sh
          bash -n examples/codex-memory-plugin/setup-helper/install.sh
          bash -n examples/codex-memory-plugin/setup-helper/tos-install.sh

  check-deps:
    runs-on: ubuntu-24.04
    outputs:
      deps_changed: ${{ steps.check.outputs.deps_changed }}
      cuvs_changed: ${{ steps.check.outputs.cuvs_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for dependency changes
        id: check
        run: |
          git fetch origin ${{ github.base_ref }}
          
          # Define grep pattern for dependency files
          PATTERN="pyproject\.toml|setup\.py|uv\.lock|src/CMakeLists\.txt|third_party/|\.github/workflows/_build\.yml"
          
          # Check for changes
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD | grep -E "$PATTERN" || true)
          
          if [ -n "$CHANGED_FILES" ]; then
            echo "Dependency changes detected:"
            echo "$CHANGED_FILES"
            echo "deps_changed=true" >> $GITHUB_OUTPUT
          else
            echo "No dependency changes detected."
            echo "deps_changed=false" >> $GITHUB_OUTPUT
          fi

          # Run the CPU-only cuVS regression suite when the optional backend,
          # its native filter bridge, or its focused tests are modified.
          CUVS_PATTERN="openviking/storage/vectordb/|openviking/storage/vectordb_adapters/(factory|local_adapter)\.py|openviking_cli/utils/config/vectordb_config\.py|src/|tests/(vectordb/test_cuvs_|benchmark/test_cuvs_)|benchmark/cuvs/|examples/cuvs_smoke\.py|\.github/workflows/_test_lite\.yml"
          CUVS_CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD | grep -E "$CUVS_PATTERN" || true)

          if [ -n "$CUVS_CHANGED_FILES" ]; then
            echo "cuVS-related changes detected:"
            echo "$CUVS_CHANGED_FILES"
            echo "cuvs_changed=true" >> $GITHUB_OUTPUT
          else
            echo "No cuVS-related changes detected."
            echo "cuvs_changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-deps
    if: ${{ needs.check-deps.outputs.deps_changed == 'true' }}
    uses: ./.github/workflows/_build.yml

  cuvs-tests:
    needs: check-deps
    if: ${{ needs.check-deps.outputs.cuvs_changed == 'true' }}
    uses: ./.github/workflows/_test_lite.yml
    with:
      os_json: '["ubuntu-24.04"]'
      python_json: '["3.11"]'
