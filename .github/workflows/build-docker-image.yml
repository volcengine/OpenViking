name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "application version for OpenViking"
        required: true
        type: string
  push:
    branches: [ main ]
    tags: [ "v*.*.*" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-image:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Normalize image name
        id: image-name
        env:
          RAW_IMAGE_NAME: ${{ github.repository }}
        run: |
          echo "image=$(echo "$RAW_IMAGE_NAME" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Resolve OpenViking version
        id: openviking-version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            version="${{ github.ref_name }}"
          else
            python -m pip install "setuptools-scm>=8.0"
            version="$(
              python -c "from build_support.versioning import resolve_openviking_version; print(resolve_openviking_version())"
            )"
          fi
          if [ -z "${version}" ] || [ "${version}" = "0.0.0" ]; then
            echo "Resolved invalid OpenViking version: ${version}" >&2
            exit 2
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Volcengine CR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.VOLCENGINE_CR_REGISTRY }}
          username: ${{ secrets.VOLCENGINE_CR_USERNAME }}
          password: ${{ secrets.VOLCENGINE_CR_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/openviking
            ${{ secrets.VOLCENGINE_CR_REGISTRY }}/${{ secrets.VOLCENGINE_CR_NAMESPACE }}/openviking
          tags: |
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=ref,event=tag,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image to GHCR
        id: push-ghcr
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: |
            type=image,name=${{ env.REGISTRY }}/${{ steps.image-name.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENVIKING_VERSION=${{ steps.openviking-version.outputs.version }}

      - name: Build and push Docker image to Docker Hub
        id: push-dockerhub
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: |
            type=image,name=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/openviking,push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENVIKING_VERSION=${{ steps.openviking-version.outputs.version }}

      - name: Build and push Docker image to Volcengine CR
        id: push-volcengine
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          # Volcengine CR (staging) does not accept the SLSA provenance/SBOM
          # attestation manifest that buildx attaches by default, which stalls
          # the "exporting to image" push. Push a plain single-manifest image.
          provenance: false
          sbom: false
          outputs: |
            type=image,name=${{ secrets.VOLCENGINE_CR_REGISTRY }}/${{ secrets.VOLCENGINE_CR_NAMESPACE }}/openviking,push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENVIKING_VERSION=${{ steps.openviking-version.outputs.version }}

      - name: Export GHCR image digest
        run: |
          mkdir -p /tmp/digests-ghcr
          ghcr_digest="${{ steps.push-ghcr.outputs.digest }}"
          touch "/tmp/digests-ghcr/${ghcr_digest#sha256:}"

      - name: Upload GHCR image digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digests-ghcr-${{ matrix.arch }}
          path: /tmp/digests-ghcr/*
          if-no-files-found: error
          retention-days: 1

      - name: Export Docker Hub image digest
        run: |
          mkdir -p /tmp/digests-dockerhub
          dockerhub_digest="${{ steps.push-dockerhub.outputs.digest }}"
          touch "/tmp/digests-dockerhub/${dockerhub_digest#sha256:}"

      - name: Upload Docker Hub image digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digests-dockerhub-${{ matrix.arch }}
          path: /tmp/digests-dockerhub/*
          if-no-files-found: error
          retention-days: 1

      - name: Export Volcengine CR image digest
        run: |
          mkdir -p /tmp/digests-volcengine
          volcengine_digest="${{ steps.push-volcengine.outputs.digest }}"
          touch "/tmp/digests-volcengine/${volcengine_digest#sha256:}"

      - name: Upload Volcengine CR image digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digests-volcengine-${{ matrix.arch }}
          path: /tmp/digests-volcengine/*
          if-no-files-found: error
          retention-days: 1

  create-manifest:
    runs-on: ubuntu-24.04
    needs: build-and-push-image
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Normalize image name
        id: image-name
        env:
          RAW_IMAGE_NAME: ${{ github.repository }}
        run: |
          echo "image=$(echo "$RAW_IMAGE_NAME" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Volcengine CR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.VOLCENGINE_CR_REGISTRY }}
          username: ${{ secrets.VOLCENGINE_CR_USERNAME }}
          password: ${{ secrets.VOLCENGINE_CR_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/openviking
            ${{ secrets.VOLCENGINE_CR_REGISTRY }}/${{ secrets.VOLCENGINE_CR_NAMESPACE }}/openviking
          tags: |
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=ref,event=tag,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download GHCR image digests
        uses: actions/download-artifact@v8
        with:
          pattern: docker-digests-ghcr-*
          path: /tmp/digests-ghcr
          merge-multiple: true

      - name: Download Docker Hub image digests
        uses: actions/download-artifact@v8
        with:
          pattern: docker-digests-dockerhub-*
          path: /tmp/digests-dockerhub
          merge-multiple: true

      - name: Download Volcengine CR image digests
        uses: actions/download-artifact@v8
        with:
          pattern: docker-digests-volcengine-*
          path: /tmp/digests-volcengine
          merge-multiple: true

      - name: Create multi-arch manifests
        env:
          SOURCE_TAGS: ${{ steps.meta.outputs.tags }}
          VOLCENGINE_CR_REGISTRY: ${{ secrets.VOLCENGINE_CR_REGISTRY }}
          VOLCENGINE_CR_NAMESPACE: ${{ secrets.VOLCENGINE_CR_NAMESPACE }}
        run: |
          # Collect image references for all registries
          ghcr_image_refs=()
          dockerhub_image_refs=()
          volcengine_image_refs=()
          for digest_file in /tmp/digests-ghcr/*; do
            [ -e "$digest_file" ] || continue
            digest="sha256:$(basename "$digest_file")"
            ghcr_image_refs+=("${{ env.REGISTRY }}/${{ steps.image-name.outputs.image }}@${digest}")
          done
          for digest_file in /tmp/digests-dockerhub/*; do
            [ -e "$digest_file" ] || continue
            digest="sha256:$(basename "$digest_file")"
            dockerhub_image_refs+=("docker.io/${{ secrets.DOCKERHUB_USERNAME }}/openviking@${digest}")
          done
          for digest_file in /tmp/digests-volcengine/*; do
            [ -e "$digest_file" ] || continue
            digest="sha256:$(basename "$digest_file")"
            volcengine_image_refs+=("${VOLCENGINE_CR_REGISTRY}/${VOLCENGINE_CR_NAMESPACE}/openviking@${digest}")
          done

          [ ${#ghcr_image_refs[@]} -gt 0 ] || {
            echo "No GHCR image digests found" >&2
            exit 1
          }
          [ ${#dockerhub_image_refs[@]} -gt 0 ] || {
            echo "No Docker Hub image digests found" >&2
            exit 1
          }
          [ ${#volcengine_image_refs[@]} -gt 0 ] || {
            echo "No Volcengine CR image digests found" >&2
            exit 1
          }

          # Create manifests for all tags
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue

            # Determine which registry this tag belongs to
            if [[ "$tag" == ghcr.io/* ]]; then
              docker buildx imagetools create \
                --tag "$tag" \
                "${ghcr_image_refs[@]}"
            elif [[ "$tag" == docker.io/* ]]; then
              docker buildx imagetools create \
                --tag "$tag" \
                "${dockerhub_image_refs[@]}"
            elif [[ "$tag" == "${VOLCENGINE_CR_REGISTRY}/"* ]]; then
              docker buildx imagetools create \
                --tag "$tag" \
                "${volcengine_image_refs[@]}"
            fi
          done <<< "$SOURCE_TAGS"
