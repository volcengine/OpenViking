name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional image tag for OpenViking"
        required: false
        type: string
  push:
    branches:
      - main
      - "feature/**"
    tags: [ "v*.*.*" ]

env:
  REGISTRY: ghcr.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-and-push-image:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Normalize image name
        id: image-name
        env:
          RAW_IMAGE_NAME: ${{ github.repository }}
        run: |
          echo "image=$(echo "$RAW_IMAGE_NAME" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Decide Docker Hub publishing
        id: dockerhub
        shell: bash
        run: |
          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract GHCR metadata
        id: meta-ghcr
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image }}
          tags: |
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
            type=ref,event=tag,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch,enable=${{ github.ref_type == 'branch' && github.ref_name != 'main' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref_type == 'branch' }}

      - name: Extract Docker Hub metadata
        id: meta-dockerhub
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ env.DOCKERHUB_USERNAME }}/openviking
          tags: |
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
            type=ref,event=tag,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch,enable=${{ github.ref_type == 'branch' && github.ref_name != 'main' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref_type == 'branch' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image to GHCR
        id: push-ghcr
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: |
            type=image,name=${{ env.REGISTRY }}/${{ steps.image-name.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          build-args: |
            OPENVIKING_VERSION=${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.version) || (github.ref_type == 'tag' && github.ref_name) || '0.0.0' }}

      - name: Build and push Docker image to Docker Hub
        id: push-dockerhub
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: |
            type=image,name=docker.io/${{ env.DOCKERHUB_USERNAME }}/openviking,push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          build-args: |
            OPENVIKING_VERSION=${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.version) || (github.ref_type == 'tag' && github.ref_name) || '0.0.0' }}

      - name: Export GHCR image digest
        run: |
          mkdir -p /tmp/digests-ghcr
          ghcr_digest="${{ steps.push-ghcr.outputs.digest }}"
          touch "/tmp/digests-ghcr/${ghcr_digest#sha256:}"

      - name: Upload GHCR image digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digests-ghcr-${{ matrix.arch }}
          path: /tmp/digests-ghcr/*
          if-no-files-found: error
          retention-days: 1

      - name: Export Docker Hub image digest
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        run: |
          mkdir -p /tmp/digests-dockerhub
          dockerhub_digest="${{ steps.push-dockerhub.outputs.digest }}"
          touch "/tmp/digests-dockerhub/${dockerhub_digest#sha256:}"

      - name: Upload Docker Hub image digest
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: docker-digests-dockerhub-${{ matrix.arch }}
          path: /tmp/digests-dockerhub/*
          if-no-files-found: error
          retention-days: 1

  create-manifest:
    runs-on: ubuntu-24.04
    needs: build-and-push-image
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Normalize image name
        id: image-name
        env:
          RAW_IMAGE_NAME: ${{ github.repository }}
        run: |
          echo "image=$(echo "$RAW_IMAGE_NAME" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Decide Docker Hub publishing
        id: dockerhub
        shell: bash
        run: |
          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract GHCR metadata
        id: meta-ghcr
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image }}
          tags: |
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
            type=ref,event=tag,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch,enable=${{ github.ref_type == 'branch' && github.ref_name != 'main' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref_type == 'branch' }}

      - name: Extract Docker Hub metadata
        id: meta-dockerhub
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ env.DOCKERHUB_USERNAME }}/openviking
          tags: |
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
            type=ref,event=tag,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch,enable=${{ github.ref_type == 'branch' && github.ref_name != 'main' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref_type == 'branch' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download GHCR image digests
        uses: actions/download-artifact@v8
        with:
          pattern: docker-digests-ghcr-*
          path: /tmp/digests-ghcr
          merge-multiple: true

      - name: Download Docker Hub image digests
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v8
        with:
          pattern: docker-digests-dockerhub-*
          path: /tmp/digests-dockerhub
          merge-multiple: true

      - name: Create GHCR multi-arch manifests
        env:
          SOURCE_TAGS: ${{ steps.meta-ghcr.outputs.tags }}
        run: |
          image_refs=()
          for digest_file in /tmp/digests-ghcr/*; do
            [ -e "$digest_file" ] || continue
            digest="sha256:$(basename "$digest_file")"
            image_refs+=("${{ env.REGISTRY }}/${{ steps.image-name.outputs.image }}@${digest}")
          done

          [ ${#image_refs[@]} -gt 0 ] || {
            echo "No GHCR image digests found" >&2
            exit 1
          }

          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker buildx imagetools create \
              --tag "$tag" \
              "${image_refs[@]}"
          done <<< "$SOURCE_TAGS"

      - name: Create Docker Hub multi-arch manifests
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        env:
          SOURCE_TAGS: ${{ steps.meta-dockerhub.outputs.tags }}
        run: |
          image_refs=()
          for digest_file in /tmp/digests-dockerhub/*; do
            [ -e "$digest_file" ] || continue
            digest="sha256:$(basename "$digest_file")"
            image_refs+=("docker.io/${{ env.DOCKERHUB_USERNAME }}/openviking@${digest}")
          done

          [ ${#image_refs[@]} -gt 0 ] || {
            echo "No Docker Hub image digests found" >&2
            exit 1
          }

          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker buildx imagetools create \
              --tag "$tag" \
              "${image_refs[@]}"
          done <<< "$SOURCE_TAGS"
