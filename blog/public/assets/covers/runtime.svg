<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- process boxes -->
  <rect x="60" y="120" width="160" height="80" rx="8" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <text x="140" y="165" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="14">stdin / stdout</text>
  <rect x="320" y="120" width="160" height="80" rx="8" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <text x="400" y="165" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="14">WebSocket</text>
  <rect x="580" y="120" width="160" height="80" rx="8" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="660" y="165" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="14">MCP Tools</text>
  <!-- arrows -->
  <line x1="220" y1="160" x2="320" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="160" x2="580" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
  </defs>
  <!-- bottom label -->
  <rect x="200" y="280" width="400" height="60" rx="12" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="400" y="315" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="13">Agent Runtime</text>
  <!-- decorative dots -->
  <circle cx="100" cy="380" r="3" fill="#38bdf8" opacity="0.4"/>
  <circle cx="300" cy="400" r="2" fill="#a78bfa" opacity="0.3"/>
  <circle cx="500" cy="370" r="4" fill="#34d399" opacity="0.3"/>
  <circle cx="700" cy="390" r="2" fill="#38bdf8" opacity="0.3"/>
</svg>
