extends: custom_s84_category.yaml

benchmark:
  name: tau2_openviking_custom_s84_scope_category_first_user

strategies:
  - id: custom_s84_scope_category_first_user_positive_match
    label: Custom procedure L2 S84 scope prompt + first-user/prewrite category positive-match
    memory_backend: openviking
    train_required: false
    corpus_id: custom_procedure_steps_l2_20260510
    train_memory_mode: external_procedure_l2
    search_memory_type: procedures
    retrieval_mode: first_user_prewrite
    external_openviking:
      retail:
        url: ${OPENVIKING_CUSTOM_URL:-http://localhost:1950}
        account: agent-harness-custom-procedure-steps-retail-20260510
        user: tau2-retail-custom-procedure-steps-user-20260510
        agent_id: tau2-retail-custom-procedure-steps-agent-20260510
        search_uri: viking://agent/tau2-retail-custom-procedure-steps-agent-20260510/memories/procedures/retail
      airline:
        url: ${OPENVIKING_CUSTOM_URL:-http://localhost:1950}
        account: agent-harness-custom-procedure-steps-airline-20260510
        user: tau2-airline-custom-procedure-steps-user-20260510
        agent_id: tau2-airline-custom-procedure-steps-agent-20260510
        search_uri: viking://agent/tau2-airline-custom-procedure-steps-agent-20260510/memories/procedures/airline
    scope_prompt_files:
      retail: benchmark/tau2/config/scope_prompts/retail_memory_scope.md
      airline: benchmark/tau2/config/scope_prompts/airline_memory_scope.md
    category_rerank:
      enabled: true
      catalog_path: benchmark/tau2/config/category_catalog.json
      apply_nodes:
        - first_user
        - before_write_tool_call
      retrieve_limit: 6
      inject_limit: 2
      mismatch_policy: keep_positive_match_drop_mismatch
      positive_match_required: true
      no_match_policy: skip_injection
      search_score_weight: 0.0
