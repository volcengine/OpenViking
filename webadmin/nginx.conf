# OpenViking WebAdmin Nginx 配置

# Upstream definitions (optional, for load balancing)
# upstream webadmin_frontend {
#     server localhost:5173;
# }

# upstream webadmin_backend {
#     server localhost:3000;
# }

# upstream openviking_api {
#     server localhost:1933;
# }

server {
    listen 8173;

    # Logging
    access_log ./logs/webadmin_access.log;
    error_log ./logs/webadmin_error.log;

    # WebAdmin Frontend
    location / {
        proxy_pass http://localhost:5173;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering off;
    }

    # WebAdmin Backend API
    location /api {
        proxy_pass http://localhost:1933;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (API may take longer)
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
}

# OpenViking API (separate server block)
server {
    listen 8933;

    # Logging
    access_log ./logs/openviking_api_access.log;
    error_log ./logs/openviking_api_error.log;

    # OpenViking API
    location / {
        proxy_pass http://localhost:1933;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (API operations may take time)
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
}